[package]
name = "meerkat-integration-tests"
publish = false
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
meerkat = { workspace = true, features = [
    # Phase 6b member-live rows: the live pipeline + the ADJ-P6B-4 scripted
    # realtime fixtures (facade-owned; `fixtures::realtime` is the thin shim).
    "session-store",
    "memory-store",
    "live",
    "test-realtime-fixtures",
] }
meerkat-client.workspace = true
meerkat-comms.workspace = true
meerkat-providers.workspace = true
meerkat-contracts.workspace = true
meerkat-core.workspace = true
meerkat-live = { workspace = true }
meerkat-models = { workspace = true }
meerkat-machine-kernels = { workspace = true, features = ["test-oracle"] }
meerkat-machine-schema.workspace = true
meerkat-mob.workspace = true
meerkat-mob-mcp.workspace = true
meerkat-rpc = { workspace = true, features = [
    "comms",
    "mcp",
    "mob",
    "openai-realtime",
    "schedule",
    "workgraph",
] }
# test-support: the shared multi-host fixture (meerkat-mob/tests/support,
# consumed via #[path] from tests/e2e_fast/multi_host_bind.rs) composes external
# comms targets with MeerkatMachine::test_install_session_peer_comms_handle_on_runtime.
meerkat-runtime = { workspace = true, features = ["test-support"] }
meerkat-session.workspace = true
# jsonl: the shared multi-host fixture's persistent session service.
meerkat-store = { workspace = true, features = ["memory", "sqlite", "jsonl"] }
meerkat-tools.workspace = true
serde = { workspace = true }
serde_json.workspace = true
tokio.workspace = true
async-trait.workspace = true
futures.workspace = true
tokio-tungstenite = "0.29"
uuid = { workspace = true, features = ["v4"] }

[features]
integration-real-tests = []
# The shared multi-host fixture is path-included into this package as well as
# `meerkat-mob`'s own integration tests. Declare the same feature name here so
# its crash-only helpers remain cfg-valid in both crate contexts; all-feature
# validation also forwards the feature to the dependency that owns the seam.
test-support = ["meerkat-mob/test-support"]

[[test]]
name = "live_mob_tools"
path = "tests/live_mob_tools.rs"
required-features = ["integration-real-tests"]

[[test]]
name = "smoke_shared_realm"
path = "tests/smoke_shared_realm.rs"

[[test]]
name = "system_shared_realm"
path = "tests/system_shared_realm.rs"

[[test]]
name = "reserve_interaction_subscriber_fires"
path = "tests/reserve_interaction_subscriber_fires.rs"

[package.metadata.cargo-machete]
ignored = [
    "tempfile",  # dev-dependency used in tests
    "meerkat-mob-mcp",  # used in integration tests (live_mob_tools)
    "meerkat-rpc",  # used in integration tests (live_mob_tools)
    "meerkat-runtime",  # transitive, needed for RuntimeSessionAdapter in tests
    "meerkat-session",  # transitive, needed for PersistentSessionService in tests
    "serde",  # used in integration tests
]

[dev-dependencies]
tempfile.workspace = true
reqwest = { workspace = true, features = ["multipart"] }
base64.workspace = true
sha2.workspace = true
axum.workspace = true
meerkat-auth-core = { workspace = true, features = ["gcp-auth"] }
# The e2e-fast multi-host beat #[path]-includes meerkat-mob/tests/support,
# whose fixture installs an env-gated tracing subscriber.
tracing-subscriber = { workspace = true, features = ["env-filter"] }
