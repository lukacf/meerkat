project: "Assistant Image Generation Substrate"
last_updated: "2026-04-26"
source_doc: "docs/architecture/assistant-image-generation-substrate.md"

types:
  - id: TYPE-001
    text: "Define typed image-generation request, intent, prompt provenance, target preference, size/quality/format/count, image source, provider-native continuity, assistant image refs, warnings, revised prompt and provider text dispositions."
    priority: must
  - id: TYPE-002
    text: "Define typed execution plans for OpenAI hosted Responses image tool, OpenAI Images API, and Gemini native image model, with provider/backend/model/capability facts projected only from the plan variant."
    priority: must
  - id: TYPE-003
    text: "Define switch-turn intent, duration, origin, approval/denial/control result, lifecycle phase, terminal class, and explicit UntilChanged versus finite duration forms."
    priority: must
  - id: TYPE-004
    text: "Define model-routing approval request/phase and parent-specific approval reasons for image operations and switch-turn requests."
    priority: must
  - id: TYPE-005
    text: "Define scoped model override ids, kinds, summaries, topology epoch snapshots, effective/baseline model routing status, and pending switch-turn summaries."
    priority: must
  - id: TYPE-006
    text: "Extend assistant content/image artifact types so generated images have canonical AssistantImageId, BlobRef, typed media type, dimensions, revised prompt, and provider metadata."
    priority: must

contracts:
  - id: CONTRACT-001
    text: "OpenAI hosted image generation requests use a text-capable Responses model with the hosted image_generation tool and never switch the session model to a GPT Image target."
    priority: must
  - id: CONTRACT-002
    text: "Gemini image generation requests use native image-output model calls that normalize interleaved text and inline image parts into ImageGenerationToolResult."
    priority: must
  - id: CONTRACT-003
    text: "Generated image bytes are committed through the blob-store seam, never as provider inline bytes in durable transcript truth."
    priority: must
  - id: CONTRACT-004
    text: "Wire/schema exports expose image-generation, switch-turn, approval, scoped override, and model-routing status types without raw provider metadata bags."
    priority: must
  - id: CONTRACT-005
    text: "Live image generation tests are excluded from the default fast suite and run only in explicit live lanes with environment gating."
    priority: must

requirements:
  - id: REQ-001
    text: "`generate_image` is exposed as one Meerkat-owned model-facing builtin primitive with typed intent; provider-native APIs are execution backends."
    priority: must
  - id: REQ-002
    text: "Session LLM identity and image generation target remain separate; OpenAI image targets do not persistently reconfigure the session model."
    priority: must
  - id: REQ-003
    text: "Image generation target resolution validates provider/model capabilities, count, cost/safety/approval policy, and rejects unsupported counts rather than clamping."
    priority: must
  - id: REQ-004
    text: "Plan resolution and image operation lifecycle are accepted through MeerkatMachine-owned typed transitions/effects, not helper-local state."
    priority: must
  - id: REQ-005
    text: "OpenAI image execution invokes a provider-native image backend and normalizes base64 images, revised prompt, metadata, warnings, and terminal class into ImageGenerationToolResult."
    priority: must
  - id: REQ-006
    text: "Gemini image execution activates an operation-scoped model override, snapshots projection input, invokes the native image model, captures provider text/images, commits blobs, and restores the previous effective model before success terminalization."
    priority: must
  - id: REQ-007
    text: "Projection is typed lowering from transcript/current-turn state plus GenerateImageRequest; provider adapters consume projection and do not invent replay policy."
    priority: must
  - id: REQ-008
    text: "`switch_turn` is a reserved machine-owned control intent with finite and UntilChanged durations, policy validation, approval, audit, and typed control results; it is not an ordinary external tool."
    priority: must
  - id: REQ-009
    text: "Finite switch-turn requests apply at machine-approved assistant-turn boundaries, count admitted assistant turns rather than provider calls/tool-loop continuations, and restore via machine transition."
    priority: must
  - id: REQ-010
    text: "UntilChanged switch-turn requests route to the persistent session LLM reconfigure transition family, never to ScopedModelOverride."
    priority: must
  - id: REQ-011
    text: "Scoped override nesting is bounded: one turn-scoped override, one operation-scoped child, no operation-in-operation nesting, and conflicts terminalize with typed denial."
    priority: must
  - id: REQ-012
    text: "Model-routing approvals are machine-owned, parent-linked, terminalized through typed outcomes, and deny with owner-specific denial classes when suspension is unavailable."
    priority: must
  - id: REQ-013
    text: "Session model-routing status exposes baseline model, derived effective model with operation > turn > baseline precedence, active override summaries, and pending switch-turn projection."
    priority: must
  - id: REQ-014
    text: "Realtime attachment policy follows effective model identity and rejects or detaches/reattaches through runtime policy; surfaces do not keep realtime attached to non-realtime effective models."
    priority: must
  - id: REQ-015
    text: "Image operation progress/events are typed operation events; scoped target deltas are not emitted as main-session assistant content deltas."
    priority: must
  - id: REQ-016
    text: "Cancellation, timeout, provider refusal, safety filtering, empty result, denial, and restore failure preserve distinct terminal classes in tool results and audit/event state."
    priority: must
  - id: REQ-017
    text: "Model/profile capability data distinguishes hosted_image_generation_tool, native_image_output, custom_tools, image_search_grounding, image_continuity_tokens, and realtime."
    priority: must
  - id: REQ-018
    text: "Provider-native continuity handles are optional projections with durable blob fallbacks; provider handles are never canonical transcript truth."
    priority: must
  - id: REQ-019
    text: "Generated assistant image artifacts are visible to UI/API surfaces after blob commit and are linked to the image operation and transcript image block."
    priority: must
  - id: REQ-020
    text: "Add deterministic unit/integration/e2e coverage and explicit live OpenAI/Gemini image generation smoke tests in the live lane."
    priority: must

invariants:
  - id: INV-001
    text: "Machine owns semantics; shell/provider code owns mechanics only."
  - id: INV-002
    text: "No parallel provider/backend/model/capability fields beside GenerateImageExecutionPlan."
  - id: INV-003
    text: "Terminal classes live inside phase terminal variants, not parallel maps."
  - id: INV-004
    text: "Dynamic policy and tool visibility are recomputed after every scoped effective-model change."
  - id: INV-005
    text: "Default test lanes remain hermetic; live image calls require ignored/live-lane gating."

chokepoints:
  - id: CHOKE-001
    text: "GenerateImageRequest JSON/wire/domain round trip."
  - id: CHOKE-002
    text: "Builtin generate_image dispatch -> machine image operation -> provider executor."
  - id: CHOKE-003
    text: "Provider image result -> blob store -> AssistantImageRef/tool result/transcript projection."
  - id: CHOKE-004
    text: "Gemini operation-scoped override apply/restore around provider invocation."
  - id: CHOKE-005
    text: "Switch-turn control intent -> machine boundary -> model routing status."
  - id: CHOKE-006
    text: "Model/profile capabilities -> target resolver -> tool visibility/realtime policy."
  - id: CHOKE-007
    text: "Wire/schema generation -> client-visible contracts."

e2e:
  - id: E2E-001
    text: "Real session with OpenAI-capable text model calls generate_image and receives committed image result without changing baseline model."
  - id: E2E-002
    text: "Real session targets Gemini image model and restores previous effective model after image operation."
  - id: E2E-003
    text: "switch_turn finite one-turn changes effective model for exactly one admitted assistant turn."
  - id: E2E-004
    text: "Unsupported count/target returns typed denial rather than clamped or generic success."
  - id: E2E-005
    text: "Live e2e-smoke OpenAI and Gemini image generation produce decodable image blobs when credentials are present."
