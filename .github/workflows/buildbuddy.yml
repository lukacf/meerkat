  audit:
    name: Security audit
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (vars.MEERKAT_BUILDBUDDY_CI == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/run-buildbuddy-ci-lane
        with:
          lane: audit
          profile: full
          mode: ${{ inputs.mode || vars.MEERKAT_BUILDBUDDY_CI_MODE || 'full-fresh' }}

  changed-gate:
    name: Changed-path gate (Bazel/RBE)
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.mode == 'changed-committed' || inputs.mode == 'changed-paths') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup BuildBuddy CI
        uses: ./.github/actions/setup-buildbuddy-ci
        with:
          profile: native

      - name: Changed-path gate
        env:
          MEERKAT_BUILDBUDDY_CI_MODE: ${{ inputs.mode }}
          MEERKAT_BUILDBUDDY_CHANGED_MODE: ${{ inputs.changed_mode || vars.MEERKAT_BUILDBUDDY_CHANGED_MODE || 'owned' }}
          MEERKAT_BUILDBUDDY_BASE: ${{ inputs.base || vars.MEERKAT_BUILDBUDDY_BASE || 'origin/main' }}
          MEERKAT_BUILDBUDDY_CHANGED_PATHS: ${{ inputs.paths || vars.MEERKAT_BUILDBUDDY_CHANGED_PATHS || '' }}
          MEERKAT_BUILDBUDDY_LOG_ROOT: ${{ runner.temp }}/buildbuddy-logs
        run: |
          set -o pipefail
          mkdir -p "${MEERKAT_BUILDBUDDY_LOG_ROOT}"
          scripts/buildbuddy-ci-dispatch 2>&1 | tee "${MEERKAT_BUILDBUDDY_LOG_ROOT}/dispatch.log"

      - name: Upload BuildBuddy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildbuddy-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/buildbuddy-logs
          if-no-files-found: ignore

  gate:
    name: BuildBuddy CI gate
    needs:
      - doctor
      - fmt-lint
      - sdk-suites
      - rust-release-packaging
      - machine-authority
      - rmat-audit
      - seam-inventory
      - wasm-contract-tests
      - test-unit
      - integration-fast
      - e2e-fast
      - e2e-system
      - e2e-live
      - e2e-smoke
      - test-minimal
      - test-feature-matrix-lib
      - test-feature-matrix-surface-checks
      - wasm-check
      - audit
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (vars.MEERKAT_BUILDBUDDY_CI == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository))) }}
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "BuildBuddy CI failed"
            exit 1
          fi
