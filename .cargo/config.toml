# Meerkat cargo configuration

[alias]
# Machine-authority workflow entrypoint
xtask = "run -p xtask --features machine-authority --"

# Fast test suite (unit + integration-fast, skips doctests)
fast = "nextest run --workspace --show-progress none --status-level none --final-status-level fail"
rct = "nextest run --workspace --show-progress none --status-level none --final-status-level fail"

# Unit tests only (no integration tests, skips doctests)
unit = "nextest run --workspace --lib --show-progress none --status-level none --final-status-level fail"

# Integration-fast tests only (ignored tests are not run). Exclude the
# dedicated e2e lane wrapper binaries; they have their own CI jobs and are not
# appropriate for the fast lane.
int = [
  "nextest",
  "run",
  "--workspace",
  "--tests",
  "-E",
  "not binary(e2e_fast_lane) and not binary(e2e_system_lane) and not binary(e2e_live_lane) and not binary(e2e_smoke_lane) and not binary(e2e_models_lane)",
  "--show-progress",
  "none",
  "--status-level",
  "none",
  "--final-status-level",
  "fail",
]

# Canonical e2e lanes
e2e-fast = "nextest run -p meerkat-integration-tests --test e2e_fast_lane --no-fail-fast --show-progress none --status-level none --final-status-level fail"
e2e-system = "nextest run -p meerkat-integration-tests --test e2e_system_lane --no-fail-fast --show-progress none --status-level none --final-status-level fail --test-threads=1"
e2e-live = "nextest run -p meerkat-integration-tests --test e2e_live_lane --run-ignored ignored-only --no-fail-fast --show-progress none --status-level none --final-status-level fail --test-threads=1"
e2e-smoke = "nextest run -p meerkat-integration-tests --test e2e_smoke_lane --run-ignored ignored-only --no-fail-fast --show-progress none --status-level none --final-status-level fail --test-threads=1"
e2e-models = "nextest run -p meerkat-integration-tests --test e2e_models_lane --run-ignored ignored-only --no-fail-fast --show-progress none --status-level none --final-status-level fail --test-threads=1"
e2e-auth = "nextest run -p meerkat-integration-tests --test e2e_auth_lane --run-ignored ignored-only --no-fail-fast --show-progress none --status-level none --final-status-level fail --test-threads=1"

# Temporary compatibility shims during lane migration.
int-real = "!./scripts/repo-cargo e2e-system"
e2e = "!./scripts/repo-cargo e2e-live && ./scripts/repo-cargo e2e-smoke"

# Feature matrix helpers (shell aliases to make targets)
test-minimal = "!make test-minimal"
test-feature-matrix-lib = "!make test-feature-matrix-lib"
test-feature-matrix-surface = "!make test-feature-matrix-surface"
test-feature-matrix = "!make test-feature-matrix"

# Do not set a global wasm32 test runner here. Clean environments generally do
# not have `wasm-bindgen-test-runner` installed, so repository-wide Cargo
# config must not make raw `cargo test --target wasm32-unknown-unknown` depend
# on an external binary. Use explicit wasm test tooling when needed, and keep
# bare Cargo wasm lanes compile-only (`--no-run`).
