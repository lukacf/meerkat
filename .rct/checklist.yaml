project: "Assistant Image Generation Substrate"
tasks:
  - id: P0-T001
    phase: 0
    owner: orchestrator
    spec_ids: [CONTRACT-001, CONTRACT-002, CONTRACT-005]
    text: "Record external OpenAI/Gemini image API facts and live-lane gating policy."
    done_when: ".rct/evidence.md records official docs/API evidence and live tests are ignored/gated outside default suites."
  - id: P0-T002
    phase: 0
    owner: impl
    spec_ids: [TYPE-001, TYPE-002, TYPE-006, CHOKE-001]
    text: "Add image generation domain types and serialization/validation tests."
    done_when: "Round-trip and invalid-count/non-empty edit-source tests pass in deterministic crate tests."
  - id: P0-T003
    phase: 0
    owner: impl
    spec_ids: [TYPE-003, TYPE-004, TYPE-005, CHOKE-001]
    text: "Add switch-turn, approval, scoped override, and model-routing status domain types with serialization tests."
    done_when: "Round-trip tests prove finite vs UntilChanged, owner-linked approvals, and effective status summaries serialize without information loss."
  - id: P1-T001
    phase: 1
    owner: impl
    spec_ids: [REQ-004, REQ-016]
    text: "Extend MeerkatMachine DSL/effects for image operation lifecycle and terminal classes."
    done_when: "Machine tests prove requested->terminal paths, plan-conditional guards, and terminal class projection through generated kernel."
  - id: P1-T002
    phase: 1
    owner: impl
    spec_ids: [REQ-008, REQ-009, REQ-010, REQ-011, REQ-012, REQ-013]
    text: "Add switch-turn/scoped override lifecycle and model-routing status projection."
    done_when: "Runtime entrypoint test proves finite switch-turn applies for one admitted assistant turn, UntilChanged hands off to persistent reconfigure, and effective model precedence is operation > turn > baseline."
  - id: P1-T003
    phase: 1
    owner: impl
    spec_ids: [REQ-014, REQ-017]
    text: "Wire capability and realtime conflict policy into scoped effective model changes."
    done_when: "Runtime test proves non-realtime scoped target is rejected or detached by policy and tool visibility/capability facts recompute from effective model."
  - id: P2-T001
    phase: 2
    owner: impl
    spec_ids: [REQ-001, REQ-002, REQ-003, CHOKE-002]
    text: "Expose generate_image as privileged Meerkat builtin that starts a machine-owned image operation and typed plan resolution."
    done_when: "Real session/tool-loop test proves a model-facing generate_image call resolves a typed execution plan and unsupported counts deny without clamping."
  - id: P2-T002
    phase: 2
    owner: impl
    spec_ids: [REQ-005, CONTRACT-001, E2E-001]
    text: "Implement OpenAI provider-native image backend normalization."
    done_when: "Integration test with fake OpenAI transport and live-gated smoke prove base64 image, revised prompt, metadata, blob commit, and unchanged baseline model."
  - id: P2-T003
    phase: 2
    owner: impl
    spec_ids: [REQ-006, REQ-007, CONTRACT-002, E2E-002]
    text: "Implement Gemini native image-model execution via scoped operation override and typed projection."
    done_when: "Integration test with fake Gemini transport and live-gated smoke prove projection snapshot, provider text capture, image blob commit, and restore-before-success."
  - id: P2-T004
    phase: 2
    owner: impl
    spec_ids: [REQ-015, REQ-018, REQ-019, CHOKE-003]
    text: "Commit generated images as canonical assistant image artifacts and emit typed operation progress/result events."
    done_when: "Real session entrypoint observes committed AssistantImageRef/tool result/event and no provider inline bytes are durable transcript truth."
  - id: P3-T001
    phase: 3
    owner: impl
    spec_ids: [REQ-020, E2E-005]
    text: "Add live e2e-smoke OpenAI and Gemini image generation tests with credential gating."
    done_when: "Explicit e2e-smoke command with credentials produces decodable image blobs; default fast suite skips live calls."
  - id: P3-T002
    phase: 3
    owner: orchestrator
    spec_ids: [CHOKE-007]
    text: "Regenerate schemas/kernels, run drift checks, and update traceability/evidence."
    done_when: "Machine/codegen drift checks are clean and traceability has no MISSING, PROVISIONAL, DEFERRED, STUBBED, or typed-but-unwired rows."
