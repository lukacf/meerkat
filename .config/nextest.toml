# Nextest configuration for meerkat-0.6-cleanups.
#
# Retry policy is scoped narrowly: the two known pre-existing flakes are
# retried once, everything else runs to completion without retries.

[[profile.default.overrides]]
# D4 / issue #260: provider_tool_use_boundary race. Reduced from ~20% to ~10%
# by drain-and-clear-dirty logic; full elimination blocked on deeper
# runtime-append synchronization work.
filter = 'test(provider_tool_use_boundary_does_not_surface_public_turn_completed_or_flush_canonical_output)'
retries = 2

[[profile.default.overrides]]
# Pre-existing pending-spawn alignment race in concurrent-spawn orchestration.
# Observed historically and by actor-cutover-3 during T5-prep. Not a
# regression introduced by this PR; retries until we land a targeted fix.
filter = 'test(test_concurrent_spawns_parallelize_provisioning)'
retries = 2

[[profile.default.overrides]]
# W1-A (#264): Pre-existing two-read race on session.state.updated_at between
# meerkat-rpc/src/realtime_ws.rs:920 (`current_projection_updated_at` consumer
# snapshot) and :2956 (`spawn_projection_refresh_task` task snapshot). When the
# session materialization's final summary tick is applied between the two
# reads, the task observes a newer `updated_at` than the consumer and its next
# notify triggers an extra `open_session` call via
# `refresh_product_session_projection`. The test asserts `open_calls == 1`,
# but the real invariant is "1 on a clean snapshot, possibly 2 on a raced
# snapshot" — the code has exactly one reconstruction fire site gated on
# `product_turn_in_flight`, the second open is a legitimate cause path, not a
# double-fire. Atomic-snapshot fix is tracked for W2-E; retries here keep CI
# green until that lands.
filter = 'test(audio_input_uses_product_session_factory_and_streams_provider_events)'
retries = 2

[[profile.default.overrides]]
# Same race as audio_input_uses_product_session_factory_and_streams_provider_events
# — see that override for the full mechanism. Atomic-snapshot fix tracked for W2-E.
filter = 'test(product_session_tool_call_routes_through_session_service_and_continues_provider)'
retries = 2
