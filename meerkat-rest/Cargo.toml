[package]
name = "meerkat-rest"
description = "REST API server for Meerkat"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true

[[bin]]
name = "rkat-rest"
path = "src/main.rs"

[[test]]
name = "system_rest_resume"
path = "tests/system_rest_resume.rs"
required-features = ["integration-real-tests"]

[[test]]
name = "live_continue_tmp"
path = "tests/live_continue_tmp.rs"
required-features = ["integration-real-tests"]

[[test]]
name = "live_rest_regression"
path = "tests/live_rest_regression.rs"
required-features = ["integration-real-tests"]

[[test]]
name = "live_rest_matrix"
path = "tests/live_rest_matrix.rs"
required-features = ["integration-real-tests"]

[dependencies]
meerkat = { workspace = true, features = ["anthropic", "openai", "gemini", "jsonl-store", "session-store", "memory-store", "skills", "schedule"] }
meerkat-core = { workspace = true }
meerkat-contracts = { workspace = true }
meerkat-client = { workspace = true, features = ["anthropic", "openai", "gemini", "oauth"] }
meerkat-store = { workspace = true }
meerkat-tools = { workspace = true }
meerkat-runtime = { workspace = true, features = ["sqlite-store"] }
meerkat-mob = { workspace = true, optional = true }
meerkat-mob-mcp = { workspace = true, optional = true }
meerkat-comms = { workspace = true, optional = true }
meerkat-mcp = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "signal"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
async-stream = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
dirs = { workspace = true }
subtle = { workspace = true }
clap = { workspace = true, features = ["derive"] }
reqwest = { workspace = true }

[features]
default = ["comms", "mcp", "mob", "schedule"]
comms = ["meerkat/comms", "dep:meerkat-comms"]
mcp = ["meerkat/mcp", "dep:meerkat-mcp"]
mob = ["dep:meerkat-mob", "dep:meerkat-mob-mcp"]
schedule = ["meerkat/schedule"]
integration-real-tests = []

[dev-dependencies]
hyper = { workspace = true }
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = { workspace = true }
http-body-util = { workspace = true }

[package.metadata.cargo-machete]
ignored = [
    "async-trait",     # proc macro (derive)
    "hyper",           # dev-dependency used in tests
    "meerkat-comms",   # optional dep behind comms feature
    "meerkat-mcp",     # optional dep behind mcp feature
    "meerkat-mob",     # optional dep behind mob feature
    "meerkat-mob-mcp", # optional dep behind mob feature
    "meerkat-tools",   # used via meerkat facade re-exports
    "thiserror",       # proc macro (derive)
]

[lints]
workspace = true
