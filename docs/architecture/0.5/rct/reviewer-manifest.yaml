execution_mode: rct-development-manual
last_updated: "2026-03-17"
notes:
  - "This docs-local package targets the full rct-development execution form."
  - "Repo-specific gate order is build/test first, reviewer gates second."
  - "Reviewer gates may inspect logs/artifacts/files but may not run cargo build/check/test."

reviewers:
  - id: spec-auditor
    role: "Requirement traceability, silent omission detection, typed-vs-wired auditing, reality-gate enforcement"
    prompt_source: ".claude/skills/rct-methodology/assets/luka_loop/.rct/agents/spec-auditor.md"
  - id: integration-sheriff
    role: "Cross-component wiring, chokepoint validation, runtime-path parity, external dependency integration"
    prompt_source: ".claude/skills/rct-methodology/assets/luka_loop/.rct/agents/integration-sheriff.md"
  - id: rct-guardian
    role: "Implementation quality, test effectiveness, adversarial coverage, unfinished-marker detection"
    prompt_source: ".claude/skills/rct-methodology/assets/luka_loop/.rct/agents/rct-guardian.md"
  - id: performance-gate
    role: "Performance and regression budget review based on build-gate artifacts, timings, and hot-path change review"
    prompt_source: ".claude/skills/rct-methodology/assets/luka_loop/.rct/agents/performance-gate.md"
  - id: methodology-integrity
    role: "Final gate audit for phase integrity, evidence quality, rollback correctness, and closure discipline"
    prompt_source: ".claude/skills/rct-methodology/assets/luka_loop/.rct/agents/methodology-integrity.md"

phase_defaults:
  standard_reviewers:
    - spec-auditor
    - integration-sheriff
    - rct-guardian
    - performance-gate
  final_phase_reviewers:
    - spec-auditor
    - integration-sheriff
    - rct-guardian
    - performance-gate
    - methodology-integrity
