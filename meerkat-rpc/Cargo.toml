[package]
name = "meerkat-rpc"
description = "JSON-RPC stdio server for Meerkat"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true

[[bin]]
name = "rkat-rpc"
path = "src/main.rs"

[[test]]
name = "live_smoke_rpc"
path = "tests/live_smoke_rpc.rs"

[[test]]
name = "live_rpc_regression"
path = "tests/live_rpc_regression.rs"

[[test]]
name = "tcp_e2e"
path = "tests/tcp_e2e.rs"

[dependencies]
meerkat = { workspace = true, features = ["anthropic", "openai", "openai-realtime", "gemini", "jsonl-store", "session-store", "memory-store", "skills", "schedule"] }
meerkat-models = { workspace = true }
meerkat-core = { workspace = true }
meerkat-contracts = { workspace = true }
meerkat-client = { workspace = true, features = ["anthropic", "openai", "gemini", "oauth", "openai-realtime"] }
meerkat-anthropic = { workspace = true, features = ["oauth"] }
meerkat-providers = { workspace = true, features = ["anthropic", "openai", "gemini", "oauth", "native-keyring", "refresh-file-lock"] }
reqwest = { workspace = true }
meerkat-store = { workspace = true }
meerkat-mob = { workspace = true, optional = true }
meerkat-mob-mcp = { workspace = true, optional = true }
meerkat-runtime = { workspace = true, features = ["sqlite-store"] }
futures = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
clap = { workspace = true }
axum = { workspace = true, features = ["ws"] }

[features]
default = ["comms", "mcp", "mob", "schedule"]
comms = ["meerkat/comms"]
mcp = ["meerkat/mcp"]
mob = ["dep:meerkat-mob", "dep:meerkat-mob-mcp"]
schedule = ["meerkat/schedule"]

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
futures = { workspace = true }
async-stream = { workspace = true }
tempfile = { workspace = true }
tokio-tungstenite = "0.28"
meerkat-comms = { workspace = true }

[lints]
workspace = true
