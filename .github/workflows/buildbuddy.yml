      - e2e-fast
      - e2e-system
      - test-minimal
      - test-feature-matrix-lib
      - test-feature-matrix-surface-checks
      - wasm-check
      - audit
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || ((vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "BuildBuddy CI failed"
            exit 1
          fi
      - name: Check GCP CI duration SLO
        if: ${{ (inputs.backend || 'buildbuddy-hosted') == 'gcp-buildbuddy' }}
        shell: bash
        env:
          CI_STARTED_AT_EPOCH: ${{ inputs.ci_started_at_epoch || needs.gcp-control-plane-up.outputs.started_at_epoch }}
          MAX_SECONDS: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CI_MAX_SECONDS || '600' }}
        run: |
          if ! [[ "${CI_STARTED_AT_EPOCH}" =~ ^[0-9]+$ ]]; then
            echo "::error::Missing or invalid GCP BuildBuddy CI start timestamp: '${CI_STARTED_AT_EPOCH}'"
            exit 1
          fi
          if ! [[ "${MAX_SECONDS}" =~ ^[0-9]+$ ]] || [[ "${MAX_SECONDS}" == "0" ]]; then
            echo "::error::Invalid MEERKAT_GCP_BUILDBUDDY_CI_MAX_SECONDS: '${MAX_SECONDS}'"
            exit 1
          fi
          now="$(date +%s)"
          elapsed="$((now - CI_STARTED_AT_EPOCH))"
          echo "GCP BuildBuddy CI elapsed seconds: ${elapsed}/${MAX_SECONDS}"
          if (( elapsed > MAX_SECONDS )); then
            echo "::error::GCP BuildBuddy CI exceeded ${MAX_SECONDS}s SLO (${elapsed}s)."
            exit 1
          fi
