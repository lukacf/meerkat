name: Repair Mini Release Assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to repair, for example v0.6.1"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build_minis:
    name: Build mini binaries (${{ matrix.runs-on }}, ${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - runs-on: macos-15
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - runs-on: macos-15-large
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add release target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: repair-mini-${{ matrix.target }}

      - name: Build mini binaries
        shell: bash
        env:
          CARGO_TARGET_DIR: target
        run: |
          set -euo pipefail
          ./scripts/repo-cargo build -p rkat --bin rkat-mini --release --target "${{ matrix.target }}" --no-default-features --features anthropic,openai,gemini,jsonl-store,session-store,skills
          ./scripts/repo-cargo build -p meerkat-rpc --bin rkat-rpc-mini --release --target "${{ matrix.target }}" --no-default-features --features mini-surface

      - name: Ad-hoc codesign macOS binaries
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          for bin in rkat-mini rkat-rpc-mini; do
            codesign --force --sign - "target/${{ matrix.target }}/release/${bin}"
          done

      - name: Package mini artifacts
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ inputs.release_tag }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${VERSION#v}"
          VERSION="${VERSION//\//-}"
          STAGE_ROOT="$(mktemp -d)"
          trap 'rm -rf "${STAGE_ROOT}"' EXIT

          for bin in rkat-mini rkat-rpc-mini; do
            if [[ "${RUNNER_OS}" == "Windows" ]]; then
              src="target/${TARGET}/release/${bin}.exe"
              payload_name="${bin}.exe"
            else
              src="target/${TARGET}/release/${bin}"
              payload_name="${bin}"
            fi
            artifact_name="${bin}-${VERSION}-${TARGET}.${ARCHIVE_EXT}"

            if [[ ! -f "$src" ]]; then
              echo "Missing expected binary at $src" >&2
              exit 1
            fi

            stage_dir="${STAGE_ROOT}/${bin}"
            mkdir -p "${stage_dir}"
            cp "$src" "${stage_dir}/${payload_name}"
            chmod +x "${stage_dir}/${payload_name}" || true
            archive_path="${GITHUB_WORKSPACE}/dist/${artifact_name}"

            if [[ "$ARCHIVE_EXT" == "zip" ]]; then
              (cd "${stage_dir}" && 7z a -tzip "${archive_path}" "${payload_name}")
            else
              tar -czf "${archive_path}" -C "${stage_dir}" "${payload_name}"
            fi
            echo "packaged=${bin} -> dist/${artifact_name}"
          done

      - name: Upload mini artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meerkat-mini-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish_minis:
    name: Publish repaired mini release assets
    needs: [build_minis]
    runs-on: ubuntu-latest
    steps:
      - name: Download mini artifacts
        uses: actions/download-artifact@v4
        with:
          path: mini-artifacts

      - name: Rebuild release checksums and upload minis
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p release-current
          gh release download "${RELEASE_TAG}" --repo "${REPO}" --dir release-current --pattern '*.tar.gz' --pattern '*.zip'

          while IFS= read -r artifact; do
            cp "$artifact" "release-current/$(basename "$artifact")"
          done < <(find mini-artifacts -type f \( -name 'rkat-mini-*' -o -name 'rkat-rpc-mini-*' \) | sort)

          (
            cd release-current
            find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print | sort | sed 's#^\./##' > manifest_files.txt
            xargs sha256sum < manifest_files.txt > checksums.sha256
            python3 -c 'import json, os; from pathlib import Path; tag = os.environ["RELEASE_TAG"]; artifacts = [p.name for p in sorted(Path(".").iterdir()) if p.is_file() and (p.name.endswith(".tar.gz") or p.name.endswith(".zip"))]; json.dump({"version": tag.lstrip("v"), "tag": tag, "artifacts": artifacts, "checksums": "checksums.sha256"}, open("index.json", "w", encoding="utf-8"), indent=2)'
          )

          mapfile -t mini_files < <(find mini-artifacts -type f \( -name 'rkat-mini-*' -o -name 'rkat-rpc-mini-*' \) | sort)
          gh release upload "${RELEASE_TAG}" --repo "${REPO}" "${mini_files[@]}" release-current/checksums.sha256 release-current/index.json --clobber

      - name: Upload repaired manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: repaired-release-manifests
          path: |
            release-current/checksums.sha256
            release-current/index.json
          if-no-files-found: error

  update_homebrew:
    name: Update Homebrew tap for repaired minis
    needs: [publish_minis]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: lukacf/homebrew-meerkat
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-meerkat

      - name: Download repaired checksums
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/lukacf/meerkat/releases/download/${RELEASE_TAG}/checksums.sha256" -o checksums.sha256

      - name: Generate updated formula
        env:
          VERSION: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          TAG="${{ inputs.release_tag }}"
          BASE="https://github.com/lukacf/meerkat/releases/download/${TAG}"

          get_sha() { grep "$1" checksums.sha256 | awk '{print $1}'; }

          gen_resource() {
            local name="$1" target="$2"
            echo "  resource \"${name}\" do"
            echo "    url \"${BASE}/${name}-${VERSION}-${target}.tar.gz\""
            echo "    sha256 \"$(get_sha "${name}-${VERSION}-${target}.tar.gz")\""
            echo "  end"
          }

          gen_platform() {
            local target="$1"
            echo "    url \"${BASE}/rkat-${VERSION}-${target}.tar.gz\""
            echo "    sha256 \"$(get_sha "rkat-${VERSION}-${target}.tar.gz")\""
            echo ""
            for r in rkat-mini rkat-rpc rkat-rpc-mini rkat-rest rkat-mcp; do
              gen_resource "$r" "$target"
              echo ""
            done
          }

          {
            echo 'class Rkat < Formula'
            echo '  desc "Minimal, high-performance agent harness for LLM-powered applications"'
            echo '  homepage "https://github.com/lukacf/meerkat"'
            echo "  version \"${VERSION}\""
            echo '  license "MIT"'
            echo ''
            echo '  on_macos do'
            echo '    on_arm do'
            gen_platform "aarch64-apple-darwin"
            echo '    end'
            echo ''
            echo '    on_intel do'
            gen_platform "x86_64-apple-darwin"
            echo '    end'
            echo '  end'
            echo ''
            echo '  on_linux do'
            echo '    on_arm do'
            gen_platform "aarch64-unknown-linux-gnu"
            echo '    end'
            echo ''
            echo '    on_intel do'
            gen_platform "x86_64-unknown-linux-gnu"
            echo '    end'
            echo '  end'
            echo ''
            echo '  def install'
            echo '    bin.install "rkat"'
            echo ''
            echo '    %w[rkat-mini rkat-rpc rkat-rpc-mini rkat-rest rkat-mcp].each do |name|'
            echo '      resource(name).stage do'
            echo '        bin.install name'
            echo '      end'
            echo '    end'
            echo '  end'
            echo ''
            echo '  test do'
            echo '    assert_match "rkat #{version}", shell_output("#{bin}/rkat --version")'
            echo '  end'
            echo 'end'
          } > homebrew-meerkat/rkat.rb

      - name: Commit and push formula
        working-directory: homebrew-meerkat
        env:
          VERSION: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if git diff --quiet -- rkat.rb; then
            echo "Homebrew formula already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rkat.rb
          git commit -m "Update rkat to ${VERSION#v}"
          git push
