          - "meerkat-runtime/src/runtime_loop.rs"
          - "meerkat-runtime/tests/*"
        verification_gate: "runtime control-plane contract suite"
        real_entrypoint: "cargo test -p meerkat-runtime control_plane -- --ignored"
        deletion_checkpoint: "surface-local shutdown completion logic is no longer authoritative"
      - id: TASK-005
        spec_id: TYPE-007
        related_spec_ids: [TYPE-008, TYPE-009, TYPE-010, TYPE-011, TYPE-012, CONTRACT-007, CONTRACT-008]
        owner: impl
