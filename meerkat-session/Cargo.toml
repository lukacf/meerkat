[package]
name = "meerkat-session"
description = "Session service orchestration for Meerkat"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
meerkat-core = { workspace = true }
meerkat-contracts = { workspace = true }
async-trait = { workspace = true }
indexmap = "2"
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }
sha2 = { workspace = true }
meerkat-store = { workspace = true, optional = true, default-features = false }
redb = { workspace = true, optional = true }
meerkat-runtime = { workspace = true, optional = true }

[target.'cfg(all(not(target_arch = "wasm32"), not(target_os = "espidf")))'.dependencies]
tokio = { workspace = true }
meerkat-skills = { workspace = true }
inventory = { workspace = true }

[target.'cfg(target_os = "espidf")'.dependencies]
tokio = { version = "1.43", default-features = false, features = ["fs", "io-util", "macros", "rt", "sync", "time"] }
meerkat-skills = { workspace = true, default-features = false }
inventory = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
tokio_with_wasm = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["test-util", "macros"] }
meerkat-store = { workspace = true, features = ["memory"] }

[features]
default = []
persistent-service = ["dep:meerkat-store", "dep:meerkat-runtime"]
session-store = ["persistent-service", "dep:redb", "meerkat-store/redb"]
session-compaction = []

[lints]
workspace = true
