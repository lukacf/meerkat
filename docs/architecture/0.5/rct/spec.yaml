decisions:
  - id: DEC-001
    text: "Runtime ingress uses individually admitted inputs and runtime-authoritative multi-contributor staged runs."
    status: decided
    resolution_phase: 3
    affects: [REQ-004, REQ-005, TYPE-005, CONTRACT-004, CHOKE-004, E2E-002]
  - id: DEC-002
    text: "Runtime policy algebra is explicit at the machine boundary as InterruptPolicy, DrainPolicy, RoutingDisposition, queue discipline, and consume point while preserving the current policy table as the behavioral baseline."
    status: decided
    resolution_phase: 3
    affects: [REQ-007, TYPE-004, CONTRACT-016, INV-002, INV-003]
  - id: DEC-003
    text: "REST uses POST /sessions/{id}/external-events and JSON-RPC uses session/external_event as the canonical high-level external-event surfaces; low-level runtime admission remains authoritative and the legacy names are deleted after at most one early-adapter phase."
    status: decided
    resolution_phase: 8
    affects: [REQ-017, REQ-025, CONTRACT-010, CONTRACT-011, E2E-005, E2E-008]
  - id: DEC-004
    text: "There is no surviving subagent mechanism in 0.5: subagents are mobs, child-agent behavior routes through the mob control plane, and SubAgentManager is deleted."
    status: decided
    resolution_phase: 4
    affects: [REQ-012, CONTRACT-008, CHOKE-006, E2E-003]
  - id: DEC-005
    text: "WASM requires explicit runtime bootstrap, keeps one runtime-backed execution model, uses runtime-scoped browser-local tools, and enforces an explicit capability envelope."
    status: decided
    resolution_phase: 9
    affects: [REQ-019, TYPE-015, CONTRACT-013, CHOKE-013, E2E-007]

reqs:
  - id: REQ-001
    text: "The 0.5 architecture package and machine-spec bundle shall become in-repo authoritative, and no external planning or machine artifact bundle may remain the review/CI source of truth."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_execution_plan.md#Phase 1. Bring The Formal Bundle In-Repo"
      - "meerkat_0_5_implementation_plan.md#Epic A1. Move The 0.5 package into the repo"
  - id: REQ-002
    text: "Schema/codegen/verification tooling shall exist as real repo entrypoints with drift checks, TLC execution, and machine-kernel tests enforced by CI."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_machine_schema_workflow_spec.md#Code Generation Tooling"
      - "meerkat_machine_schema_workflow_spec.md#CI Gates"
      - "meerkat_0_5_implementation_plan.md#Epic A3. Make verification enforceable in CI"
  - id: REQ-003
    text: "Every canonical machine shall reach its required final implementation mode, explicit Rust owner, and explicit transition boundary; no canonical machine may ship in BoundaryRedesign."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_machine_formalization_strategy.md#Final 0.5 Machine Modes"
      - "meerkat_0_5_implementation_plan.md#Canonical Machine Owner Map"
      - "meerkat_0_5_execution_plan.md#Definition Of Done"
  - id: REQ-004
    text: "The ordinary runtime ingress taxonomy shall close over prompt, peer, external event, operation/lifecycle, and continuation work, with no surviving top-level Projected or SystemGenerated ingress family in 0.5."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_architecture_outline.md#Canonical Runtime Ingress Model"
      - "meerkat_0_5_architecture_outline.md#Landing Zone For Current Runtime Inputs"
      - "meerkat_0_5_implementation_plan.md#Epic B1. Finalize the runtime input taxonomy"
  - id: REQ-005
    text: "The boundary-receipt contribution model shall use individually admitted inputs and runtime-authoritative multi-contributor staged runs, and shall be explicit and tested across staging, replay, persistence, and recovery semantics."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_architecture_outline.md#Canonical Runtime Ingress Model"
      - "meerkat_0_5_implementation_plan.md#B1.4"
      - "meerkat_0_5_implementation_plan.md#B2.4"
  - id: REQ-006
    text: "Runtime authority commands shall remain on an explicit out-of-band control plane that preempts ordinary ingress and resolves completion/shutdown semantics exactly."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_architecture_outline.md#Control Plane"
      - "meerkat_host_mode_cutover_spec.md#Required Runtime APIs"
      - "meerkat_0_5_implementation_plan.md#B2.5"
  - id: REQ-007
    text: "Runtime admission and drain behavior shall be owned by an explicit policy algebra that makes urgency, routing, interruption, queue discipline, coalescing, supersession, and consume point testable without semantic drift from the accepted baseline."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_sm_nomenclature.md#Runtime-Specific Terms"
      - "meerkat_0_5_architecture_outline.md#Routing Semantics"
      - "meerkat_0_5_architecture_outline.md#Firm Runtime Policy Baseline"
      - "meerkat_0_5_implementation_plan.md#B1.3"
  - id: REQ-008
    text: "TurnExecutionMachine shall become the focused owner of one admitted run at a time, while host idle waiting, ingress draining, and multi-turn coordination move out of Agent and into runtime control."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_architecture_outline.md#TurnExecutionMachine"
      - "meerkat_0_5_architecture_outline.md#Firm TurnExecution Contract"
      - "meerkat_0_5_implementation_plan.md#Workstream D. Turn Execution Narrowing And Host-Mode Cutover"
  - id: REQ-009
    text: "PeerCommsMachine shall own trust/auth snapshots, normalization, request/response correlation, and reservation state while admitting actionable peer/event work exactly once into runtime."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_architecture_outline.md#PeerCommsMachine"
      - "meerkat_host_mode_cutover_spec.md#Final Owner Map"
      - "meerkat_0_5_implementation_plan.md#D1.2"
  - id: REQ-010
    text: "RuntimeCommsBridge shall replace host-loop ordinary execution ownership by using completion-aware runtime admission and reservation completion resolution."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_host_mode_cutover_spec.md#Canonical Replacement Bridge"
      - "meerkat_host_mode_cutover_spec.md#Interaction Reservation Contract"
      - "meerkat_0_5_implementation_plan.md#D1.1"
  - id: REQ-011
    text: "OpsLifecycleMachine shall become the shared authoritative async-operation lifecycle substrate for mob-backed child work and background async operations, with explicit runtime OperationInput admission."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_ops_lifecycle_seam_spec.md#Firm Decisions"
      - "meerkat_ops_lifecycle_seam_spec.md#Runtime Admission Contract"
      - "meerkat_0_5_implementation_plan.md#Workstream C. Shared Child-Agent Lifecycle Convergence"
  - id: REQ-012
    text: "There shall be no separate subagent mechanism in 0.5: child-agent UX routes through the mob control plane, `SubAgentManager` is deleted, and no authoritative SubagentResult-style lifecycle leakage remains through comms, transcript, or tool-result paths."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_ops_lifecycle_seam_spec.md#Comms And Mob Relationship"
      - "meerkat_ops_lifecycle_seam_spec.md#Required Deletions"
      - "meerkat_0_5_implementation_plan.md#C3.3"
  - id: REQ-013
    text: "MobActor shall be decomposed so lifecycle, flow execution, orchestration, topology, task-board, spawn policy, and supervision have the owners defined by the architecture package instead of one monolithic actor owner."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_architecture_outline.md#Firm MobActor Decomposition"
      - "meerkat_0_5_implementation_plan.md#Workstream E. Mob Convergence On Shared Substrates"
  - id: REQ-014
    text: "FlowRunMachine and MobOrchestratorMachine shall expose explicit durable truth and orchestration semantics for retries, dependency resolution, coordinator binding, pending spawns, topology revision, and supervisor activation."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_architecture_outline.md#FlowRunMachine"
      - "meerkat_0_5_implementation_plan.md#E3.1"
      - "meerkat_0_5_implementation_plan.md#E3.2"
  - id: REQ-015
    text: "ExternalToolSurfaceMachine shall own staged add/remove/reload lifecycle, pending activation/removal semantics, and one canonical outward typed delta/notice contract carrying target, operation, phase, persisted, and applied-at-turn fields."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_architecture_outline.md#ExternalToolSurfaceMachine"
      - "meerkat_0_5_architecture_outline.md#External Tools And MCP"
      - "meerkat_0_5_implementation_plan.md#F1.3"
  - id: REQ-016
    text: "Typed runtime/tool-surface notices shall be the authoritative machine-to-runtime interface, with transcript-visible synthetic notices reduced to derivative projections only."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_architecture_outline.md#External Tools And MCP"
      - "meerkat_0_5_architecture_outline.md#Effect Model"
      - "meerkat_0_5_implementation_plan.md#F2.1"
  - id: REQ-017
    text: "CLI, REST, and JSON-RPC shall route external-event or peer-driven ordinary work into runtime admission only, with `POST /sessions/{id}/external-events` and `session/external_event` as the canonical high-level REST and JSON-RPC external-event surfaces."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_surface_cutover_matrix.md#CLI"
      - "meerkat_surface_cutover_matrix.md#REST"
      - "meerkat_surface_cutover_matrix.md#JSON-RPC"
      - "meerkat_0_5_implementation_plan.md#G1.1"
      - "meerkat_0_5_implementation_plan.md#G1.2"
      - "meerkat_0_5_implementation_plan.md#G1.3"
  - id: REQ-018
    text: "The MCP server shall route meerkat_run and meerkat_resume through runtime-backed session admission plus completion waiting while keeping stable tool contracts unless a deliberate public change is recorded."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_surface_cutover_matrix.md#MCP Server"
      - "meerkat_0_5_implementation_plan.md#G1.4"
  - id: REQ-019
    text: "The browser/WASM surface shall use one runtime-backed execution path, with mandatory runtime bootstrap, direct-session handles reduced to façades over runtime-backed sessions, browser tool/event facilities moved under runtime-owned state, and unsupported capabilities rejected explicitly."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_architecture_outline.md#Firm WASM Decisions For 0.5"
      - "meerkat_surface_cutover_matrix.md#WASM"
      - "meerkat_0_5_implementation_plan.md#G2.1"
  - id: REQ-020
    text: "Python and TypeScript SDKs shall remain thin wrappers with regenerated bindings and no wrapper-local runtime semantics once server/browser contracts settle."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_surface_cutover_matrix.md#Python SDK"
      - "meerkat_surface_cutover_matrix.md#TypeScript SDK"
      - "meerkat_0_5_implementation_plan.md#G2.2"
      - "meerkat_0_5_implementation_plan.md#G2.3"
  - id: REQ-021
    text: "Runtime-backed embedding shall become the documented default in Rust docs/examples, with direct Agent entrypoints described only as expert execution APIs."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_architecture_outline.md#Rust SDK"
      - "meerkat_surface_cutover_matrix.md#Rust SDK"
      - "meerkat_0_5_implementation_plan.md#G3.1"
  - id: REQ-022
    text: "The final deletion ledger shall complete: no host-loop ordinary execution owner, no injector bypasses, no authoritative direct-session browser owner, no duplicate lifecycle stores, and no transcript-visible notices as the primary contract."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_execution_plan.md#Phase 7. Final Deletions"
      - "meerkat_0_5_implementation_plan.md#Phase Closure Deletion Ledger"
  - id: REQ-023
    text: "Every richer canonical machine shall expose one explicit generated transition boundary with owner tests and TLC/profile verification wired through repo commands."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_machine_formalization_strategy.md#Additional gates for clearing SchemaExtension"
      - "meerkat_0_5_implementation_plan.md#Advanced Machine-Authority Harness Plan"
  - id: REQ-024
    text: "Every canonical machine shall derive its authoritative implementation from the checked-in Rust-native machine/composition catalog and forbid shell mutation of machine state outside the generated kernel."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_machine_formalization_strategy.md#Additional gates for SchemaKernel"
      - "meerkat_machine_schema_workflow_spec.md#Final Authority Model"
      - "meerkat_0_5_implementation_plan.md#First Concrete Slice"
  - id: REQ-025
    text: "Any public wire or SDK-affecting change shall update contracts, generated bindings, docs/examples, and changelog material in the same slice, with compatibility adapters surviving at most one implementation phase after the replacement lands."
    priority: must
    decision_status: firm
    source_refs:
      - "meerkat_0_5_implementation_plan.md#Compatibility And Versioning Policy"
      - "meerkat_surface_cutover_matrix.md#Shared Cutover Rule"

types:
  - id: TYPE-001
    text: "MachineArtifactBundle for every canonical machine"
    fields:
      - { name: contract_md, type: "Path" }
      - { name: model_tla, type: "Path" }
      - { name: ci_cfg, type: "Path" }
      - { name: deep_cfg, type: "Path" }
      - { name: mapping_md, type: "Path" }
      - { name: generated_dir, type: "Path" }
  - id: TYPE-002
    text: "MachineMode enum"
    fields:
      - { name: variant, type: "SchemaKernel | SchemaExtension | BoundaryRedesign" }
  - id: TYPE-003
    text: "Canonical runtime input family"
    fields:
      - { name: prompt, type: "WorkInput::Prompt" }
      - { name: peer, type: "PeerInput" }
      - { name: external_event, type: "WorkInput::Event" }
      - { name: operation, type: "OperationInput" }
      - { name: continuation, type: "ContinuationInput or equivalent runtime primitive" }
  - id: TYPE-004
    text: "Runtime policy decision family"
    fields:
      - { name: interrupt_policy, type: "InterruptPolicy" }
      - { name: drain_policy, type: "DrainPolicy" }
      - { name: routing_disposition, type: "RoutingDisposition" }
      - { name: queue_discipline, type: "Fifo | Coalesce | Supersede | Priority | None" }
      - { name: consume_point, type: "OnAccept | OnApply | OnRunComplete | ExplicitAck" }
  - id: TYPE-005
    text: "Runtime-authoritative boundary receipt contribution model"
    fields:
      - { name: contributing_input_ids, type: "Vec<InputId>" }
      - { name: admission_model, type: "individual_inputs_only" }
      - { name: staging_model, type: "runtime_authoritative_batch" }
  - id: TYPE-006
    text: "Runtime control command and completion-wait family"
    fields:
      - { name: control_command, type: "RunControlCommand or equivalent" }
      - { name: completion_handle, type: "CompletionWaitHandle" }
  - id: TYPE-007
    text: "Async operation identity and registration family"
    fields:
      - { name: id, type: "OperationId" }
      - { name: kind, type: "OperationKind" }
      - { name: spec, type: "OperationSpec" }
  - id: TYPE-008
    text: "OperationPeerHandle"
    fields:
      - { name: peer_name, type: "String" }
      - { name: trusted_peer, type: "TrustedPeerSpec" }
  - id: TYPE-009
    text: "OperationProgressUpdate"
    fields:
      - { name: message, type: "String" }
      - { name: percent, type: "Option<f32>" }
  - id: TYPE-010
    text: "OperationTerminalOutcome"
    fields:
      - { name: variant, type: "Completed | Failed | Cancelled | Retired | Terminated" }
  - id: TYPE-011
    text: "OperationLifecycleSnapshot"
    fields:
      - { name: id, type: "OperationId" }
      - { name: status, type: "OperationStatus" }
      - { name: peer_ready, type: "bool" }
      - { name: terminal_outcome, type: "Option<OperationTerminalOutcome>" }
  - id: TYPE-012
    text: "OperationCompletionWatch"
    fields:
      - { name: resolves_exactly_once, type: "bool" }
      - { name: outcome, type: "OperationTerminalOutcome" }
  - id: TYPE-013
    text: "External tool surface delta"
    fields:
      - { name: target, type: "ToolTargetId or equivalent" }
      - { name: operation, type: "Add | Remove | Reload" }
      - { name: phase, type: "Pending | Applied | Draining | Forced | Failed" }
      - { name: persisted, type: "bool" }
      - { name: applied_at_turn, type: "Option<TurnId>" }
  - id: TYPE-014
    text: "Surface update notice"
    fields:
      - { name: source, type: "ExternalToolSurfaceMachine | RuntimeControlMachine" }
      - { name: notice_kind, type: "TypedNotice enum" }
  - id: TYPE-015
    text: "Browser runtime bootstrap state"
    fields:
      - { name: runtime_initialized, type: "bool" }
      - { name: runtime_handle, type: "RuntimeState or equivalent" }
      - { name: session_service, type: "EphemeralSessionService<FactoryAgentBuilder>" }
  - id: TYPE-016
    text: "Browser direct-session façade handle"
    fields:
      - { name: facade_handle, type: "u64 or JS number" }
      - { name: session_id, type: "SessionId" }
  - id: TYPE-017
    text: "External event payload family"
    fields:
      - { name: header, type: "InputHeader or transport header" }
      - { name: payload, type: "surface-specific external event body" }
  - id: TYPE-018
    text: "MCP run/resume envelope family"
    fields:
      - { name: method, type: "meerkat_run | meerkat_resume" }
      - { name: completion_wait, type: "runtime-backed wait contract" }
      - { name: callbacks, type: "tool/event callback payloads" }
  - id: TYPE-019
    text: "Machine verification command set"
    fields:
      - { name: codegen, type: "cargo xtask machine-codegen ..." }
      - { name: verify, type: "cargo xtask machine-verify ..." }
      - { name: drift, type: "cargo xtask machine-check-drift ..." }
  - id: TYPE-020
    text: "Generated kernel boundary"
    fields:
      - { name: state, type: "Closed State enum" }
      - { name: input, type: "Closed Input enum" }
      - { name: effect, type: "Closed Effect enum" }
      - { name: transition_fn, type: "step/apply/transition" }

contracts:
  - id: CONTRACT-001
    text: "Canonical machine artifact bundle contract: every machine carries contract.md, model.tla, ci.cfg, deep.cfg, mapping.md, and generated authority output refreshed from the Rust-native catalog."
    boundary: "repo_artifact_layout"
    type_id: TYPE-001
  - id: CONTRACT-002
    text: "Catalog-to-generated-artifacts contract: the Rust-native machine/composition catalog is authoritative and regenerates Rust kernels, contract outputs, and TLA artifacts without drift."
    boundary: "schema_codegen"
    type_id: TYPE-001
  - id: CONTRACT-003
    text: "Machine verification command contract: xtask and CI entrypoints cover generation drift, model checking, and Rust kernel tests."
    boundary: "developer_cli_and_ci"
    type_id: TYPE-019
  - id: CONTRACT-004
    text: "Runtime receipt/replay contract: accepted inputs, staged runs, lifecycle commits, and recovery preserve the chosen contribution model across memory/sqlite/redb and ephemeral/persistent drivers."
    boundary: "runtime_store_and_recovery"
    type_id: TYPE-005
  - id: CONTRACT-005
    text: "Runtime control-plane contract: authority commands remain out-of-band, preempt ordinary work, and resolve shutdown/completion semantics exactly once."
    boundary: "runtime_control_plane"
    type_id: TYPE-006
  - id: CONTRACT-006
    text: "Completion-aware comms admission contract: RuntimeCommsBridge uses accept_input_with_completion(...) and resolves reservations/subscribers via runtime completion handles."
    boundary: "comms_to_runtime"
    type_id: TYPE-006
  - id: CONTRACT-007
    text: "Shared child lifecycle contract: OpsLifecycleRegistry plus explicit Input::Operation(OperationInput) admission form the authoritative runtime lifecycle seam."
    boundary: "runtime_child_lifecycle"
    type_id: TYPE-007
  - id: CONTRACT-008
    text: "Child-agent public contract: any surviving helper-agent façade delegates lifecycle truth to mob control-plane operations plus the shared registry instead of owning terminal state itself."
    boundary: "child_agent_public_api"
    type_id: TYPE-007
  - id: CONTRACT-009
    text: "External tool outward contract: exactly one canonical typed lifecycle delta/notice contract with target, operation, phase, persisted, and applied-at-turn fields replaces the split McpLifecycleAction and ExternalToolNotice shapes."
    boundary: "tool_surface_to_runtime"
    type_id: TYPE-013
  - id: CONTRACT-010
    text: "REST external-event contract: the shipped route and payload admit runtime-backed external events without preserving an EventInjector execution path."
    boundary: "rest_public_api"
    type_id: TYPE-017
  - id: CONTRACT-011
    text: "JSON-RPC external-event contract: session/external_event admits runtime-backed external events without preserving a second runtime and event/push is deleted after at most one early-adapter phase."
    boundary: "rpc_public_api"
    type_id: TYPE-017
  - id: CONTRACT-012
    text: "MCP server run/resume contract: meerkat_run and meerkat_resume become runtime-backed create/admit/wait flows while preserving stable tool-level behavior."
    boundary: "mcp_public_api"
    type_id: TYPE-018
  - id: CONTRACT-013
    text: "Browser runtime contract: mandatory runtime bootstrap, session-handle façade mapping, event admission, runtime-scoped browser tool registration, and explicit capability gating replace the direct browser execution subsystem."
    boundary: "wasm_browser_api"
    type_id: TYPE-015
  - id: CONTRACT-014
    text: "SDK parity contract: generated Python and TypeScript bindings track canonical backend/browser contracts without SDK-local semantic forks."
    boundary: "sdk_codegen_and_wrappers"
    type_id: TYPE-017
  - id: CONTRACT-015
    text: "Public change propagation contract: wire-shape changes update meercat-contracts or public schemas, generated bindings, docs/examples, and changelog in the same slice."
    boundary: "release_artifact_propagation"
    type_id: TYPE-017
  - id: CONTRACT-016
    text: "Machine-authority anti-drift contract: runtime semantic changes must update the authoritative machine definitions, verification, and companion docs together instead of drifting silently from the accepted baseline."
    boundary: "machine_authority_and_drift"
    type_id: TYPE-004

chokepoints:
  - id: CHOKE-001
    text: "Surface and bridge producers -> RuntimeSessionAdapter admission"
    from: "CLI/REST/RPC/MCP/WASM/bridge adapters"
    to: "RuntimeSessionAdapter accept_input / accept_input_with_completion"
    data: "typed runtime admission candidates"
  - id: CHOKE-002
    text: "RuntimeControlMachine -> RuntimeIngressMachine"
    from: "Runtime control/admission"
    to: "Runtime ingress queue and sequencing"
    data: "accepted ingress items plus policy metadata"
  - id: CHOKE-003
    text: "RuntimeIngressMachine -> TurnExecutionMachine"
    from: "runtime drain snapshot"
    to: "RunPrimitive / run-context execution"
    data: "admitted work routed to one run"
  - id: CHOKE-004
    text: "Runtime control and drivers -> stores / ledger recovery"
    from: "Runtime loop and drivers"
    to: "InputLedger + RuntimeStore + receipt persistence"
    data: "boundary receipts, lifecycle commits, replay state"
  - id: CHOKE-005
    text: "PeerCommsMachine -> RuntimeCommsBridge -> runtime completion resolution"
    from: "peer normalization and reservation ownership"
    to: "runtime admission and completion callbacks"
    data: "normalized peer inputs, opaque reservation keys, completion outcomes"
  - id: CHOKE-006
    text: "Mob control plane and helper-agent compatibility surfaces -> OpsLifecycleRegistry"
    from: "mob orchestration entrypoints plus any temporary helper-agent compatibility helpers"
    to: "shared registry"
    data: "register/progress/complete/fail/cancel/watch lifecycle calls"
  - id: CHOKE-007
    text: "Mob provisioner/ops adapter -> OpsLifecycleRegistry"
    from: "mob provisioning and member orchestration"
    to: "shared registry"
    data: "mob-member lifecycle events"
  - id: CHOKE-008
    text: "OpsLifecycleRegistry -> runtime admission"
    from: "typed lifecycle owner"
    to: "Input::Operation(OperationInput)"
    data: "OpEvent + child identity"
  - id: CHOKE-009
    text: "Mob actor shell -> lifecycle/kernel/service owners"
    from: "actor/builder/provisioner shell"
    to: "MobLifecycleMachine, FlowRunMachine, MobOrchestratorMachine, topology/task-board/supervision services"
    data: "orchestration commands, pending-spawn state, flow/run state"
  - id: CHOKE-010
    text: "McpRouter -> adapter -> gateway -> runtime/agent notice projections"
    from: "external tool surface owner"
    to: "runtime/agent consumers and UI projections"
    data: "typed deltas and typed notices"
  - id: CHOKE-011
    text: "CLI/REST/RPC handlers -> runtime external-event admission"
    from: "surface-specific ingress handlers"
    to: "runtime canonical external-event path"
    data: "external event payloads and headers"
  - id: CHOKE-012
    text: "MCP server tools -> runtime admission + completion wait"
    from: "meerkat_run / meerkat_resume"
    to: "runtime-backed create/admit/wait path"
    data: "tool call envelopes and runtime completion results"
  - id: CHOKE-013
    text: "WASM/TS browser wrappers -> runtime bootstrap and façade handles"
    from: "browser-facing wrappers and wasm exports"
    to: "runtime-backed session/event/tool state"
    data: "bootstrap state, façade handles, event streams, browser tool deltas"
  - id: CHOKE-014
    text: "Public contract changes -> generated bindings and docs"
    from: "backend/browser schema changes"
    to: "Python/TS generated types, docs, examples, changelog"
    data: "regenerated public contracts"

invariants:
  - id: INV-001
    text: "There is exactly one canonical ordinary runtime admission/execution path per session/runtime instance."
  - id: INV-002
    text: "Accepted ordinary work is normalized and admitted at most once, with global order assigned at runtime admission rather than by producer-local send order."
  - id: INV-003
    text: "Control-plane commands are not FIFO-ordered with ordinary ingress and preempt ordinary work and cooperative suspension."
  - id: INV-004
    text: "Runtime ingress draining uses one FIFO queue and does not selectively dequeue by class."
  - id: INV-005
    text: "Every temporal concern has one authoritative owner; duplicated mutable state requires a written justification and named owner."
  - id: INV-006
    text: "Transcript-visible notices, tool-result summaries, and UI summaries are derivative projections rather than authoritative lifecycle/runtime state."
  - id: INV-007
    text: "Mob-backed child work and background async operations share one authoritative ops-lifecycle owner."
  - id: INV-008
    text: "Shell code may not mutate machine state outside the generated kernel sourced from the Rust-native authority catalog."
  - id: INV-009
    text: "Compatibility façades may remain only as early adapters and for at most one implementation phase after the runtime-backed replacement lands."
  - id: INV-010
    text: "No canonical machine may remain in BoundaryRedesign at the end of 0.5."
  - id: INV-011
    text: "SDK wrappers and browser helper layers own no independent runtime semantics."
  - id: INV-012
    text: "Projected does not survive as a top-level 0.5 ingress family, and runtime semantic changes must update authoritative machine definitions and verification together."

e2e:
  - id: E2E-001
    text: "Developer edits a machine schema or model artifact and repo verification catches drift until artifacts are regenerated and kernel tests/model checks pass."
    steps:
      - "Modify a machine schema or generated output under the checked-in machine bundle."
      - "Run repo verification commands and observe drift/model/test failure."
      - "Regenerate artifacts and rerun verification until clean."
  - id: E2E-002
    text: "A runtime recovers after staged/admitted work and preserves the chosen receipt contribution model across replay and persistence backends."
    steps:
      - "Admit work into a runtime backed by memory, sqlite, or redb."
      - "Apply boundary receipts and lifecycle commits."
      - "Recover the runtime and prove replay/recovery semantics match the chosen contributor model."
  - id: E2E-003
    text: "A parent session starts a mob-backed helper agent, receives progress and terminal outcome through the shared registry, and resolves wait/subscriber behavior without comms owning child completion truth."
    steps:
      - "Create or reuse a mob and add a helper member."
      - "Observe progress and peer-ready transitions."
      - "Complete/fail/cancel the child and resolve the parent wait/subscriber path."
  - id: E2E-004
    text: "A mob creates members, runs a flow with dependencies and retries, survives orchestration events, and persists durable run truth through the decomposed owners."
    steps:
      - "Create a mob with orchestrator, lifecycle, and flow owners."
      - "Dispatch a flow with dependencies and retries."
      - "Stop, resume, or fail orchestration and prove durable run truth and shared lifecycle state remain coherent."
  - id: E2E-005
    text: "CLI, REST, and JSON-RPC inject external events while idle, mid-run, and resumed, and all ordinary work reaches execution only through runtime admission."
    steps:
      - "Create or resume a session through each server surface."
      - "Inject an external event while idle and while a run is active."
      - "Observe runtime-owned admission, execution, and completion behavior with no injector side path."
  - id: E2E-006
    text: "The MCP server executes run/resume through runtime-backed admission and completion waiting while live tool-surface changes continue to emit typed notices/deltas."
    steps:
      - "Invoke meerkat_run or meerkat_resume."
      - "Wait on runtime-backed completion."
      - "Mutate the external tool surface during the session and observe typed notice flow."
  - id: E2E-007
    text: "A browser caller explicitly bootstraps runtime state, creates a façade session, turns, emits events, and registers/unregisters browser tools without any second browser execution owner."
    steps:
      - "Initialize browser runtime state explicitly."
      - "Create a direct-session façade backed by a real SessionId."
      - "Run turn, external event, and browser tool registration flows through runtime-backed state."
  - id: E2E-008
    text: "A public wire change propagates through canonical schemas/contracts, Python and TypeScript bindings, docs/examples, and changelog artifacts in one slice."
    steps:
      - "Change a public runtime or surface contract."
      - "Regenerate schemas and bindings."
      - "Update docs/examples/changelog in the same change."
  - id: E2E-009
    text: "The final release gate passes with one runtime path, all canonical machines verified in their final modes, every surface green, and the deletion ledger complete."
    steps:
      - "Run full machine verification and surface smoke."
      - "Verify no canonical machine remains in BoundaryRedesign."
      - "Verify the deletion ledger and release checklist are complete."
