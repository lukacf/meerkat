[package]
name = "meerkat-store"
description = "Session persistence for Meerkat"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
meerkat-core = { workspace = true }
meerkat-schedule = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
sha2 = { workspace = true }
chrono = { workspace = true }

[target.'cfg(all(not(target_arch = "wasm32"), not(target_os = "espidf")))'.dependencies]
tokio = { workspace = true }
redb = { workspace = true, optional = true }
rusqlite = { workspace = true, optional = true }
dirs = { workspace = true }

[target.'cfg(target_os = "espidf")'.dependencies]
tokio = { version = "1.43", default-features = false, features = ["fs", "io-util", "sync"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
tokio_with_wasm = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["test-util", "macros"] }
toml = { workspace = true }

[features]
default = ["jsonl", "memory", "redb"]
jsonl = []
memory = []
sqlite = ["dep:rusqlite"]
redb = ["dep:redb"]

[package.metadata.cargo-machete]
ignored = ["toml"]  # dev-dependency used in tests

[lints]
workspace = true
