[package]
name = "meerkat-mcp-server"
description = "MCP server exposing Meerkat as a tool"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true

[[bin]]
name = "rkat-mcp"
path = "src/main.rs"

[[test]]
name = "live_mcp_matrix"
path = "tests/live_mcp_matrix.rs"

[dependencies]
meerkat = { workspace = true, features = ["anthropic", "openai", "openai-realtime", "gemini", "jsonl-store", "session-store", "memory-store", "skills", "schedule"] }
meerkat-mcp = { workspace = true }
meerkat-core = { workspace = true }
meerkat-contracts = { workspace = true, features = ["schema"] }
meerkat-client = { workspace = true }
meerkat-store = { workspace = true }
meerkat-mob = { workspace = true, optional = true }
meerkat-mob-mcp = { workspace = true, optional = true }
meerkat-tools = { workspace = true }
meerkat-comms = { workspace = true, optional = true }
meerkat-runtime = { workspace = true }
async-trait = { workspace = true }
rmcp = { workspace = true, features = ["server", "transport-streamable-http-server"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }
tracing = { workspace = true }
schemars = { workspace = true }
dirs = { workspace = true }
clap = { workspace = true, features = ["derive"] }
chrono = { workspace = true }

[features]
default = ["comms", "schedule"]
comms = ["meerkat/comms", "dep:meerkat-comms"]
mob = ["dep:meerkat-mob", "dep:meerkat-mob-mcp"]
schedule = ["meerkat/schedule"]

[package.metadata.cargo-machete]
ignored = ["dirs", "meerkat-client", "meerkat-comms", "meerkat-mcp", "meerkat-mob", "meerkat-mob-mcp", "meerkat-runtime", "rmcp"]  # feature-gated / optional

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
