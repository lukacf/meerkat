[package]
name = "meerkat-web-runtime"
publish = false
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
flate2 = "1.0"
tar = "0.4"
toml = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
meerkat-models = { workspace = true }
meerkat-core = { workspace = true, features = ["jsonschema"] }
# Direct dep needed for `ExternalAuthResolverHandle` trait + `ValidatedBinding`
# so the WASM external-auth bridge (`external_auth::WasmExternalAuthResolver`)
# can implement the trait the provider runtime registry looks up. §6.14
# deleted the direct Anthropic/OpenAI/Gemini *client* constructors, but the
# resolver seam is a new, legitimate use.
meerkat-providers = { workspace = true, features = ["anthropic", "openai", "gemini", "oauth"] }
meerkat-store = { workspace = true, features = ["memory"] }
meerkat-tools = { workspace = true, default-features = false }
meerkat-session = { workspace = true }
meerkat-hooks = { workspace = true }
meerkat-comms = { workspace = true }
meerkat-mob = { workspace = true }
meerkat-mob-mcp = { workspace = true }
meerkat = { workspace = true, features = ["comms", "memory-store", "anthropic", "openai", "gemini"] }
async-trait = { workspace = true }
futures = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true, features = ["sync"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
tokio_with_wasm = { workspace = true }
getrandom = { version = "0.3", features = ["wasm_js"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream"] }
tracing-wasm = "0.2"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[package.metadata.cargo-machete]
ignored = [
    "async-trait",             # proc macro
    "futures",                 # used via re-exports
    "getrandom",               # cfg(target_arch = "wasm32")
    "js-sys",                  # cfg(target_arch = "wasm32")
    "meerkat-comms",           # wired into session config
    "meerkat-hooks",           # wired into agent builder
    "meerkat-session",         # wired into agent builder
    "reqwest",                 # cfg(target_arch = "wasm32")
    "tracing",                 # logging macros
    "wasm-bindgen-futures",    # wasm async runtime adapter
]

[lints]
workspace = true
