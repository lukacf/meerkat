# Nextest configuration for meerkat-0.6-cleanups.
#
# Retry policy is scoped narrowly: the two known pre-existing flakes are
# retried once, everything else runs to completion without retries.

[[profile.default.overrides]]
# D4 / issue #260: provider_tool_use_boundary race. Reduced from ~20% to ~10%
# by drain-and-clear-dirty logic; full elimination blocked on deeper
# runtime-append synchronization work.
filter = 'test(provider_tool_use_boundary_does_not_surface_public_turn_completed_or_flush_canonical_output)'
retries = 2

[[profile.default.overrides]]
# Pre-existing pending-spawn alignment race in concurrent-spawn orchestration.
# Observed historically and by actor-cutover-3 during T5-prep. Not a
# regression introduced by this PR; retries until we land a targeted fix.
filter = 'test(test_concurrent_spawns_parallelize_provisioning)'
retries = 2

# W2-E (#264): the two retries that used to sit here for
# `audio_input_uses_product_session_factory_and_streams_provider_events`
# and `product_session_tool_call_routes_through_session_service_and_continues_provider`
# are gone. The underlying two-read race on `session.state.updated_at`
# between the consumer snapshot and the refresh task's baseline read has
# been eliminated: the realtime socket now reads its baseline atomically
# from the session's DSL-owned `SessionContextHandle` (the same authority
# the DSL emits `SessionContextAdvanced` from), so the consumer and the
# effect stream agree on the frontier by construction.

[[profile.default.overrides]]
# smoke-fixes Cluster F: s44 reviewer retrieval of the staged `[TS-SWARM]`
# system-context marker is subject to gpt-5.4 referential variance when
# the reviewer's system prompt also contains identifier-like strings
# (mob_id, peer_name, peer_id). Diagnostic `tracing::debug!` instrumentation
# on `take_pending_system_context_boundary` proved the production plumbing
# delivers the marker end-to-end; 3 unit tests in
# `meerkat-session/tests/ephemeral_contract.rs` + s40 Python smoke on the
# same code path confirm the mechanism. The reviewer model was upgraded
# from gpt-5.4-mini to gpt-5.4 (see `reviewerModel()` helper in
# `sdks/typescript/tests/e2e_smoke.test.mjs`) which lifted the first-pass
# rate from 0% to ~60%; retries absorb the residual model-variance so CI
# stays deterministic. Precedent: the two retry=2 overrides above for
# `provider_tool_use_boundary` and `test_concurrent_spawns_parallelize_provisioning`.
filter = 'test(e2e_smoke_s44_typescript_sdk_mixed_provider_swarm_probe)'
retries = 2
