[package]
name = "mdm-tux"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]

[[bin]]
name = "target"
path = "src/bin/target.rs"

[[bin]]
name = "tux"
path = "src/bin/tux.rs"

[dependencies]
meerkat       = { path = "../../meerkat", features = ["comms", "jsonl-store", "session-store"] }
meerkat-core  = { path = "../../meerkat-core" }
meerkat-comms = { path = "../../meerkat-comms" }
meerkat-tools   = { path = "../../meerkat-tools" }
meerkat-runtime = { path = "../../meerkat-runtime" }
meerkat-session = { path = "../../meerkat-session", features = ["session-store"] }
meerkat-store = { path = "../../meerkat-store", features = ["jsonl"] }
futures       = "0.3"
async-trait   = "0.1"
chrono        = "0.4"
tokio         = { version = "1", features = ["full"] }
serde         = { version = "1", features = ["derive"] }
serde_json    = "1"
toml          = "0.8"
ratatui       = "0.30"
tui-markdown  = { version = "0.3", default-features = false }
crossterm     = "0.29"
anyhow        = "1"
dirs          = "5"
gethostname   = "1"
parking_lot   = "0.12"
tracing       = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
