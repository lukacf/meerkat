version: 1
initiative: ROW-22
title: One-PR Typed Modeled-Kernel and Typed Composition/Flow Migration
dogma_doc: docs/architecture/meerkat-runtime-dogma.md
architecture_skill: /Users/luka/src/meerkat/.claude/skills/meerkat-architecture/SKILL.md
process_skill: /Users/luka/.codex/skills/rct-lite/SKILL.md
summary: >
  Remove the modeled-kernel string/map escape hatch by migrating all row-22 machines,
  compositions, compat flows, and generated Rust artifacts to typed Rust boundaries while
  preserving existing DSL and TLA semantics.
scope:
  canonical_machines:
    - MeerkatMachine
    - MobMachine
    - ScheduleLifecycleMachine
    - OccurrenceLifecycleMachine
    - AuthMachine
  compat_machines:
    - flow_run
    - flow_frame
    - loop_iteration
  canonical_compositions:
    - meerkat_mob_seam
    - schedule_bundle
    - schedule_runtime_bundle
    - schedule_mob_bundle
  generated_consumers:
    - meerkat-machine-kernels::generated::*
    - meerkat-core/src/generated/*
    - meerkat-mcp/src/generated/*
    - meerkat-mob/src/generated/*
    - meerkat-mob/src/generated/flow_frame_loop_driver.rs
requirements:
  - id: TYPE-001
    class: TYPE
    must: true
    statement: >
      Every generated machine module for all five canonical and three compat machines exposes
      typed public items for State, Phase, Input, InputKind, Effect, EffectKind, TransitionId,
      GuardId, HelperId, Outcome, TransitionError, TransitionRefusal, KernelError, Context,
      EmptyContext, initial_state(), transition(), and helpers::*, plus Signal, SignalKind, and
      transition_signal() when the machine defines signals.
    acceptance:
      - render_contracts inventory proves all eight typed machine modules render
      - compile-fail fixtures prove legacy public kernel types are not exported for row scope
  - id: TYPE-002
    class: TYPE
    must: true
    statement: >
      Generated machine State is a flat typed struct with a typed Phase field and typed named
      fields, never a string phase or string-keyed fields map.
    acceptance:
      - trybuild fixture typed_state_has_no_fields_map.rs passes
      - parity and compat tests compare typed State values directly
  - id: TYPE-003
    class: TYPE
    must: true
    statement: >
      Generated Input, Signal, and Effect surfaces are typed enums with typed payload structs and
      payloadless InputKind, SignalKind, and EffectKind discriminants.
    acceptance:
      - render_contracts pin the enum surface and discriminants
      - protocol tests assert typed payload structs instead of string fields
  - id: TYPE-004
    class: TYPE
    must: true
    statement: >
      Helper dispatch is emitted as direct generated helper functions under helpers::* with
      HelperId reserved for diagnostics only; there is no public helper_name string dispatcher.
    acceptance:
      - trybuild fixture helper_string_dispatch_absent.rs passes
      - helper graph validation proves canonical and compat helper graphs are acyclic
  - id: TYPE-005
    class: TYPE
    must: true
    statement: >
      Outcome, refusal, and runtime errors use the typed row-22 structure with TransitionId,
      GuardId, HelperId, Phase, InputKind, and SignalKind rather than raw strings.
    acceptance:
      - render_contracts pin typed error/outcome signatures
      - canonical parity tests compare refusal classification exactly
  - id: TYPE-006
    class: TYPE
    must: true
    statement: >
      Generated composition routes and obligation protocols are typed consumer-local modules with
      route-specific translator functions, typed obligations, typed consumer triggers, and
      per-route or per-protocol context traits when needed.
    acceptance:
      - all four canonical composition helper tests pass
      - direct round-trip protocol tests pass
  - id: TYPE-007
    class: TYPE
    must: true
    statement: >
      The generated flow_frame_loop_driver remains consumer-local in meerkat-mob and is fully
      typed against compat machine modules and typed composition helpers.
    acceptance:
      - render_contracts pin the typed driver output
      - compat-flow functional suites pass without KernelState, KernelInput, or KernelValue
  - id: TYPE-008
    class: TYPE
    must: true
    statement: >
      No new opaque or JSON-like replacement for KernelValue is introduced in row-22; all
      generated field, input, signal, and effect types stay within the existing schema type space
      and implement Eq.
    acceptance:
      - schema/codegen validation rejects non-Eq generated types
      - persistence and CAS tests compare typed equality directly
  - id: CONTRACT-001
    class: CONTRACT
    must: true
    statement: >
      Generated transition entrypoints use the uniform typed signatures transition(state, input,
      context) and transition_signal(state, signal, context), with generated per-machine Context
      traits and initial_state() derived only from schema init declarations.
    acceptance:
      - render_contracts pin the exact public signatures
      - compile-fail fixtures reject string identity entrypoints
  - id: CONTRACT-002
    class: CONTRACT
    must: true
    statement: >
      Composition codegen remains consumer-crate local and emits one typed translator per route
      plus typed accept/submit protocol helpers where the protocol is obligation-based.
    acceptance:
      - composition helper tests pass in meerkat-core, meerkat-mcp, and meerkat-mob
      - no generated consumer module references legacy Kernel* public types in row scope
  - id: CONTRACT-003
    class: CONTRACT
    must: true
    statement: >
      The existing generic interpreter and legacy Kernel* support types move behind the
      non-default meerkat-machine-kernels/test-oracle feature and are exposed only under
      meerkat_machine_kernels::test_oracle::* for tests and dev-dependencies.
    acceptance:
      - trybuild fixture legacy_kernel_types_not_exported.rs passes
      - compat oracle tests use test_oracle::* rather than crate-root Kernel* APIs
  - id: CONTRACT-004
    class: CONTRACT
    must: true
    statement: >
      Public row-22 generated APIs never expose helper_name string dispatch, phase.as_str(),
      effect.variant, or state.fields.get(...) for semantic decisions.
    acceptance:
      - xtask AST audit passes
      - generated surface scans confirm row-scope artifacts do not mention legacy Kernel* types
  - id: CONTRACT-005
    class: CONTRACT
    must: true
    statement: >
      Persistence and recovery paths perform a hard schema cut to version 5 for compat flow state,
      reject older active snapshots with typed unsupported-schema errors, and do not auto-migrate.
    acceptance:
      - persistence rejection tests pass
      - release notes call out the hard cut explicitly
  - id: INV-001
    class: INV
    must: true
    statement: Semantic identity is typed end-to-end in row scope; no raw string folklore remains.
    acceptance:
      - AST audit enforces row-scope bans
      - canonical and compat tests consume typed identities only
  - id: INV-002
    class: INV
    must: true
    statement: Helper dependency graphs are topologically ordered and helper cycles are rejected.
    acceptance:
      - helper graph validation test passes for all canonical and compat machines
  - id: INV-003
    class: INV
    must: true
    statement: No public error in row scope exposes semantic identity as raw strings.
    acceptance:
      - render_contracts pin typed error shapes
      - parity suites assert typed refusal/error discrimination
  - id: INV-004
    class: INV
    must: true
    statement: CAS semantics compare typed deserialized state by derived Eq, never serialized bytes.
    acceptance:
      - sqlite_cas_flow_state_uses_typed_eq passes
      - sqlite_cas_frame_state_uses_typed_eq passes
      - sqlite_cas_loop_state_uses_typed_eq passes
  - id: INV-005
    class: INV
    must: true
    statement: Pre-row-22 active compat snapshots fail loudly on load or resume until archived or dropped.
    acceptance:
      - decode_pre_row22_run_state_is_rejected passes
      - recovery_rejects_pre_row22_active_run passes
  - id: INV-006
    class: INV
    must: true
    statement: DSL and TLA semantics are unchanged; the migration is strictly a typed Rust boundary cut.
    acceptance:
      - local machine-verify stats diff reports no drift
      - canonical parity and compat oracle suites still match schema truth
  - id: CHOKE-001
    class: CHOKE
    must: true
    statement: Schema catalog -> codegen renderer -> typed machine module output remains coherent.
    acceptance:
      - render_contracts cover all eight machine modules
      - make machine-codegen succeeds after migration
  - id: CHOKE-002
    class: CHOKE
    must: true
    statement: Schema compositions -> consumer-local codegen -> typed route/protocol helpers remain coherent.
    acceptance:
      - render_contracts cover all four composition modules and the flow driver
      - generated helper round-trip tests pass
  - id: CHOKE-003
    class: CHOKE
    must: true
    statement: Canonical owner-side runtime authorities remain semantically identical to typed modeled-kernel output.
    acceptance:
      - all five canonical parity suites compare next_state, effects, and refusal classification exactly
  - id: CHOKE-004
    class: CHOKE
    must: true
    statement: Compat typed generators preserve schema semantics against the test-oracle interpreter.
    acceptance:
      - all five compat oracle/helper suites pass
  - id: CHOKE-005
    class: CHOKE
    must: true
    statement: Flow-frame loop runtime, store, recovery, and persistence paths consume typed compat state and typed generated helpers.
    acceptance:
      - migrated compat-flow functional suites pass
      - recovery and CAS tests pass with schema version 5 snapshots
  - id: CHOKE-006
    class: CHOKE
    must: true
    statement: Row-22 relapse detection is AST-based and guards the row-scoped code against stringly regressions.
    acceptance:
      - xtask row-22 audit passes
      - machines_contracts coverage includes the new visitor and contract assertions
  - id: E2E-001
    class: E2E
    must: true
    statement: The tests-first targeted cargo batches go red before implementation and green after implementation.
    acceptance:
      - targeted batch output is recorded for band A and band B
  - id: E2E-002
    class: E2E
    must: true
    statement: The final full workspace gate passes after cleanup and release-note updates.
    acceptance:
      - full acceptance command set is green
  - id: E2E-003
    class: E2E
    must: true
    statement: The two-worktree TLC stats comparison reports no drift between main and the feature worktree.
    acceptance:
      - compare-machine-verify-stats script exits zero and emits matching JSON stats
assumptions:
  - DSL syntax and TLA semantics do not change in row-22.
  - The term "modeled kernel" stays in docs and comments touched by this work.
  - Row-22 is a lockstep workspace release cut, not an independent semver maneuver.
  - Operators archive or drop pre-row-22 compat rows before upgrading.
