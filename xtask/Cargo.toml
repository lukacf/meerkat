[package]
name = "xtask"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true

[lib]
[[bin]]
name = "xtask"
path = "src/main.rs"

[features]
default = []
machine-authority = ["dep:meerkat-machine-codegen", "dep:which"]

[dependencies]
anyhow.workspace = true
clap.workspace = true
proc-macro2 = { version = "1", features = ["span-locations"] }
quote = "1"
serde.workspace = true
serde_json.workspace = true
syn = { version = "2", features = ["full", "visit"] }
toml.workspace = true
which = { workspace = true, optional = true }
meerkat-machine-codegen = { path = "../meerkat-machine-codegen", optional = true }
meerkat-machine-schema = { path = "../meerkat-machine-schema" }

[dev-dependencies]
tempfile.workspace = true

[[test]]
name = "machines_contracts"
path = "tests/machines_contracts.rs"
required-features = ["machine-authority"]

[lints]
workspace = true
