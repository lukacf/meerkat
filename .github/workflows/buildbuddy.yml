name: BuildBuddy CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
    inputs:
      mode:
        description: BuildBuddy gate to run
        required: false
        default: full-fresh
        type: string
      changed_mode:
        description: Changed-path selector breadth
        required: false
        default: owned
        type: string
      base:
        description: Base revision for changed-committed mode
        required: false
        default: origin/main
        type: string
      paths:
        description: Whitespace or newline separated paths for changed-paths mode
        required: false
        default: ""
        type: string
    secrets:
      BUILDBUDDY_API_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: false
      RKAT_ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      RKAT_OPENAI_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      RKAT_GEMINI_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      mode:
        description: BuildBuddy gate to run
        required: true
        default: full-fresh
        type: choice
        options:
          - full-fresh
          - full-warm
          - workspace-fresh
          - workspace-warm
          - e2e-system
          - changed-committed
          - changed-paths
      changed_mode:
        description: Changed-path selector breadth
        required: true
        default: owned
        type: choice
        options:
          - owned
          - affected
      base:
        description: Base revision for changed-committed mode
        required: false
        default: origin/main
        type: string
      paths:
        description: Whitespace or newline separated paths for changed-paths mode
        required: false
        type: string

permissions:
  contents: read

env:
  CARGO_HOME: /tmp/meerkat-cargo-home

jobs:
  macos-arm64-rbe:
    name: macOS arm64 RBE CI
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (vars.MEERKAT_BUILDBUDDY_CI == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) }}
    runs-on: ubuntu-latest
    env:
      BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RKAT_ANTHROPIC_API_KEY: ${{ secrets.RKAT_ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RKAT_OPENAI_API_KEY: ${{ secrets.RKAT_OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RKAT_GEMINI_API_KEY: ${{ secrets.RKAT_GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      MEERKAT_CLEAN_E2E_SCENARIO_TARGETS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: buildbuddy

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,wasm-pack,cargo-deny,cargo-machete

      - name: Install TLC
        run: |
          mkdir -p $HOME/.local/lib $HOME/.local/bin
          curl -sL -o $HOME/.local/lib/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
          printf '#!/bin/sh\njava -jar %s/tla2tools.jar "$@"\n' "$HOME/.local/lib" > $HOME/.local/bin/tlc
          chmod +x $HOME/.local/bin/tlc
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Require BuildBuddy API key
        run: |
          if [[ -z "${BUILDBUDDY_API_KEY}" ]]; then
            echo "BUILDBUDDY_API_KEY secret is required for the optional BuildBuddy workflow." >&2
            exit 1
          fi

      - name: Install pinned BuildBuddy CLI
        run: |
          bb_bin="$(scripts/install-buildbuddy-cli --dir "${RUNNER_TEMP}/buildbuddy-cli")"
          echo "$(dirname "${bb_bin}")" >> "${GITHUB_PATH}"

      - name: BuildBuddy doctor
        run: make buildbuddy-doctor

      - name: Remote gate
        env:
          MEERKAT_BUILDBUDDY_CI_MODE: ${{ inputs.mode }}
          MEERKAT_BUILDBUDDY_CHANGED_MODE: ${{ inputs.changed_mode || vars.MEERKAT_BUILDBUDDY_CHANGED_MODE || 'owned' }}
          MEERKAT_BUILDBUDDY_BASE: ${{ inputs.base || vars.MEERKAT_BUILDBUDDY_BASE || 'origin/main' }}
          MEERKAT_BUILDBUDDY_CHANGED_PATHS: ${{ inputs.paths || vars.MEERKAT_BUILDBUDDY_CHANGED_PATHS || '' }}
          MEERKAT_BUILDBUDDY_LOG_ROOT: ${{ runner.temp }}/buildbuddy-logs
        run: |
          set -o pipefail
          mkdir -p "${MEERKAT_BUILDBUDDY_LOG_ROOT}"
          export MEERKAT_BUILDBUDDY_CI_MODE="${MEERKAT_BUILDBUDDY_CI_MODE:-${{ vars.MEERKAT_BUILDBUDDY_CI_MODE || 'full-fresh' }}}"
          scripts/buildbuddy-ci-dispatch 2>&1 | tee "${MEERKAT_BUILDBUDDY_LOG_ROOT}/dispatch.log"

      - name: Upload BuildBuddy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildbuddy-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/buildbuddy-logs
          if-no-files-found: ignore
