name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release_packages:
        description: "Publish Rust/Python/TypeScript artifacts to registries"
        required: false
        default: false
        type: boolean
      registry_dry_run:
        description: "Run registry publish steps in dry-run mode"
        required: false
        default: false
        type: boolean
      alpha_crates_only:
        description: "Canary lane: publish Rust crates only, skipping SDK packages, binaries, GitHub release assets, and Homebrew"
        required: false
        default: false
        type: boolean
      publish_web_sdk_only:
        description: "Recovery lane: publish only @rkat/web and skip already-published registry artifacts"
        required: false
        default: false
        type: boolean
      web_sdk_artifact_run_id:
        description: "Recovery lane: existing workflow run id containing the rkat-web-package artifact"
        required: false
        default: ""
        type: string
      publish_release_assets_only:
        description: "Recovery lane: build surface binaries and publish GitHub release assets only"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag for recovery lanes, for example v0.6.1"
        required: false
        default: ""
        type: string
      release_backend:
        description: "Release backend for validation and binary builds"
        required: false
        default: github-hosted
        type: choice
        options:
          - github-hosted
          - buildbuddy

permissions:
  actions: read
  checks: read
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  MEERKAT_RELEASE_BUILDBUDDY: ${{ vars.MEERKAT_RELEASE_BUILDBUDDY || 'false' }}

# Required GitHub Actions secrets for full release:
#   CARGO_REGISTRY_TOKEN  - crates.io API token
#   PYPI_API_TOKEN        - PyPI API token (scoped to meerkat-sdk package)
#   NPM_TOKEN             - npm access token (scoped to @meerkat org or publish)
#   BUILDBUDDY_API_KEY    - optional owner-only BuildBuddy binary recovery path

jobs:
  require_ci_green:
    name: Require green CI
    runs-on: ${{ fromJSON(vars.MEERKAT_CI_RUNNER || '"ubuntu-latest"') }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Resolve release commit
        id: release_ref
        shell: bash
        run: |
          set -euo pipefail
          release_sha="$(git rev-parse HEAD)"
          echo "Release commit: ${release_sha}"
          echo "sha=${release_sha}" >> "${GITHUB_OUTPUT}"

      - name: Require successful Cargo CI
        uses: actions/github-script@v7
        env:
          RELEASE_SHA: ${{ steps.release_ref.outputs.sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const ref = process.env.RELEASE_SHA;
            const acceptedCheckNames = new Set(["GHA Cargo", "GHA Cargo / GHA Cargo", "CI gate"]);
            const timeoutMs = 30 * 60 * 1000;
            const pollMs = 30 * 1000;
            const started = Date.now();

            async function listAcceptedChecks() {
              const checks = [];
              for (let page = 1; ; page += 1) {
                const { data } = await github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref,
                  filter: "all",
                  per_page: 100,
                  page,
                });
                for (const run of data.check_runs) {
                  if (acceptedCheckNames.has(run.name)) {
                    checks.push(run);
                  }
                }
                if (data.check_runs.length < 100) {
                  break;
                }
              }
              return checks;
            }

            for (;;) {
              const checks = await listAcceptedChecks();
              if (checks.length > 0) {
                core.info(
                  checks
                    .map((run) => `${run.name}: ${run.status}/${run.conclusion || "pending"} (${run.html_url})`)
                    .join("\n")
                );
              } else {
                core.info(`No accepted CI check found yet for ${ref}`);
              }

              const success = checks.find((run) => run.status === "completed" && run.conclusion === "success");
              if (success) {
                core.info(`Release commit ${ref} has a successful ${success.name}: ${success.html_url}`);
                return;
              }

              const failed = checks.find(
                (run) =>
                  run.status === "completed" &&
                  !["success", "skipped", "neutral"].includes(run.conclusion)
              );
              if (failed) {
                core.setFailed(
                  `Release commit ${ref} does not have green CI: ${failed.name} concluded ${failed.conclusion} (${failed.html_url})`
                );
                return;
              }

              if (Date.now() - started >= timeoutMs) {
                core.setFailed(`Timed out waiting for an accepted CI check to pass on release commit ${ref}`);
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, pollMs));
            }

  release_validate_cargo:
    name: Validate release state with Cargo
    needs: [require_ci_green]
    if: >-
      (github.event_name != 'workflow_dispatch' ||
       (github.event.inputs.publish_web_sdk_only != 'true' &&
        github.event.inputs.publish_release_assets_only != 'true')) &&
      !(github.actor == 'lukacf' &&
        ((github.event_name == 'workflow_dispatch' &&
          github.event.inputs.release_backend == 'buildbuddy') ||
         (github.event_name != 'workflow_dispatch' &&
          (vars.MEERKAT_RELEASE_BUILDBUDDY == 'true' ||
           vars.MEERKAT_RELEASE_BUILDBUDDY == '1'))))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build rkat-rpc for SDK smoke tests
        run: ./scripts/repo-cargo build -p meerkat-rpc

      # Release validation re-checks release-specific invariants plus SDK parity gates.
      - name: Verify version parity
        run: make verify-version-parity

      - name: Verify RPC surface alignment
        run: make verify-rpc-surface-alignment

      - name: Verify REST surface alignment
        run: make verify-rest-surface-alignment

      - name: Verify SDK wrapper freshness
        run: make verify-sdk-wrapper-freshness

      - name: Run Python SDK suite
        run: make test-sdk-python

      - name: Run TypeScript SDK suite
        run: make test-sdk-typescript

      - name: Verify schema freshness
        run: make verify-schema-freshness

      - name: Verify Rust release config
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_release_assets_only != 'true' }}
        run: make check-rust-release-config

      - name: Verify selected release ref matches version
        if: >-
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.release_tag != '')
        shell: bash
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="$(awk '
            /^\[workspace.package\]/ { in_workspace_package = 1; next }
            /^\[/ { in_workspace_package = 0 }
            in_workspace_package && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          tag="${RELEASE_REF_NAME##*/}"
          tag="${tag#v}"
          if [[ "${version}" != "${tag}" ]]; then
            echo "Version mismatch: Cargo.toml has ${version} but release ref is ${RELEASE_REF_NAME}" >&2
            exit 1
          fi
          echo "Version ${version} matches release ref ${RELEASE_REF_NAME}"

      - name: Check formatting
        run: make fmt-check

  release_validate_buildbuddy:
    name: Validate release state with BuildBuddy
    needs: [require_ci_green]
    if: >-
      (github.event_name != 'workflow_dispatch' ||
       (github.event.inputs.publish_web_sdk_only != 'true' &&
        github.event.inputs.publish_release_assets_only != 'true')) &&
      (github.actor == 'lukacf' &&
       ((github.event_name == 'workflow_dispatch' &&
         github.event.inputs.release_backend == 'buildbuddy') ||
        (github.event_name != 'workflow_dispatch' &&
         (vars.MEERKAT_RELEASE_BUILDBUDDY == 'true' ||
          vars.MEERKAT_RELEASE_BUILDBUDDY == '1'))))
    runs-on: ${{ fromJSON(vars.MEERKAT_CI_RUNNER || '"ubuntu-latest"') }}
    env:
      BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      MEERKAT_BUILDBUDDY_CI_JOBS: ${{ vars.MEERKAT_RELEASE_BUILDBUDDY_JOBS || vars.MEERKAT_BUILDBUDDY_CI_JOBS || '64' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - uses: ./.github/actions/run-buildbuddy-ci-lane
        with:
          lane: release-validate
          profile: native
          mode: release-validate

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Verify Rust release config
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_release_assets_only != 'true' }}
        run: make check-rust-release-config

      - name: Verify selected release ref matches version
        if: >-
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.release_tag != '')
        shell: bash
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="$(awk '
            /^\[workspace.package\]/ { in_workspace_package = 1; next }
            /^\[/ { in_workspace_package = 0 }
            in_workspace_package && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          tag="${RELEASE_REF_NAME##*/}"
          tag="${tag#v}"
          if [[ "${version}" != "${tag}" ]]; then
            echo "Version mismatch: Cargo.toml has ${version} but release ref is ${RELEASE_REF_NAME}" >&2
            exit 1
          fi
          echo "Version ${version} matches release ref ${RELEASE_REF_NAME}"

  release_validate_gate:
    name: Release validation gate
    if: >-
      always() &&
      (github.event_name != 'workflow_dispatch' ||
       (github.event.inputs.publish_web_sdk_only != 'true' &&
        github.event.inputs.publish_release_assets_only != 'true'))
    needs: [require_ci_green, release_validate_cargo, release_validate_buildbuddy]
    runs-on: ${{ fromJSON(vars.MEERKAT_CI_RUNNER || '"ubuntu-latest"') }}
    steps:
      - name: Check selected release validation backend
        shell: bash
        run: |
          set -euo pipefail
          ci_result="${{ needs.require_ci_green.result }}"
          bb_selected="${{ github.actor == 'lukacf' && ((github.event_name == 'workflow_dispatch' && github.event.inputs.release_backend == 'buildbuddy') || (github.event_name != 'workflow_dispatch' && (vars.MEERKAT_RELEASE_BUILDBUDDY == 'true' || vars.MEERKAT_RELEASE_BUILDBUDDY == '1'))) }}"
          cargo_result="${{ needs.release_validate_cargo.result }}"
          buildbuddy_result="${{ needs.release_validate_buildbuddy.result }}"

          echo "Required Cargo CI: ${ci_result}"
          [[ "${ci_result}" == "success" ]]

          if [[ "${bb_selected}" == "true" ]]; then
            echo "BuildBuddy release validation selected: ${buildbuddy_result}"
            echo "Cargo release validation skipped: ${cargo_result}"
            [[ "${buildbuddy_result}" == "success" && "${cargo_result}" == "skipped" ]]
            exit $?
          fi

          echo "Cargo release validation selected: ${cargo_result}"
          echo "BuildBuddy release validation skipped: ${buildbuddy_result}"
          [[ "${cargo_result}" == "success" && "${buildbuddy_result}" == "skipped" ]]

  build_binaries:
    name: Build and package surface binaries with GitHub-hosted runners
    needs: [require_ci_green, release_validate_gate]
    if: >-
      always() &&
      needs.require_ci_green.result == 'success' &&
      (needs.release_validate_gate.result == 'success' ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_release_assets_only == 'true' &&
        needs.release_validate_gate.result == 'skipped')) &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_release_assets_only == 'true'))
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON((github.actor == 'lukacf' && ((github.event_name == 'workflow_dispatch' && github.event.inputs.release_backend == 'buildbuddy') || (github.event_name != 'workflow_dispatch' && (vars.MEERKAT_RELEASE_BUILDBUDDY == 'true' || vars.MEERKAT_RELEASE_BUILDBUDDY == '1')))) && '{"include":[{"runs-on":"windows-latest","target":"x86_64-pc-windows-msvc","archive_ext":"zip"}]}' || '{"include":[{"runs-on":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","archive_ext":"tar.gz"},{"runs-on":"ubuntu-24.04-arm","target":"aarch64-unknown-linux-gnu","archive_ext":"tar.gz"},{"runs-on":"macos-15","target":"aarch64-apple-darwin","archive_ext":"tar.gz"},{"runs-on":"macos-15-large","target":"x86_64-apple-darwin","archive_ext":"tar.gz"},{"runs-on":"windows-latest","target":"x86_64-pc-windows-msvc","archive_ext":"zip"}]}') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add release target
        run: rustup target add ${{ matrix.target }}

      # The 32GB fixed pagefile below plus the release build's target
      # artifacts exhaust the hosted runner's C: drive deterministically
      # (three consecutive v0.7.24 asset-lane failures: "There is not enough
      # space on the disk"). Reclaim the preinstalled toolchains this build
      # never uses before committing the pagefile.
      - name: Reclaim Windows runner disk space
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $before = (Get-PSDrive -Name C).Free / 1GB
          $targets = @(
            'C:\Android',
            'C:\Program Files (x86)\Android',
            'C:\Program Files\dotnet',
            'C:\hostedtoolcache\windows\CodeQL',
            'C:\Modules',
            'C:\Program Files\MongoDB',
            'C:\Program Files\PostgreSQL',
            'C:\Program Files\Unity Hub',
            'C:\selenium'
          )
          foreach ($t in $targets) {
            if (Test-Path $t) {
              Write-Host "Removing $t"
              Remove-Item -Recurse -Force $t -ErrorAction SilentlyContinue
            }
          }
          $after = (Get-PSDrive -Name C).Free / 1GB
          Write-Host ("C: free before {0:N1} GB, after {1:N1} GB" -f $before, $after)

      # Windows has no memory overcommit: rustc's peak commit on the large
      # generated crates (meerkat-machine-schema) exceeds the 16GB runner's
      # default commit limit and aborts with 0xc0000409 ("memory allocation
      # of N bytes failed"). Expand the pagefile so commit capacity matches
      # what Linux runners get via overcommit.
      - name: Expand Windows pagefile
        if: runner.os == 'Windows'
        uses: al-cheb/configure-pagefile-action@9b6da52fb72a3c6147c1aad2df22d8d905681adc # v1.5
        with:
          # Fixed size: Windows grows demand-sized pagefiles too slowly for
          # parallel rustc allocation bursts (the v0.7.16 tag run OOM-aborted
          # mid-growth at 16GB->24GB), so preallocate the full capacity.
          minimum-size: 32GB
          maximum-size: 32GB
          disk-root: 'C:'

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build surface binaries
        shell: bash
        env:
          CARGO_TARGET_DIR: target
        run: |
          set -euo pipefail
          # Windows has no memory overcommit, so it was the lane that exposed
          # the DSL schema() emission blowup (rustc peaking at tens of GB on
          # the machine catalog: LLVM OOM on meerkat-mcp, 0xc0000409 stack
          # overruns on meerkat-runtime/meerkat-machine-schema across the
          # v0.7.14-v0.7.16 tag runs). The root cause is fixed at the
          # generator (#835 chunks the emission), so the opt-level pins that
          # papered over it are gone; the parallelism cap stays as cheap
          # commit-capacity headroom on the 16GB runner.
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            export CARGO_BUILD_JOBS=2
          fi
          # Package names (for cargo build -p) — binary names differ via [[bin]]
          PACKAGES=("rkat" "meerkat-rpc" "meerkat-rest" "meerkat-mcp-server")
          for pkg in "${PACKAGES[@]}"; do
            ./scripts/repo-cargo build -p "$pkg" --release --target "${{ matrix.target }}"
          done

      - name: Ad-hoc codesign macOS binaries
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          for bin in rkat rkat-rpc rkat-rest rkat-mcp; do
            codesign --force --sign - "target/${{ matrix.target }}/release/${bin}"
          done

      - name: Package artifacts
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          BINARIES=("rkat" "rkat-rpc" "rkat-rest" "rkat-mcp")
          mkdir -p dist
          VERSION="${VERSION#v}"
          VERSION="${VERSION//\//-}"

          for bin in "${BINARIES[@]}"; do
            if [[ "${RUNNER_OS}" == "Windows" ]]; then
              src="target/${TARGET}/release/${bin}.exe"
            else
              src="target/${TARGET}/release/${bin}"
            fi
            artifact_name="${bin}-${VERSION}-${TARGET}.${ARCHIVE_EXT}"

            if [[ ! -f "$src" ]]; then
              echo "Missing expected binary at $src" >&2
              exit 1
            fi
            if ! grep -aF -- "$VERSION" "$src" >/dev/null; then
              echo "Binary ${bin} for ${TARGET} does not embed release version ${VERSION}" >&2
              "$src" --version 2>/dev/null || true
              exit 1
            fi

            if [[ "$ARCHIVE_EXT" == "zip" ]]; then
              7z a -tzip "${GITHUB_WORKSPACE}/dist/${artifact_name}" "$(cygpath -w "$src")"
            else
              tar -czf "dist/${artifact_name}" -C "$(dirname "$src")" "$(basename "$src")"
            fi
            echo "packaged=${bin} -> dist/${artifact_name}"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meerkat-${{ matrix.target }}-${{ matrix.runs-on }}
          path: dist/*
          if-no-files-found: error

  build_binaries_buildbuddy:
    name: Build and package surface binaries via BuildBuddy
    needs: [require_ci_green, release_validate_gate]
    if: >-
      always() &&
      needs.require_ci_green.result == 'success' &&
      (needs.release_validate_gate.result == 'success' ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_release_assets_only == 'true' &&
        needs.release_validate_gate.result == 'skipped')) &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_release_assets_only == 'true')) &&
      (github.actor == 'lukacf' &&
       ((github.event_name == 'workflow_dispatch' &&
         github.event.inputs.release_backend == 'buildbuddy') ||
        (github.event_name != 'workflow_dispatch' &&
         (vars.MEERKAT_RELEASE_BUILDBUDDY == 'true' ||
          vars.MEERKAT_RELEASE_BUILDBUDDY == '1'))))
    runs-on: ${{ fromJSON(vars.MEERKAT_CI_RUNNER || '"ubuntu-latest"') }}
    env:
      BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - bb_command: release-build-linux-x86
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - bb_command: release-build-linux-arm64
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - bb_command: release-build-macos-arm64
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - bb_command: release-build-macos-x86
            target: x86_64-apple-darwin
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}

      - uses: ./.github/actions/setup-buildbuddy-ci
        with:
          profile: native

      - name: Build release binaries via BuildBuddy
        shell: bash
        env:
          BUILDBUDDY_BAZEL_COMMAND: ${{ matrix.bb_command }}
          BUILDBUDDY_OUTPUT_LANE: release-build-${{ matrix.target }}
          BUILDBUDDY_OUTPUT_BASE: ${{ runner.temp }}/bb-release-${{ matrix.target }}
          MEERKAT_BUILDBUDDY_OUTPUT_ROOT: ${{ runner.temp }}/bb-release
          BUILDBUDDY_RELEASE_JOBS: ${{ vars.MEERKAT_RELEASE_BUILDBUDDY_JOBS || '64' }}
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set +e
          scripts/buildbuddy-bazel-poc --jobs="${BUILDBUDDY_RELEASE_JOBS}"
          status="$?"
          set -e

          if [[ "${status}" -eq 38 ]]; then
            echo "::warning::BuildBuddy build completed but BES upload failed; validating downloaded outputs before continuing"
            BAZEL_BIN="${BUILDBUDDY_OUTPUT_BASE}/execroot/_main/bazel-out"
            declare -A BIN_PATHS=(
              [rkat]="meerkat-cli/rkat"
              [rkat-rpc]="meerkat-rpc/rkat_rpc_bin"
              [rkat-rest]="meerkat-rest/rkat_rest_bin"
              [rkat-mcp]="meerkat-mcp-server/rkat_mcp_bin"
            )
            for bin in rkat rkat-rpc rkat-rest rkat-mcp; do
              rel_path="${BIN_PATHS[$bin]}"
              src="$(find "${BAZEL_BIN}" -path "*/${rel_path}" -type f 2>/dev/null | head -1)"
              if [[ -z "${src}" && "${ARCHIVE_EXT}" == "zip" ]]; then
                src="$(find "${BAZEL_BIN}" -path "*/${rel_path}.exe" -type f 2>/dev/null | head -1)"
              fi
              if [[ -z "${src}" ]]; then
                echo "BuildBuddy exited 38 and ${bin} output is missing for ${TARGET}" >&2
                exit "${status}"
              fi
            done
            exit 0
          fi

          exit "${status}"

      - name: Package artifacts
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          BB_OUTPUT_BASE: ${{ runner.temp }}/bb-release-${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${VERSION#v}"
          VERSION="${VERSION//\//-}"
          BAZEL_BIN="${BB_OUTPUT_BASE}/execroot/_main/bazel-out"
          STAGE_ROOT="$(mktemp -d)"
          trap 'rm -rf "${STAGE_ROOT}"' EXIT

          declare -A BIN_PATHS=(
            [rkat]="meerkat-cli/rkat"
            [rkat-rpc]="meerkat-rpc/rkat_rpc_bin"
            [rkat-rest]="meerkat-rest/rkat_rest_bin"
            [rkat-mcp]="meerkat-mcp-server/rkat_mcp_bin"
          )

          for bin in rkat rkat-rpc rkat-rest rkat-mcp; do
            rel_path="${BIN_PATHS[$bin]}"
            src="$(find "${BAZEL_BIN}" -path "*/${rel_path}" -type f 2>/dev/null | head -1)"
            if [[ -z "$src" && "$ARCHIVE_EXT" == "zip" ]]; then
              src="$(find "${BAZEL_BIN}" -path "*/${rel_path}.exe" -type f 2>/dev/null | head -1)"
            fi
            artifact_name="${bin}-${VERSION}-${TARGET}.${ARCHIVE_EXT}"

            if [[ -z "$src" ]]; then
              echo "Missing binary for ${bin} (expected under ${BAZEL_BIN}/*/${rel_path})" >&2
              find "${BAZEL_BIN}" -type f -name "${bin}*" 2>/dev/null || true
              exit 1
            fi

            stage_dir="${STAGE_ROOT}/${bin}"
            mkdir -p "${stage_dir}"
            payload_name="${bin}"
            if [[ "$ARCHIVE_EXT" == "zip" ]]; then
              payload_name="${bin}.exe"
            fi
            cp "$src" "${stage_dir}/${payload_name}"
            chmod +x "${stage_dir}/${payload_name}" || true
            if ! grep -aF -- "$VERSION" "${stage_dir}/${payload_name}" >/dev/null; then
              echo "Binary ${bin} for ${TARGET} does not embed release version ${VERSION}" >&2
              "${stage_dir}/${payload_name}" --version 2>/dev/null || true
              exit 1
            fi
            archive_path="${PWD}/dist/${artifact_name}"

            if [[ "$ARCHIVE_EXT" == "zip" ]]; then
              if command -v 7z >/dev/null 2>&1; then
                (cd "${stage_dir}" && 7z a -tzip "${archive_path}" "${payload_name}")
              elif command -v zip >/dev/null 2>&1; then
                (cd "${stage_dir}" && zip -q "${archive_path}" "${payload_name}")
              elif command -v python3 >/dev/null 2>&1; then
                (cd "${stage_dir}" && python3 -c 'import sys, zipfile; archive_path, payload_name = sys.argv[1], sys.argv[2]; archive = zipfile.ZipFile(archive_path, "w", compression=zipfile.ZIP_DEFLATED); archive.write(payload_name); archive.close()' "${archive_path}" "${payload_name}")
              else
                echo "Need 7z, zip, or python3 to create ${archive_path}" >&2
                exit 1
              fi
            else
              tar -czf "${archive_path}" -C "${stage_dir}" "${payload_name}"
            fi
            echo "packaged=${bin} -> dist/${artifact_name}"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meerkat-${{ matrix.target }}-buildbuddy
          path: dist/*
          if-no-files-found: error

  publish_unix_release_and_homebrew:
    name: Publish macOS/Linux release assets and update Homebrew
    needs: [release_validate_gate, build_binaries_buildbuddy]
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.release_validate_gate.result == 'success' &&
      needs.build_binaries_buildbuddy.result == 'success' &&
      github.actor == 'lukacf' &&
      (vars.MEERKAT_RELEASE_BUILDBUDDY == 'true' ||
       vars.MEERKAT_RELEASE_BUILDBUDDY == '1')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download macOS/Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: meerkat-*-buildbuddy
          path: release-artifacts

      - name: Build macOS/Linux checksum manifest
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: scripts/release-build-asset-manifest release-artifacts "${RELEASE_TAG}"

      - name: Require complete Homebrew archive set
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 - "${RELEASE_TAG}" release-artifacts/index.json <<'PY'
          import json
          import sys

          tag, index_path = sys.argv[1:]
          version = tag.removeprefix("v")
          binaries = ("rkat", "rkat-rpc", "rkat-rest", "rkat-mcp")
          targets = (
              "aarch64-apple-darwin",
              "x86_64-apple-darwin",
              "aarch64-unknown-linux-gnu",
              "x86_64-unknown-linux-gnu",
          )
          expected = {
              f"{binary}-{version}-{target}.tar.gz"
              for binary in binaries
              for target in targets
          }
          with open(index_path, encoding="utf-8") as source:
              actual = set(json.load(source)["artifacts"])
          if actual != expected:
              missing = sorted(expected - actual)
              extra = sorted(actual - expected)
              raise SystemExit(
                  f"Homebrew release asset mismatch: missing={missing}, extra={extra}"
              )
          print(f"Verified {len(actual)} macOS/Linux release archives")
          PY

      # Never churn already-published archives on a rerun. Missing archives
      # are still added, while the final publisher handles Windows later.
      - name: Publish macOS/Linux release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.tar.gz
          draft: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: false
          tag_name: ${{ github.ref_name }}

      - name: Update Homebrew tap from published macOS/Linux assets
        continue-on-error: true
        uses: ./.github/actions/update-homebrew
        with:
          release_tag: ${{ github.ref_name }}
          github_token: ${{ github.token }}
          tap_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          checksums_path: release-artifacts/checksums.sha256

  build_web_sdk_package:
    name: Build Web SDK package
    needs: [require_ci_green, release_validate_gate]
    if: >-
      always() &&
      needs.require_ci_green.result == 'success' &&
      (needs.release_validate_gate.result == 'success' ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_web_sdk_only == 'true' &&
        needs.release_validate_gate.result == 'skipped')) &&
      (github.event_name != 'workflow_dispatch' ||
       github.event.inputs.web_sdk_artifact_run_id == '') &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_release_packages == 'true' &&
        github.event.inputs.alpha_crates_only != 'true'))
    runs-on: ${{ fromJSON(vars.MEERKAT_CI_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: >-
            ${{
              github.event_name == 'workflow_dispatch' &&
              github.event.inputs.publish_web_sdk_only == 'true' &&
              github.ref ||
              (github.event_name == 'workflow_dispatch' &&
               github.event.inputs.release_tag != '' &&
               github.event.inputs.release_tag ||
               github.ref)
            }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install Python + Node tooling
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install wasm-pack
        shell: bash
        run: |
          set -euo pipefail
          version="0.13.1"
          archive="wasm-pack-v${version}-x86_64-unknown-linux-musl.tar.gz"
          curl --fail --location --retry 5 --retry-delay 2 \
            "https://github.com/wasm-bindgen/wasm-pack/releases/download/v${version}/${archive}" \
            --output "/tmp/${archive}"
          tar -xzf "/tmp/${archive}" -C /tmp
          install -m 0755 "/tmp/wasm-pack-v${version}-x86_64-unknown-linux-musl/wasm-pack" "$HOME/.cargo/bin/wasm-pack"
          wasm-pack --version

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Build and pack Web SDK
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          CARGO_INCREMENTAL: "0"
          RUSTFLAGS: '--cfg getrandom_backend="wasm_js"'
        run: scripts/release-build-web-sdk-package.sh "${GITHUB_WORKSPACE}/web-sdk-package"

      - name: Upload Web SDK package
        uses: actions/upload-artifact@v4
        with:
          name: rkat-web-package
          path: web-sdk-package/rkat-web-*.tgz
          if-no-files-found: error

  build_binaries_gate:
    name: Release binary build gate
    if: >-
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_release_assets_only == 'true'))
    needs: [build_binaries, build_binaries_buildbuddy]
    runs-on: ${{ fromJSON(vars.MEERKAT_CI_RUNNER || '"ubuntu-latest"') }}
    steps:
      - name: Check selected release binary backend
        shell: bash
        run: |
          set -euo pipefail
          bb_selected="${{ github.actor == 'lukacf' && ((github.event_name == 'workflow_dispatch' && github.event.inputs.release_backend == 'buildbuddy') || (github.event_name != 'workflow_dispatch' && (vars.MEERKAT_RELEASE_BUILDBUDDY == 'true' || vars.MEERKAT_RELEASE_BUILDBUDDY == '1'))) }}"
          github_result="${{ needs.build_binaries.result }}"
          buildbuddy_result="${{ needs.build_binaries_buildbuddy.result }}"

          if [[ "${bb_selected}" == "true" ]]; then
            # Hybrid lane split: BuildBuddy builds Linux/macOS; Windows always
            # builds on a GitHub-hosted runner (no self-hosted Windows RBE
            # executors are registered for the org's pool).
            echo "BuildBuddy release binary build (Linux/macOS) selected: ${buildbuddy_result}"
            echo "GitHub-hosted release binary build (Windows) selected: ${github_result}"
            [[ "${buildbuddy_result}" == "success" && "${github_result}" == "success" ]]
            exit $?
          fi

          echo "GitHub-hosted release binary build selected: ${github_result}"
          echo "BuildBuddy release binary build skipped: ${buildbuddy_result}"
          [[ "${github_result}" == "success" && "${buildbuddy_result}" == "skipped" ]]

  publish_github_release:
    name: Publish GitHub release assets
    if: >-
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_release_assets_only == 'true')) &&
      (needs.release_validate_gate.result == 'success' ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_release_assets_only == 'true' &&
        needs.release_validate_gate.result == 'skipped')) &&
      needs.build_binaries_gate.result == 'success'
    # Waiting for the early publisher prevents manifest upload races if a
    # future Windows build happens to finish before the Unix release job.
    # `always()` above keeps this authoritative path available if that early
    # optimization is skipped or fails.
    needs: [release_validate_gate, build_binaries_gate, publish_unix_release_and_homebrew]
    runs-on: ubuntu-latest
    steps:
      # Recovery runs execute the current workflow against an older release
      # tag, so load helpers from the workflow ref rather than that old tag.
      - name: Checkout workflow helpers
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Build checksum manifest
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "release_tag is required for release asset recovery" >&2
            exit 1
          fi
          scripts/release-build-asset-manifest release-artifacts "${RELEASE_TAG}"

      - name: Publish release archives
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
          draft: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: false
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

      # Publish checksums and index.json only after every platform archive is
      # present, keeping the public manifest a complete release authority.
      - name: Publish complete release manifest
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/checksums.sha256
            release-artifacts/index.json
          draft: false
          fail_on_unmatched_files: true
          overwrite_files: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

  update_homebrew:
    name: Update Homebrew tap formula
    if: >-
      always() &&
      needs.publish_github_release.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_release_assets_only == 'true'))
    needs: [publish_github_release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v6

      # This is the authoritative fallback for GitHub-hosted releases and for
      # any transient failure in the early BuildBuddy/Homebrew path.
      - name: Update Homebrew tap from complete release
        uses: ./.github/actions/update-homebrew
        with:
          release_tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          github_token: ${{ github.token }}
          tap_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # Registry publishing runs automatically on tag pushes alongside binary
  # builds. For recovery (e.g. npm was down during the tag-triggered run),
  # re-run via workflow_dispatch:
  #
  #   gh workflow run release.yml --ref v<VERSION> \
  #     -f publish_release_packages=true \
  #     -f registry_dry_run=false
  #
  # Use registry_dry_run=true to validate without uploading.
  publish_registries:
    name: Publish crates + Python/TypeScript SDK packages
    if: >-
      always() &&
      needs.require_ci_green.result == 'success' &&
      needs.release_validate_gate.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.publish_release_packages == 'true' &&
       github.event.inputs.publish_web_sdk_only != 'true'))
    needs: [require_ci_green, release_validate_gate]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install Python + Node tooling
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python publishing tools
        run: python -m pip install --upgrade build twine

      - name: Publish Rust crates
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_web_sdk_only != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          MEERKAT_REGISTRY_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.registry_dry_run == 'true' }}
        run: |
          MEERKAT_REGISTRY_DRY_RUN="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.registry_dry_run == 'true' }}" \
            scripts/release-publish-rust-crates.sh

      - name: Publish Python SDK
        if: >-
          ${{
            github.event_name != 'workflow_dispatch' ||
            (github.event.inputs.publish_web_sdk_only != 'true' &&
             github.event.inputs.alpha_crates_only != 'true')
          }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        working-directory: sdks/python
        run: |
          set -euo pipefail
          DRY_RUN="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.registry_dry_run == 'true' }}"
          python -m pip install --upgrade build twine
          rm -rf dist
          python -m build
          python -m twine check dist/*
          VENV_DIR="$(mktemp -d)"
          python -m venv "$VENV_DIR"
          "$VENV_DIR/bin/python" -m pip install --upgrade pip
          "$VENV_DIR/bin/python" -m pip install dist/*.whl
          "$VENV_DIR/bin/python" -c "from meerkat import CONTRACT_VERSION, MeerkatClient; print(CONTRACT_VERSION); print(MeerkatClient.__name__)"
          rm -rf "$VENV_DIR"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Python SDK dry-run: skipping upload"
          else
            python -m twine upload --skip-existing dist/*
          fi

      - name: Publish TypeScript SDK
        if: >-
          ${{
            github.event_name != 'workflow_dispatch' ||
            (github.event.inputs.publish_web_sdk_only != 'true' &&
             github.event.inputs.alpha_crates_only != 'true')
          }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: sdks/typescript
        run: |
          set -euo pipefail
          DRY_RUN="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.registry_dry_run == 'true' }}"
          PACKAGE_VERSION="$(node -p "const p = require('./package.json'); p.name + '@' + p.version")"
          if [[ "$DRY_RUN" != "true" ]] && npm view "$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_VERSION already published, skipping"
            exit 0
          fi
          npm install --ignore-scripts
          npm config set //registry.npmjs.org/:_authToken ${NODE_AUTH_TOKEN}
          npm run build
          PACKFILE="$(npm pack | tail -n 1)"
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          npm init -y >/dev/null 2>&1
          npm install "${GITHUB_WORKSPACE}/sdks/typescript/${PACKFILE}" >/dev/null 2>&1
          node --input-type=module -e "const sdk = await import('@rkat/sdk'); if (!sdk.MeerkatClient || !sdk.CONTRACT_VERSION) throw new Error('missing expected exports');"
          cd "${GITHUB_WORKSPACE}/sdks/typescript"
          rm -rf "$SMOKE_DIR" "$PACKFILE"
          if [[ "$DRY_RUN" == "true" ]]; then
            npm publish --access public --dry-run
          else
            npm publish --access public
          fi

  publish_web_sdk:
    name: Publish Web SDK package
    if: >-
      always() &&
      needs.require_ci_green.result == 'success' &&
      (needs.build_web_sdk_package.result == 'success' ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.web_sdk_artifact_run_id != '')) &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_release_packages == 'true' &&
        github.event.inputs.alpha_crates_only != 'true'))
    needs: [require_ci_green, build_web_sdk_package]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: >-
            ${{
              github.event_name == 'workflow_dispatch' &&
              github.event.inputs.publish_web_sdk_only == 'true' &&
              github.ref ||
              (github.event_name == 'workflow_dispatch' &&
               github.event.inputs.release_tag != '' &&
               github.event.inputs.release_tag ||
               github.ref)
            }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Download Web SDK package
        uses: actions/download-artifact@v4
        with:
          name: rkat-web-package
          path: web-sdk-package
          run-id: >-
            ${{
              github.event_name == 'workflow_dispatch' &&
              github.event.inputs.web_sdk_artifact_run_id != '' &&
              github.event.inputs.web_sdk_artifact_run_id ||
              github.run_id
            }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Web SDK
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          MEERKAT_REGISTRY_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.registry_dry_run == 'true' }}
        run: |
          set -euo pipefail
          scripts/release-publish-web-sdk-package.sh web-sdk-package/rkat-web-*.tgz
