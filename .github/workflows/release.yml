name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release_packages:
        description: "Publish Rust/Python/TypeScript artifacts to registries"
        required: false
        default: false
        type: boolean
      registry_dry_run:
        description: "Run registry publish steps in dry-run mode"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}

# Required GitHub Actions secrets for full release:
#   BUILDBUDDY_API_KEY    - BuildBuddy API key (release validation + macOS builds)
#   CARGO_REGISTRY_TOKEN  - crates.io API token
#   PYPI_API_TOKEN        - PyPI API token (scoped to meerkat-sdk package)
#   NPM_TOKEN             - npm access token (scoped to @meerkat org or publish)

# Architecture:
#   validate and build_binaries start in parallel. Publish and GitHub
#   release gate on both, so a validation failure prevents publishing even
#   though binaries may already be built. This shaves ~30 min off the
#   critical path compared to the old sequential validate → build flow.
#
#   Validation runs via BuildBuddy (warm cache from CI) for ~2 min instead
#   of ~40 min on a cold GHA runner.

jobs:
  # ── Validation (BuildBuddy, warm cache) ────────────────────────────────
  release_validate:
    name: Validate release state
    runs-on: ${{ fromJSON(vars.MEERKAT_CI_RUNNER || '"ubuntu-latest"') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-buildbuddy-ci
        with:
          profile: native

      - name: Run release validation lane
        uses: ./.github/actions/run-buildbuddy-ci-lane
        with:
          lane: release-validate
          profile: native
          mode: full-fresh

      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/v')
        run: make verify-version

  # ── Binary builds (BuildBuddy RBE, parallel with validation) ─────────
  build_binaries:
    name: Build and package surface binaries
    runs-on: ${{ fromJSON(vars.MEERKAT_CI_RUNNER || '"ubuntu-latest"') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - bb_config: buildbuddy-linux-rbe
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - bb_config: buildbuddy-linux-arm64-rbe
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - bb_config: buildbuddy-macos-rbe
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - bb_config: buildbuddy-macos-x86-rbe
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - bb_config: buildbuddy-windows-rbe
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-buildbuddy-ci
        with:
          profile: native

      - name: Build release binaries via BuildBuddy
        shell: bash
        run: |
          set -euo pipefail
          bb --output_base="${RUNNER_TEMP}/bb-release-${{ matrix.target }}" \
            --max_idle_secs=300 \
            build \
            --lockfile_mode=error \
            --repository_cache="${RUNNER_TEMP}/buildbuddy-repository-cache" \
            --config=${{ matrix.bb_config }} \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}" \
            --compilation_mode=opt \
            --remote_download_outputs=toplevel \
            --jobs=512 \
            //meerkat-cli:rkat \
            //meerkat-cli:rkat_mini_bin \
            //meerkat-rpc:rkat_rpc_bin \
            //meerkat-rpc:rkat_rpc_mini_bin \
            //meerkat-rest:rkat_rest_bin \
            //meerkat-mcp-server:rkat_mcp_bin

      - name: Package artifacts
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          BB_OUTPUT_BASE: ${{ runner.temp }}/bb-release-${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${VERSION#v}"
          VERSION="${VERSION//\//-}"
          BAZEL_BIN="${BB_OUTPUT_BASE}/execroot/_main/bazel-out"

          declare -A BIN_PATHS=(
            [rkat]="meerkat-cli/rkat"
            [rkat-mini]="meerkat-cli/rkat_mini_bin"
            [rkat-rpc]="meerkat-rpc/rkat_rpc_bin"
            [rkat-rpc-mini]="meerkat-rpc/rkat_rpc_mini_bin"
            [rkat-rest]="meerkat-rest/rkat_rest_bin"
            [rkat-mcp]="meerkat-mcp-server/rkat_mcp_bin"
          )

          for bin in rkat rkat-mini rkat-rpc rkat-rpc-mini rkat-rest rkat-mcp; do
            rel_path="${BIN_PATHS[$bin]}"
            src="$(find "${BAZEL_BIN}" -path "*/${rel_path}" -type f 2>/dev/null | head -1)"
            if [[ -z "$src" ]]; then
              echo "Missing binary for ${bin} (expected under ${BAZEL_BIN}/*/${rel_path})" >&2
              find "${BAZEL_BIN}" -type f -name "${bin}*" 2>/dev/null || true
              exit 1
            fi

            artifact_name="${bin}-${VERSION}-${TARGET}.${ARCHIVE_EXT}"
            if [[ "$ARCHIVE_EXT" == "zip" ]]; then
              7z a -tzip "dist/${artifact_name}" "$src"
            else
              tar -czf "dist/${artifact_name}" -C "$(dirname "$src")" "$(basename "$src")"
            fi
            echo "packaged=${bin} -> dist/${artifact_name}"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meerkat-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # ── GitHub Release (gates on both validate + binaries) ─────────────────
  publish_github_release:
    name: Publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release_validate, build_binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Build checksum manifest
        working-directory: release-artifacts
        run: |
          set -euo pipefail
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) | sort > manifest_files.txt
          if [[ ! -s manifest_files.txt ]]; then
            echo "No release artifacts found" >&2
            exit 1
          fi
          xargs sha256sum < manifest_files.txt > checksums.sha256
          python3 - <<'PY'
          import os
          import json
          from pathlib import Path

          paths = [
              p.as_posix().lstrip("./")
              for p in sorted(Path(".").rglob("*"))
              if p.is_file() and (p.name.endswith(".tar.gz") or p.name.endswith(".zip"))
          ]

          tag = os.environ["GITHUB_REF_NAME"]
          manifest = {
              "version": tag.lstrip("v"),
              "tag": tag,
              "artifacts": paths,
              "checksums": "checksums.sha256",
          }

          with open("index.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
          PY

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
            release-artifacts/checksums.sha256
            release-artifacts/index.json
          draft: false
          fail_on_unmatched_files: true
          generate_release_notes: true

  # ── Homebrew tap update ────────────────────────────────────────────────
  update_homebrew:
    name: Update Homebrew tap formula
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish_github_release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: lukacf/homebrew-meerkat
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-meerkat

      - name: Download checksums
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          curl -fsSL "https://github.com/lukacf/meerkat/releases/download/${GITHUB_REF_NAME}/checksums.sha256" -o checksums.sha256

      - name: Generate updated formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/lukacf/meerkat/releases/download/${TAG}"

          get_sha() { grep "$1" checksums.sha256 | awk '{print $1}'; }

          gen_resource() {
            local name="$1" target="$2"
            echo "  resource \"${name}\" do"
            echo "    url \"${BASE}/${name}-${VERSION}-${target}.tar.gz\""
            echo "    sha256 \"$(get_sha "${name}-${VERSION}-${target}.tar.gz")\""
            echo "  end"
          }

          gen_platform() {
            local target="$1"
            echo "    url \"${BASE}/rkat-${VERSION}-${target}.tar.gz\""
            echo "    sha256 \"$(get_sha "rkat-${VERSION}-${target}.tar.gz")\""
            echo ""
            for r in rkat-mini rkat-rpc rkat-rpc-mini rkat-rest rkat-mcp; do
              gen_resource "$r" "$target"
              echo ""
            done
          }

          {
            echo 'class Rkat < Formula'
            echo '  desc "Minimal, high-performance agent harness for LLM-powered applications"'
            echo '  homepage "https://github.com/lukacf/meerkat"'
            echo "  version \"${VERSION}\""
            echo '  license "MIT"'
            echo ''
            echo '  on_macos do'
            echo '    on_arm do'
            gen_platform "aarch64-apple-darwin"
            echo '    end'
            echo ''
            echo '    on_intel do'
            gen_platform "x86_64-apple-darwin"
            echo '    end'
            echo '  end'
            echo ''
            echo '  on_linux do'
            echo '    on_arm do'
            gen_platform "aarch64-unknown-linux-gnu"
            echo '    end'
            echo ''
            echo '    on_intel do'
            gen_platform "x86_64-unknown-linux-gnu"
            echo '    end'
            echo '  end'
            echo ''
            echo '  def install'
            echo '    bin.install "rkat"'
            echo ''
            echo '    %w[rkat-mini rkat-rpc rkat-rpc-mini rkat-rest rkat-mcp].each do |name|'
            echo '      resource(name).stage do'
            echo '        bin.install name'
            echo '      end'
            echo '    end'
            echo '  end'
            echo ''
            echo '  test do'
            echo '    assert_match "rkat #{version}", shell_output("#{bin}/rkat --version")'
            echo '  end'
            echo 'end'
          } > homebrew-meerkat/rkat.rb

      - name: Commit and push formula
        working-directory: homebrew-meerkat
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rkat.rb
          git commit -m "Update rkat to ${GITHUB_REF_NAME#v}"
          git push

  # ── Registry publishing (gates on validate, parallel with binaries) ────
  # For recovery (e.g. npm was down during the tag-triggered run):
  #   gh workflow run release.yml --ref v<VERSION> \
  #     -f publish_release_packages=true -f registry_dry_run=false
  publish_registries:
    name: Publish crates + SDK packages
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release_packages == 'true')
    needs: [release_validate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install Python + Node tooling
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python publishing tools
        run: python -m pip install --upgrade build twine

      - name: Publish Rust crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          DRY_RUN="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.registry_dry_run == 'true' }}"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Running cargo publish in dry-run mode"
          else
            echo "Publishing crates to crates.io"
          fi
          mapfile -t crates < <(scripts/release-rust-crates.sh)
          for c in "${crates[@]}"; do
            tmp_cfg="$(mktemp)"
            scripts/generate-patch-config.sh "$GITHUB_WORKSPACE" "$c" > "$tmp_cfg"
            if [[ "$DRY_RUN" == "true" ]]; then
              cargo publish -p "$c" --locked --dry-run --config "$tmp_cfg"
            else
              output=$(cargo publish -p "$c" --locked --config "$tmp_cfg" 2>&1) && true
              rc=$?
              if [[ $rc -eq 0 ]]; then
                echo "  $c: published"
              elif echo "$output" | grep -q "already exists\|already uploaded"; then
                echo "  $c: already published, skipping"
              else
                echo "$output" >&2
                echo "  $c: FAILED" >&2
                exit $rc
              fi
            fi
            rm -f "$tmp_cfg"
          done

      - name: Publish Python SDK
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        working-directory: sdks/python
        run: |
          set -euo pipefail
          DRY_RUN="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.registry_dry_run == 'true' }}"
          python -m pip install --upgrade build twine
          rm -rf dist
          python -m build
          python -m twine check dist/*
          VENV_DIR="$(mktemp -d)"
          python -m venv "$VENV_DIR"
          "$VENV_DIR/bin/python" -m pip install --upgrade pip
          "$VENV_DIR/bin/python" -m pip install dist/*.whl
          "$VENV_DIR/bin/python" -c "from meerkat import CONTRACT_VERSION, MeerkatClient; print(CONTRACT_VERSION); print(MeerkatClient.__name__)"
          rm -rf "$VENV_DIR"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Python SDK dry-run: skipping upload"
          else
            python -m twine upload --skip-existing dist/*
          fi

      - name: Publish TypeScript SDK
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: sdks/typescript
        run: |
          set -euo pipefail
          DRY_RUN="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.registry_dry_run == 'true' }}"
          npm install --ignore-scripts
          npm config set //registry.npmjs.org/:_authToken ${NODE_AUTH_TOKEN}
          npm run build
          PACKFILE="$(npm pack | tail -n 1)"
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          npm init -y >/dev/null 2>&1
          npm install "${GITHUB_WORKSPACE}/sdks/typescript/${PACKFILE}" >/dev/null 2>&1
          node --input-type=module -e "const sdk = await import('@rkat/sdk'); if (!sdk.MeerkatClient || !sdk.CONTRACT_VERSION) throw new Error('missing expected exports');"
          cd "${GITHUB_WORKSPACE}/sdks/typescript"
          rm -rf "$SMOKE_DIR" "$PACKFILE"
          if [[ "$DRY_RUN" == "true" ]]; then
            npm publish --access public --dry-run
          else
            npm publish --access public
          fi

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Publish Web SDK
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RUSTFLAGS: '--cfg getrandom_backend="wasm_js"'
        working-directory: sdks/web
        run: |
          set -euo pipefail
          DRY_RUN="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.registry_dry_run == 'true' }}"
          npm install --ignore-scripts
          npm config set //registry.npmjs.org/:_authToken ${NODE_AUTH_TOKEN}
          npm run build
          if [[ "$DRY_RUN" == "true" ]]; then
            npm publish --access public --dry-run
          else
            npm publish --access public
          fi
