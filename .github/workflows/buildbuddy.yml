name: BuildBuddy CI

on:
  workflow_call:
    inputs:
      mode:
        description: BuildBuddy gate to run
        required: false
        default: full-fresh
        type: string
      backend:
        description: Bazel backend to use.
        required: false
        default: buildbuddy-hosted
        type: string
      ci_started_at_epoch:
        description: Parent CI backend-selection start time, as Unix epoch seconds.
        required: false
        default: ""
        type: string
      machine_authority_base_sha:
        description: Base revision for machine-authority change detection.
        required: false
        default: ""
        type: string
      machine_authority_head_sha:
        description: Head revision for machine-authority change detection.
        required: false
        default: ""
        type: string
    secrets:
      BUILDBUDDY_API_KEY:
        required: false
      BUILDBUDDY_ENDPOINT:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      RKAT_ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      RKAT_OPENAI_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      RKAT_GEMINI_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      GOOGLE_APPLICATION_CREDENTIALS_JSON:
        required: false
      MEERKAT_E2E_AUTH_OPENAI_OAUTH_TOKENS_JSON:
        required: false
      MEERKAT_E2E_AUTH_ANTHROPIC_MODEL:
        required: false
      MEERKAT_E2E_AUTH_GEMINI_MODEL:
        required: false
      MEERKAT_E2E_AUTH_VERTEX_CANARY:
        required: false
  workflow_dispatch:
    inputs:
      backend:
        description: Bazel backend to use.
        required: true
        default: buildbuddy-hosted
        type: choice
        options:
          - buildbuddy-hosted
          - gcp-buildbuddy
      mode:
        description: BuildBuddy gate to run
        required: true
        default: full-fresh
        type: choice
        options:
          - full-fresh
          - full-warm
          - workspace-fresh
          - workspace-warm
          - release-validate
          - fmt-lint
          - sdk-suites
          - machine-authority
          - rmat-audit
          - seam-inventory
          - wasm-contract-tests
          - test-unit
          - integration-fast
          - e2e-fast
          - e2e-system
          - e2e-live
          - e2e-smoke
          - test-minimal
          - test-feature-matrix-lib
          - test-feature-matrix-surface-checks
          - wasm-check
          - audit

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ (inputs.backend || 'buildbuddy-hosted') == 'gcp-buildbuddy' && 'buildbuddy-gcp-executors' || format('buildbuddy-{0}', github.run_id) }}
  cancel-in-progress: false

env:
  CARGO_HOME: /tmp/meerkat-cargo-home
  RUSTUP_TOOLCHAIN: 1.94.0
  MEERKAT_BUILDBUDDY: ${{ vars.MEERKAT_BUILDBUDDY || 'false' }}
  MEERKAT_BAZEL_BACKEND: ${{ inputs.backend || 'buildbuddy-hosted' }}
  BUILDBUDDY_BAZEL_CONFIG: ${{ (inputs.backend || '') == 'gcp-local' && 'gcp-linux' || (inputs.backend || '') == 'gcp-buildbuddy' && 'buildbuddy-linux-gcp-ci-rbe' || '' }}
  BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
  BUILDBUDDY_ENDPOINT: ${{ secrets.BUILDBUDDY_ENDPOINT }}
  BUILDBUDDY_GRPC_URL: ""
  BUILDBUDDY_HTTP_URL: ""
  MEERKAT_GCP_PROJECT_ID: ${{ vars.MEERKAT_GCP_PROJECT_ID || 'king-dnn-training-dev' }}
  MEERKAT_GCP_REGION: ${{ vars.MEERKAT_GCP_REGION || 'europe-west1' }}
  MEERKAT_GCP_ZONE: ${{ vars.MEERKAT_GCP_ZONE || 'europe-west1-b' }}
  MEERKAT_GCP_BUILDBUDDY_CONTROL_INSTANCE: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CONTROL_INSTANCE || 'meerkat-bb-control' }}
  MEERKAT_GCP_BUILDBUDDY_CONTROL_MACHINE_TYPE: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CONTROL_MACHINE_TYPE || 'c3d-standard-8' }}
  MEERKAT_GCP_BUILDBUDDY_CONTROL_DATA_DISK_GB: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CONTROL_DATA_DISK_GB || '1000' }}
  MEERKAT_GCP_BUILDBUDDY_MIG: ${{ vars.MEERKAT_GCP_BUILDBUDDY_MIG || 'meerkat-bb-exec' }}
  MEERKAT_GCP_BUILDBUDDY_TARGET_SIZE: ${{ vars.MEERKAT_GCP_BUILDBUDDY_TARGET_SIZE || '12' }}
  MEERKAT_GCP_BUILDBUDDY_MACHINE_TYPE: ${{ vars.MEERKAT_GCP_BUILDBUDDY_MACHINE_TYPE || 'c3d-standard-30' }}
  MEERKAT_GCP_BUILDBUDDY_BOOT_DISK_GB: ${{ vars.MEERKAT_GCP_BUILDBUDDY_BOOT_DISK_GB || '1000' }}
  MEERKAT_GCP_BUILDBUDDY_CI_MAX_SECONDS: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CI_MAX_SECONDS || '600' }}
  MEERKAT_BUILDBUDDY_EXECUTOR_POOL: ${{ vars.MEERKAT_BUILDBUDDY_EXECUTOR_POOL || 'meerkat-ci' }}
  MEERKAT_BUILDBUDDY_CI_IMAGE: ${{ vars.MEERKAT_BUILDBUDDY_CI_IMAGE || 'europe-west1-docker.pkg.dev/king-dnn-training-dev/meerkat-ci/meerkat-ci-rust:1.94.0' }}
  MEERKAT_HOST_CARGO_HOME: /usr/local/cargo
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  RKAT_ANTHROPIC_API_KEY: ${{ secrets.RKAT_ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  RKAT_OPENAI_API_KEY: ${{ secrets.RKAT_OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  RKAT_GEMINI_API_KEY: ${{ secrets.RKAT_GEMINI_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
  MEERKAT_E2E_AUTH_OPENAI_OAUTH_TOKENS_JSON: ${{ secrets.MEERKAT_E2E_AUTH_OPENAI_OAUTH_TOKENS_JSON }}
  MEERKAT_E2E_AUTH_ANTHROPIC_MODEL: ${{ secrets.MEERKAT_E2E_AUTH_ANTHROPIC_MODEL }}
  MEERKAT_E2E_AUTH_GEMINI_MODEL: ${{ secrets.MEERKAT_E2E_AUTH_GEMINI_MODEL }}
  MEERKAT_E2E_AUTH_VERTEX_CANARY: ${{ secrets.MEERKAT_E2E_AUTH_VERTEX_CANARY }}
  MEERKAT_CLEAN_E2E_SCENARIO_TARGETS: "1"
  MEERKAT_BUILDBUDDY_CI_JOBS: ${{ vars.MEERKAT_BUILDBUDDY_CI_JOBS || '8' }}

jobs:
  gcp-control-plane-up:
    name: GCP BuildBuddy control plane
    if: ${{ (inputs.backend || 'buildbuddy-hosted') == 'gcp-buildbuddy' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || ((vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      grpc_url: ${{ steps.endpoint.outputs.grpc_url }}
      http_url: ${{ steps.endpoint.outputs.http_url }}
      started_at_epoch: ${{ steps.capture-start.outputs.started_at_epoch }}
    steps:
      - name: Capture GCP CI start time
        id: capture-start
        shell: bash
        run: echo "started_at_epoch=$(date +%s)" >> "${GITHUB_OUTPUT}"
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Authenticate to GCP with Workload Identity
        if: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.MEERKAT_GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.MEERKAT_GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.MEERKAT_GCP_PROJECT_ID }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
      - name: Authenticate to GCP with JSON fallback
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if gcloud auth list --filter=status:ACTIVE --format='value(account)' | grep -q .; then
            exit 0
          fi
          if [[ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ]]; then
            echo "GCP auth is required for gcp-buildbuddy CI. Configure Workload Identity variables or GOOGLE_APPLICATION_CREDENTIALS_JSON." >&2
            exit 1
          fi
          key_file="${RUNNER_TEMP}/gcp-key.json"
          printf '%s' "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" > "${key_file}"
          gcloud auth activate-service-account --key-file "${key_file}"
          rm -f "${key_file}"
      - name: Ensure self-hosted BuildBuddy control plane
        shell: bash
        run: scripts/gcp-buildbuddy-control-plane ensure
      - name: Resolve self-hosted BuildBuddy endpoint
        id: endpoint
        shell: bash
        run: scripts/gcp-buildbuddy-control-plane endpoint github-output
      - name: Wait for BuildBuddy HTTP
        shell: bash
        env:
          BUILDBUDDY_HTTP_URL: ${{ steps.endpoint.outputs.http_url }}
        run: |
          for attempt in {1..60}; do
            if curl -fsS "${BUILDBUDDY_HTTP_URL}/" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          scripts/gcp-buildbuddy-control-plane logs
          exit 1

  gcp-executors-up:
    name: GCP BuildBuddy executors up
    if: ${{ (inputs.backend || 'buildbuddy-hosted') == 'gcp-buildbuddy' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || ((vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository))) }}
    needs: [gcp-control-plane-up]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.gcp-control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.gcp-control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.gcp-control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.gcp-control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Authenticate to GCP with Workload Identity
        if: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.MEERKAT_GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.MEERKAT_GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.MEERKAT_GCP_PROJECT_ID }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
      - name: Authenticate to GCP with JSON fallback
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if gcloud auth list --filter=status:ACTIVE --format='value(account)' | grep -q .; then
            exit 0
          fi
          if [[ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ]]; then
            echo "GCP auth is required for gcp-buildbuddy CI. Configure Workload Identity variables or GOOGLE_APPLICATION_CREDENTIALS_JSON." >&2
            exit 1
          fi
          key_file="${RUNNER_TEMP}/gcp-key.json"
          printf '%s' "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" > "${key_file}"
          gcloud auth activate-service-account --key-file "${key_file}"
          rm -f "${key_file}"
      - name: Sync BuildBuddy executor secrets
        shell: bash
        run: scripts/gcp-buildbuddy-executor-pool sync-secrets
      - name: Scale up BuildBuddy executors
        shell: bash
        run: scripts/gcp-buildbuddy-executor-pool up

  gcp-native-submit:
    name: GCP BuildBuddy submitter
    if: ${{ (inputs.backend || 'buildbuddy-hosted') == 'gcp-buildbuddy' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || ((vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository))) }}
    needs: [gcp-control-plane-up, gcp-executors-up]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.gcp-control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.gcp-control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.gcp-control-plane-up.outputs.grpc_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Select GCP BuildBuddy lanes
        id: gcp-lanes
        shell: bash
        run: |
          {
            echo "lanes<<LANES"
            printf '%s\n' \
              fmt-static \
              cargo-all-features-clippy \
              test-unit \
              integration-fast
            echo "LANES"
          } >> "${GITHUB_OUTPUT}"
      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        with:
          group: gcp
          profile: submitter
          mode: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.mode || vars.MEERKAT_BUILDBUDDY_CI_MODE || 'full-fresh') || 'full-fresh' }}
          lanes: ${{ steps.gcp-lanes.outputs.lanes }}

  gcp-governance-submit:
    name: GCP BuildBuddy governance submitter
    if: ${{ (inputs.backend || 'buildbuddy-hosted') == 'gcp-buildbuddy' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || ((vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository))) }}
    needs: [gcp-control-plane-up, gcp-executors-up]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.gcp-control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.gcp-control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.gcp-control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.gcp-control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Detect machine-authority changes
        id: machine-changes
        shell: bash
        env:
          MACHINE_AUTHORITY_BASE_SHA: ${{ inputs.machine_authority_base_sha || '' }}
          MACHINE_AUTHORITY_HEAD_SHA: ${{ inputs.machine_authority_head_sha || github.sha }}
        run: |
          changed=true
          if [[ -z "${MACHINE_AUTHORITY_BASE_SHA}" && "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if git fetch --no-tags --depth=1 origin main; then
              MACHINE_AUTHORITY_BASE_SHA="$(git rev-parse FETCH_HEAD)"
              echo "Using origin/main (${MACHINE_AUTHORITY_BASE_SHA}) as the workflow_dispatch diff base."
            else
              echo "Could not fetch origin/main; running machine authority conservatively."
            fi
          fi

          if [[ -n "${MACHINE_AUTHORITY_BASE_SHA}" && "${MACHINE_AUTHORITY_BASE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            if ! git cat-file -e "${MACHINE_AUTHORITY_BASE_SHA}^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=1 origin "${MACHINE_AUTHORITY_BASE_SHA}" || true
            fi
            set +e
            scripts/machine-authority-changed --base "${MACHINE_AUTHORITY_BASE_SHA}" --head "${MACHINE_AUTHORITY_HEAD_SHA}"
            status="$?"
            set -e
            case "${status}" in
              0) changed=true ;;
              1) changed=false ;;
              *)
                echo "Machine-authority diff failed; running conservative check."
                changed=true
                ;;
            esac
          else
            echo "No reliable diff base; running machine authority."
          fi
          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"
      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        if: ${{ steps.machine-changes.outputs.changed == 'true' }}
        with:
          group: gcp-governance
          profile: submitter
          mode: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.mode || vars.MEERKAT_BUILDBUDDY_CI_MODE || 'full-fresh') || 'full-fresh' }}
          lanes: |
            seam-inventory
            rmat-audit
            machine-authority
      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        if: ${{ steps.machine-changes.outputs.changed != 'true' }}
        with:
          group: gcp-governance
          profile: submitter
          mode: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.mode || vars.MEERKAT_BUILDBUDDY_CI_MODE || 'full-fresh') || 'full-fresh' }}
          lanes: |
            seam-inventory
            rmat-audit

  gcp-wasm-feature-submit:
    name: GCP BuildBuddy wasm and feature submitter
    if: ${{ (inputs.backend || 'buildbuddy-hosted') == 'gcp-buildbuddy' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || ((vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository))) }}
    needs: [gcp-control-plane-up, gcp-executors-up]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.gcp-control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.gcp-control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.gcp-control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.gcp-control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        with:
          group: gcp-wasm-feature
          profile: submitter
          mode: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.mode || vars.MEERKAT_BUILDBUDDY_CI_MODE || 'full-fresh') || 'full-fresh' }}
          lanes: |
            sdk-suites
            wasm-check
            test-minimal
            test-feature-matrix-lib
            test-feature-matrix-surface-checks
            audit

  gcp-executors-down:
    name: GCP BuildBuddy executors down
    if: ${{ always() && (inputs.backend || 'buildbuddy-hosted') == 'gcp-buildbuddy' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || ((vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository))) }}
    needs:
      - gcp-executors-up
      - gcp-native-submit
      - gcp-governance-submit
      - gcp-wasm-feature-submit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Authenticate to GCP with Workload Identity
        if: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.MEERKAT_GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.MEERKAT_GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.MEERKAT_GCP_PROJECT_ID }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
      - name: Authenticate to GCP with JSON fallback
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if gcloud auth list --filter=status:ACTIVE --format='value(account)' | grep -q .; then
            exit 0
          fi
          if [[ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ]]; then
            echo "GCP auth is required to scale down gcp-buildbuddy executors." >&2
            exit 1
          fi
          key_file="${RUNNER_TEMP}/gcp-key.json"
          printf '%s' "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" > "${key_file}"
          gcloud auth activate-service-account --key-file "${key_file}"
          rm -f "${key_file}"
      - name: Scale down BuildBuddy executors
        shell: bash
        env:
          MEERKAT_GCP_BUILDBUDDY_WAIT_ON_DOWN: ${{ vars.MEERKAT_GCP_BUILDBUDDY_WAIT_ON_DOWN || '0' }}
          MEERKAT_GCP_BUILDBUDDY_WAIT_TIMEOUT: ${{ vars.MEERKAT_GCP_BUILDBUDDY_WAIT_TIMEOUT || '900' }}
        run: |
          gcloud compute instance-groups managed resize "${MEERKAT_GCP_BUILDBUDDY_MIG}" \
            --project "${MEERKAT_GCP_PROJECT_ID}" \
            --zone "${MEERKAT_GCP_ZONE}" \
            --size 0 \
            --quiet

          case "${MEERKAT_GCP_BUILDBUDDY_WAIT_ON_DOWN}" in
            0|false|False|FALSE|no|No|NO)
              echo "Skipping wait for executor pool scale-down; target size is set to 0."
              ;;
            *)
              gcloud compute instance-groups managed wait-until "${MEERKAT_GCP_BUILDBUDDY_MIG}" \
                --project "${MEERKAT_GCP_PROJECT_ID}" \
                --zone "${MEERKAT_GCP_ZONE}" \
                --stable \
                --timeout "${MEERKAT_GCP_BUILDBUDDY_WAIT_TIMEOUT}"
              ;;
          esac

          gcloud compute instance-groups managed describe "${MEERKAT_GCP_BUILDBUDDY_MIG}" \
            --project "${MEERKAT_GCP_PROJECT_ID}" \
            --zone "${MEERKAT_GCP_ZONE}" \
            --format='table(name,targetSize,currentActions.creating,currentActions.deleting,currentActions.recreating,currentActions.refreshing,currentActions.restarting,currentActions.verifying)'

  doctor:
    name: BuildBuddy doctor
    if: ${{ (inputs.backend || 'buildbuddy-hosted') == 'buildbuddy-hosted' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || ((vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository))) }}
    runs-on: ${{ fromJSON(vars.MEERKAT_CI_RUNNER || '"ubuntu-latest"') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup BuildBuddy CI
        uses: ./.github/actions/setup-buildbuddy-ci
        with:
          profile: doctor

      - name: BuildBuddy doctor
        run: make buildbuddy-doctor

  fmt-lint:
    name: Format, lint, and static checks
    if: ${{ (inputs.backend || 'buildbuddy-hosted') != 'gcp-buildbuddy' && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || ((vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository))) }}
    runs-on: ${{ fromJSON(vars.MEERKAT_CI_RUNNER || '"ubuntu-latest"') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/run-buildbuddy-ci-lane
        with:
          lane: fmt-lint
          profile: native
