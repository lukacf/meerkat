name: Cargo CI

# The only CI lane. Runs entirely on free GitHub-hosted standard runners with
# a ~10-minute wall-clock target: many small parallel jobs, sccache
# (content-addressed compile cache) + mold (fast linker), and path gating so
# work scales with what actually changed.
#
# Per-push jobs:
#   changes         — path classification (docs-only skips Rust; SDK-relevant
#                     paths enable the full Web SDK suite)
#   fmt-governance  — fmt + surface gates + typed governance gates
#   clippy          — workspace clippy, all features, lib/bin targets
#                     (--all-targets multiplies build volume several-fold for
#                     test-only lint yield; it runs nightly)
#   unit (x8)       — lib unit tests, nextest hash-partitioned
#   int-heavy (x3)  — meerkat-integration-tests integration lane
#   int-rest (x7)   — integration tests in crate-group lanes (heavy groups
#                     also hash-partitioned); the last
#                     group is the complement of the named ones
#   e2e-fast        — deterministic end-to-end lane (real binaries)
#   ratchets        — version/schema/SDK/surface generation ratchets
#   wasm-check      — wasm32 cargo check (every code change)
#   wasm-contract   — wasm-pack browser contract test in headless Chrome;
#                     only when wasm contract surfaces changed
#   sdk-web         — full Web SDK suite (wasm-pack + wasm-opt + node tests);
#                     only when SDK-relevant paths changed
#   audit           — cargo-deny security/license audit
#   gate            — aggregate (branch protection targets ci.yml's "CI gate")
#
# Deferred to nightly.yml: feature matrices, minimal-feature build,
# surface-modularity, e2e-system, clippy --all-targets, release packaging,
# unconditional Web SDK suite.

on:
  workflow_call:
    inputs:
      base_sha:
        description: Base revision for changed-path gating.
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      base_sha:
        description: Optional base revision for changed-path gating.
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Stable per-VM Cargo home: hosted runners are fresh per job, and cache
  # reuse (rust-cache + sccache) requires registry source paths that do not
  # change between runs.
  CARGO_HOME: /home/runner/.cargo
  RUSTUP_TOOLCHAIN: 1.94.0
  # Keep repo-cargo's per-worktree redirection out of CI: pin the target dir
  # where Swatinem/rust-cache caches it (scripts/repo-cargo respects a
  # pre-set CARGO_TARGET_DIR).
  CARGO_TARGET_DIR: ${{ github.workspace }}/target
  # CI never reuses incremental state across compiles within a job, and
  # debuginfo in test binaries only bloats the cache; both off for speed.
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  # sccache is content-addressed, so it survives fresh-checkout mtimes (which
  # defeat cargo's own fingerprints for workspace crates) and is shared
  # across the divergent CARGO_TARGET_DIRs the xtask gate scripts use.
  SCCACHE_GHA_ENABLED: "true"
  # Cache-service hiccups must degrade to plain compiles, never fail a job.
  SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

jobs:
  changes:
    name: Change classification
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.classify.outputs.code_changed }}
      sdk_changed: ${{ steps.classify.outputs.sdk_changed }}
      wasm_changed: ${{ steps.classify.outputs.wasm_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: classify
        env:
          BASE_SHA: ${{ inputs.base_sha || '' }}
        run: |
          set -euo pipefail
          code_changed=true
          sdk_changed=true
          wasm_changed=true
          if [[ -n "${BASE_SHA}" && "${BASE_SHA}" != "0000000000000000000000000000000000000000" ]] \
            && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            changed=$(git diff --name-only "${BASE_SHA}...HEAD")
            # Docs-only changes (docs trees, markdown, agent config) skip the
            # Rust jobs entirely. Anything else — or an unknown base — runs
            # the full lane (fail open into MORE CI, never less).
            if ! grep -qvE '^(docs/|docs-internal/|\.claude/|CHANGELOG\.md|README\.md|.*\.md$)' <<<"${changed}"; then
              code_changed=false
            fi
            # The full Web SDK suite (wasm-pack + wasm-opt + node tests) is
            # inherently slow; run it per push only when SDK-relevant
            # surfaces changed. wasm-check still runs on every code change,
            # and nightly runs the full suite unconditionally.
            if ! grep -qE '^(sdks/|meerkat-web-runtime/|meerkat-contracts/|meerkat-core/|artifacts/schemas/|Cargo\.(toml|lock)|Makefile|\.github/)' <<<"${changed}"; then
              sdk_changed=false
            fi
            # The browser contract test (wasm-pack + headless Chrome) is the
            # executable semantic mirror of the browser surface; per push it
            # runs only when the wasm contract surfaces changed. wasm-check
            # still type-checks it on every code change, and nightly executes
            # it unconditionally.
            if ! grep -qE '^(meerkat-web-runtime/|meerkat-contracts/|sdks/web/|\.github/workflows/cargo\.yml)' <<<"${changed}"; then
              wasm_changed=false
            fi
          fi
          echo "code_changed=${code_changed}" >> "$GITHUB_OUTPUT"
          echo "sdk_changed=${sdk_changed}" >> "$GITHUB_OUTPUT"
          echo "wasm_changed=${wasm_changed}" >> "$GITHUB_OUTPUT"
          echo "code_changed=${code_changed} sdk_changed=${sdk_changed} wasm_changed=${wasm_changed}"

  fmt-governance:
    name: Format + governance gates
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup mold linker
        uses: rui314/setup-mold@v1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # One cache key PER JOB: with a single shared key only the first
          # job to save wins and every other job stays cold forever.
          shared-key: ci-governance

      - name: Format check
        run: make fmt-check

      - name: Surface/backend gates
        run: make legacy-surface-gate session-control-gate deprecated-backend-gate bridge-no-responsestatus-gate

      - name: Dogma skill docs mirror
        run: make sync-meerkat-dogma-skill-docs

      - name: Typed governance gates (rmat-audit set)
        run: make rmat-audit

      - name: Seam inventory (strict)
        run: make seam-inventory

      - name: Runtime authority bypass audit
        run: make runtime-authority-bypass

      - name: Machine authority docs gate
        run: make machine-authority-docs-gate

      - name: Machine poster coverage
        run: make verify-machine-poster-coverage

      - name: Generated headers audit
        run: make audit-generated-headers

  clippy:
    name: Clippy (workspace, all features)
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup mold linker
        uses: rui314/setup-mold@v1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-clippy

      - name: Clippy (lib/bin targets; --all-targets runs nightly)
        run: ./scripts/repo-cargo clippy --workspace --all-features -- -D warnings

  unit:
    name: Unit tests (shard ${{ matrix.partition }}/8)
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4, 5, 6, 7, 8]
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup mold linker
        uses: rui314/setup-mold@v1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # unit builds only lib-test binaries; int builds only integration
          # binaries — separate lanes so neither pays the other's link cost.
          shared-key: ci-unit

      - name: Install nextest
        uses: taiki-e/install-action@nextest
        env:
          HOME: ${{ runner.temp }}/install-action-home-${{ github.job }}

      - name: Unit tests (shard)
        run: ./scripts/repo-cargo unit --partition "hash:${{ matrix.partition }}/8"

  # Integration tests split by BUILD scope, not just run partition: linking
  # every integration binary in the workspace is the dominant fixed cost, and
  # meerkat-integration-tests owns the biggest binaries. Coverage is complete
  # by construction: one crate + workspace-minus-that-crate.
  int-heavy:
    name: Integration tests, meerkat-integration-tests (shard ${{ matrix.partition }}/3)
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3]
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup mold linker
        uses: rui314/setup-mold@v1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-int-heavy

      - name: Install nextest
        uses: taiki-e/install-action@nextest
        env:
          HOME: ${{ runner.temp }}/install-action-home-${{ github.job }}

      - name: Integration-fast tests (integration crate shard)
        run: >-
          ./scripts/repo-cargo nextest run -p meerkat-integration-tests --tests
          --profile fast --show-progress none --status-level none
          --final-status-level fail --partition "hash:${{ matrix.partition }}/3"

  int-rest:
    name: Integration tests, ${{ matrix.group }} crates
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Crate-group lanes: each job builds and links ONLY its group's
      # integration binaries (linking all ~44 crates' test bins per shard was
      # the dominant fixed cost). The `everything-else` group is the
      # COMPLEMENT of the named groups, so coverage stays complete by
      # construction — a new crate lands there automatically.
      matrix:
        include:
          - group: mob-1of2
            partition: "hash:1/2"
            scope: >-
              -p meerkat-mob -p meerkat-mob-adaptive -p meerkat-mob-mcp
              -p meerkat-mob-pack -p meerkat-schedule -p meerkat-workgraph
          - group: mob-2of2
            partition: "hash:2/2"
            scope: >-
              -p meerkat-mob -p meerkat-mob-adaptive -p meerkat-mob-mcp
              -p meerkat-mob-pack -p meerkat-schedule -p meerkat-workgraph
          - group: core-machine
            partition: "hash:1/1"
            scope: >-
              -p meerkat-core -p meerkat-models -p meerkat-machine-codegen
              -p meerkat-machine-derive -p meerkat-machine-dsl
              -p meerkat-machine-dsl-core -p meerkat-machine-kernels
              -p meerkat-machine-schema -p machine-dsl-tests
              -p meerkat-capabilities -p meerkat-agent-build-authority
              -p meerkat-contracts
          - group: client-session
            partition: "hash:1/1"
            scope: >-
              -p meerkat-anthropic -p meerkat-auth-core -p meerkat-client
              -p meerkat-comms -p meerkat-gemini -p meerkat-hooks
              -p meerkat-llm-core -p meerkat-mcp -p meerkat-memory
              -p meerkat-openai -p meerkat-providers -p meerkat-session
              -p meerkat-skills -p meerkat-store -p meerkat-tools
          - group: everything-else-1of3
            partition: "hash:1/3"
            scope: >-
              --workspace --exclude meerkat-integration-tests
              --exclude meerkat-mob --exclude meerkat-mob-adaptive
              --exclude meerkat-mob-mcp --exclude meerkat-mob-pack
              --exclude meerkat-schedule --exclude meerkat-workgraph
              --exclude meerkat-core --exclude meerkat-models
              --exclude meerkat-machine-codegen --exclude meerkat-machine-derive
              --exclude meerkat-machine-dsl --exclude meerkat-machine-dsl-core
              --exclude meerkat-machine-kernels --exclude meerkat-machine-schema
              --exclude machine-dsl-tests --exclude meerkat-capabilities
              --exclude meerkat-agent-build-authority --exclude meerkat-contracts
              --exclude meerkat-anthropic --exclude meerkat-auth-core
              --exclude meerkat-client --exclude meerkat-comms
              --exclude meerkat-gemini --exclude meerkat-hooks
              --exclude meerkat-llm-core --exclude meerkat-mcp
              --exclude meerkat-memory --exclude meerkat-openai
              --exclude meerkat-providers --exclude meerkat-session
              --exclude meerkat-skills --exclude meerkat-store
              --exclude meerkat-tools
          - group: everything-else-2of3
            partition: "hash:2/3"
            scope: >-
              --workspace --exclude meerkat-integration-tests
              --exclude meerkat-mob --exclude meerkat-mob-adaptive
              --exclude meerkat-mob-mcp --exclude meerkat-mob-pack
              --exclude meerkat-schedule --exclude meerkat-workgraph
              --exclude meerkat-core --exclude meerkat-models
              --exclude meerkat-machine-codegen --exclude meerkat-machine-derive
              --exclude meerkat-machine-dsl --exclude meerkat-machine-dsl-core
              --exclude meerkat-machine-kernels --exclude meerkat-machine-schema
              --exclude machine-dsl-tests --exclude meerkat-capabilities
              --exclude meerkat-agent-build-authority --exclude meerkat-contracts
              --exclude meerkat-anthropic --exclude meerkat-auth-core
              --exclude meerkat-client --exclude meerkat-comms
              --exclude meerkat-gemini --exclude meerkat-hooks
              --exclude meerkat-llm-core --exclude meerkat-mcp
              --exclude meerkat-memory --exclude meerkat-openai
              --exclude meerkat-providers --exclude meerkat-session
              --exclude meerkat-skills --exclude meerkat-store
              --exclude meerkat-tools
          - group: everything-else-3of3
            partition: "hash:3/3"
            scope: >-
              --workspace --exclude meerkat-integration-tests
              --exclude meerkat-mob --exclude meerkat-mob-adaptive
              --exclude meerkat-mob-mcp --exclude meerkat-mob-pack
              --exclude meerkat-schedule --exclude meerkat-workgraph
              --exclude meerkat-core --exclude meerkat-models
              --exclude meerkat-machine-codegen --exclude meerkat-machine-derive
              --exclude meerkat-machine-dsl --exclude meerkat-machine-dsl-core
              --exclude meerkat-machine-kernels --exclude meerkat-machine-schema
              --exclude machine-dsl-tests --exclude meerkat-capabilities
              --exclude meerkat-agent-build-authority --exclude meerkat-contracts
              --exclude meerkat-anthropic --exclude meerkat-auth-core
              --exclude meerkat-client --exclude meerkat-comms
              --exclude meerkat-gemini --exclude meerkat-hooks
              --exclude meerkat-llm-core --exclude meerkat-mcp
              --exclude meerkat-memory --exclude meerkat-openai
              --exclude meerkat-providers --exclude meerkat-session
              --exclude meerkat-skills --exclude meerkat-store
              --exclude meerkat-tools
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup mold linker
        uses: rui314/setup-mold@v1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-int-${{ matrix.group }}

      - name: Install nextest
        uses: taiki-e/install-action@nextest
        env:
          HOME: ${{ runner.temp }}/install-action-home-${{ github.job }}

      - name: Integration-fast tests (crate group)
        run: >-
          ./scripts/repo-cargo nextest run ${{ matrix.scope }} --tests
          --profile fast --show-progress none --status-level none
          --final-status-level fail --partition "${{ matrix.partition }}"

  e2e-fast:
    name: Deterministic e2e lane
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup mold linker
        uses: rui314/setup-mold@v1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-e2e

      - name: Install nextest
        uses: taiki-e/install-action@nextest
        env:
          HOME: ${{ runner.temp }}/install-action-home-${{ github.job }}

      - name: Deterministic e2e lane
        run: make e2e-fast

  ratchets:
    name: Generation ratchets
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup mold linker
        uses: rui314/setup-mold@v1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-ratchets

      - name: Docs validation
        run: make docs-check

      - name: Verify version parity
        run: make verify-version-parity

      - name: Verify schema freshness
        run: make verify-schema-freshness

      - name: Verify SDK codegen freshness
        run: make verify-sdk-codegen-freshness

      - name: Verify SDK event inventory
        run: make verify-sdk-event-inventory

      - name: Verify RPC surface alignment
        run: make verify-rpc-surface-alignment

      - name: Verify REST surface alignment
        run: make verify-rest-surface-alignment

      - name: Verify SDK wrapper freshness
        run: make verify-sdk-wrapper-freshness

      - name: Verify generated machine kernels are not stale
        run: make machine-check-drift
      # check-rust-release-packaging dry-run-packages every release crate
      # (each `cargo package` compiles the crate in isolation) — ~1h on a
      # 4-core runner. It is release hygiene, re-verified by release_validate
      # at release time, and runs nightly instead of per push.

  wasm-check:
    name: wasm32 check
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-wasm-check

      - name: WASM runtime check
        run: make wasm-check

  wasm-contract:
    name: WASM browser contract
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' && needs.changes.outputs.wasm_changed == 'true' }}
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      RUSTFLAGS: '--cfg getrandom_backend="wasm_js"'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        shell: bash
        run: |
          set -euo pipefail
          version="0.13.1"
          archive="wasm-pack-v${version}-x86_64-unknown-linux-musl.tar.gz"
          curl --fail --location --retry 5 --retry-delay 2 \
            "https://github.com/wasm-bindgen/wasm-pack/releases/download/v${version}/${archive}" \
            --output "/tmp/${archive}"
          tar -xzf "/tmp/${archive}" -C /tmp
          install -m 0755 "/tmp/wasm-pack-v${version}-x86_64-unknown-linux-musl/wasm-pack" "$HOME/.cargo/bin/wasm-pack"
          wasm-pack --version

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-wasm-contract

      - name: Build browser contract test (wasm32)
        run: ./scripts/repo-cargo test -p meerkat-web-runtime --target wasm32-unknown-unknown --test browser_contract --no-run

      - name: Browser contract test (headless Chrome)
        run: wasm-pack test --headless --chrome meerkat-web-runtime --test browser_contract

  sdk-web:
    name: Web SDK build + tests
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' && needs.changes.outputs.sdk_changed == 'true' }}
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      # Dev profile: skips wasm-opt (which dominates the release build — it
      # chews through the opt-level=0 binary for many minutes) and compiles
      # fast. This job runs the node unit tests, which never execute the
      # wasm binary; nightly builds the release profile unconditionally.
      MEERKAT_WEB_WASM_PROFILE: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install wasm-pack
        shell: bash
        run: |
          set -euo pipefail
          version="0.13.1"
          archive="wasm-pack-v${version}-x86_64-unknown-linux-musl.tar.gz"
          curl --fail --location --retry 5 --retry-delay 2 \
            "https://github.com/wasm-bindgen/wasm-pack/releases/download/v${version}/${archive}" \
            --output "/tmp/${archive}"
          tar -xzf "/tmp/${archive}" -C /tmp
          install -m 0755 "/tmp/wasm-pack-v${version}-x86_64-unknown-linux-musl/wasm-pack" "$HOME/.cargo/bin/wasm-pack"
          wasm-pack --version

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-sdk-web

      - name: Web SDK build and tests
        run: make test-sdk-web

  audit:
    name: Security audit
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
        env:
          HOME: ${{ runner.temp }}/install-action-home-${{ github.job }}

      - name: Cargo deny
        run: make audit

  gate:
    name: Cargo lane gate
    if: ${{ always() }}
    needs:
      - changes
      - fmt-governance
      - clippy
      - unit
      - int-heavy
      - int-rest
      - e2e-fast
      - ratchets
      - wasm-check
      - wasm-contract
      - sdk-web
      - audit
    runs-on: ubuntu-latest
    steps:
      - name: Check lane results
        shell: bash
        env:
          RESULTS: >-
            ${{ needs.changes.result }}
            ${{ needs.fmt-governance.result }}
            ${{ needs.clippy.result }}
            ${{ needs.unit.result }}
            ${{ needs.int-heavy.result }}
            ${{ needs.int-rest.result }}
            ${{ needs.e2e-fast.result }}
            ${{ needs.ratchets.result }}
            ${{ needs.wasm-check.result }}
            ${{ needs.wasm-contract.result }}
            ${{ needs.sdk-web.result }}
            ${{ needs.audit.result }}
        run: |
          echo "Job results: ${RESULTS}"
          for result in ${RESULTS}; do
            case "${result}" in
              failure|cancelled)
                echo "::error::A cargo lane job failed or was cancelled."
                exit 1
                ;;
            esac
          done
