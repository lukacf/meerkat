project: "Meerkat 0.5"
last_updated: "2026-03-17"
package_location: ".rct"
execution_form: "rct-development-build-first"
validated_target_baseline_commit: "4e350279"

harness_config:
  reviewer_manifest: ".rct/reviewer-manifest.yaml"
  default_impl:
    cli: codex
    model: gpt-5.2
  default_reviewer:
    cli: codex
    model: gpt-5.2
  build_test:
    check_command: "cargo check --workspace"
    build_command: "cargo build --workspace"
    fast_test_command: "cargo test --workspace --lib --bins --tests"
    timing_warn_seconds: 60
    timing_fail_seconds: 120
  notes:
    - "This is a docs-local checklist. Reviewers are defined in reviewer-manifest.yaml rather than .rct/agents/."
    - "Tasks use requirement-driven done_when clauses and carry owner/touched-file/verification/deletion metadata from the 0.5 implementation plan."
    - "Repo-specific Luka Loop order is build/test first and reviewer gates second."
    - "Reviewer gates may inspect logs/artifacts/files but may not run cargo build/check/test."

phases:
  - id: 0
    title: "Boundary Validation And Representation Foundations"
    status: pending
    reviewers:
      - spec-auditor
      - integration-sheriff
      - rct-guardian
      - performance-gate
    verification_commands:
      - "cargo test -p meerkat-runtime -- --ignored"
      - "cargo test -p meerkat-mcp -- --ignored"
      - "cargo test -p meerkat-web-runtime --target wasm32-unknown-unknown -- --ignored"
      - "cargo test -p meerkat-rpc -- --ignored"
    tasks:
      - id: TASK-001
        spec_id: TYPE-001
        related_spec_ids: [TYPE-002, CONTRACT-001]
        owner: orchestrator
        text: "Define and validate the canonical machine artifact bundle and final machine-mode inventory so every canonical machine has one explicit artifact set and target mode."
        done: false
        done_when: "Boundary-validation tests prove every canonical machine artifact set is present or explicitly absent by mode, and the mode/owner inventory matches the architecture package with no untracked machine."
        touched_files:
          - "docs/architecture/0.5/rct/spec.yaml"
          - "docs/architecture/0.5/rct/traceability.md"
          - "specs/machines/*"
        verification_gate: "machine artifact bundle validation + formalization inventory check"
        real_entrypoint: "cargo xtask machine-check-drift --all"
        deletion_checkpoint: "no machine may rely on external artifact authority"
      - id: TASK-002
        spec_id: TYPE-019
        related_spec_ids: [TYPE-020, CONTRACT-002, CONTRACT-003]
        owner: impl
        text: "Prove the machine-authority/codegen/xtask contract, CI entrypoints, and advanced machine-authority verification shape from the outside before any behavior work depends on them."
        done: false
        done_when: "Generation, verification, and drift commands execute through the repo entrypoints and fail/succeed for the right reasons under deliberate drift."
        touched_files:
          - "xtask/"
          - "Cargo.toml"
          - ".github/workflows/ci.yml"
          - "Makefile"
        verification_gate: "xtask command execution and CI job rehearsal"
        real_entrypoint: "cargo xtask machine-codegen --all && cargo xtask machine-verify --all"
        deletion_checkpoint: "external validate.sh is no longer authoritative"
      - id: TASK-003
        spec_id: TYPE-005
        related_spec_ids: [TYPE-003, CONTRACT-004]
        owner: impl
        text: "Write and pass representation-contract tests for canonical runtime input families at the receipt/replay boundary across memory/sqlite/redb stores and both runtime drivers."
        done: false
        done_when: "Store and driver contract tests prove receipts, lifecycle commits, and recovery preserve the chosen contribution semantics across all supported backends."
        touched_files:
          - "meerkat-runtime/src/store/*"
          - "meerkat-runtime/src/driver/{ephemeral,persistent}.rs"
          - "meerkat-runtime/src/input_ledger.rs"
          - "meerkat-runtime/tests/*"
        verification_gate: "runtime store/recovery contract suite"
        real_entrypoint: "cargo test -p meerkat-runtime recovery -- --ignored"
        deletion_checkpoint: "no untracked replay semantics remain outside runtime/store contracts"
      - id: TASK-004
        spec_id: TYPE-006
        related_spec_ids: [TYPE-004, CONTRACT-005, CONTRACT-006]
        owner: impl
        text: "Write and pass boundary tests for explicit runtime policy/control representations, control-plane preemption, completion-wait resolution, and the completion-aware admission handle shape needed by runtime bridges."
        done: false
        done_when: "Control-plane tests prove stop/dismiss/shutdown preempt ordinary work and resolve completion waiters exactly once."
        touched_files:
