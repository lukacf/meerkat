SPECIFICATION Spec
CONSTANTS
  BooleanValues = {TRUE, FALSE}
  BranchIdValues = {"branchid_1", "branchid_2"}
  CollectionPolicyKindValues = {"collectionpolicykind_1", "collectionpolicykind_2"}
  DependencyModeValues = {"dependencymode_1", "dependencymode_2"}
  MeerkatIdValues = {"meerkatid_1", "meerkatid_2"}
  NatValues = {0, 1, 2}
