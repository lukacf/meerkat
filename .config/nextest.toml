# Nextest configuration for meerkat-0.6-cleanups.
#
# Retry policy is scoped narrowly: the two known pre-existing flakes are
# retried once, everything else runs to completion without retries.

[profile.fast]
# Cargo's default fast lane: unit + integration-fast, with dedicated e2e lane
# wrappers left behind explicit `cargo e2e-*` aliases.
default-filter = 'not binary(e2e_auth_lane) and not binary(e2e_build_lane) and not binary(e2e_fast_lane) and not binary(e2e_system_lane) and not binary(e2e_live_lane) and not binary(e2e_smoke_lane) and not binary(e2e_models_lane)'

[[profile.default.overrides]]
# System-lane tests spawn nested cargo invocations and copy binaries into
# scenario-specific target directories. Running them concurrently under a broad
# workspace nextest run causes cargo lock contention and 300s wrapper timeouts;
# the wrapper binary serializes scenarios through a process-local lock.
filter = 'binary(e2e_system_lane)'
threads-required = "num-cpus"

[[profile.default.overrides]]
# OpenAI Realtime audio smoke scenarios are provider-sensitive: the provider
# can return transcript deltas without output-audio deltas on an otherwise
# valid audio request. Keep the live audio assertions strict, serialize these
# two tests inside the broad e2e-smoke lane, and allow a narrow retry for this
# external no-audio response shape.
filter = 'test(e2e_smoke_s71_live_adapter_channel_lifecycle_rpc_ws) or test(e2e_smoke_s72_live_adapter_model_switch_continuity)'
threads-required = "num-test-threads"
retries = 2

[[profile.default.overrides]]
# D4 / issue #260: provider_tool_use_boundary race. Reduced from ~20% to ~10%
# by drain-and-clear-dirty logic; full elimination blocked on deeper
# runtime-append synchronization work.
filter = 'test(provider_tool_use_boundary_does_not_surface_public_turn_completed_or_flush_canonical_output)'
retries = 2

[[profile.default.overrides]]
# Pre-existing pending-spawn alignment race in concurrent-spawn orchestration.
# Observed historically and by actor-cutover-3 during T5-prep. Not a
# regression introduced by this PR; retries until we land a targeted fix.
filter = 'test(test_concurrent_spawns_parallelize_provisioning)'
retries = 2

# W2-E (#264): the two retries that used to sit here for
# `audio_input_uses_product_session_factory_and_streams_provider_events`
# and `product_session_tool_call_routes_through_session_service_and_continues_provider`
# are gone. The underlying two-read race on `session.state.updated_at`
# between the consumer snapshot and the refresh task's baseline read has
# been eliminated: the realtime socket now reads its baseline atomically
# from the session's DSL-owned `SessionContextHandle` (the same authority
# the DSL emits `SessionContextAdvanced` from), so the consumer and the
# effect stream agree on the frontier by construction.
#
# PR #286 also removed the s44 retry=2 entry that had been added by
# smoke-fixes PR #285 — the lexically-orthogonal SWARM_MARKER_7F3X2A
# marker + the fix in `meerkat-openai/src/live.rs` obviated the need for
# retry absorption on that scenario.
