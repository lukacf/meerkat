name: Run BuildBuddy CI lane
description: Run one visible optional BuildBuddy CI lane and upload its logs.

inputs:
  lane:
    description: BuildBuddy CI lane name.
    required: true
  profile:
    description: "Setup profile: full, native, or doctor."
    required: true
  mode:
    description: BuildBuddy CI mode.
    required: false
    default: full-fresh

runs:
  using: composite
  steps:
    - name: Setup BuildBuddy CI
      uses: ./.github/actions/setup-buildbuddy-ci
      with:
        profile: ${{ inputs.profile }}

    - name: Run BuildBuddy lane
      shell: bash
      env:
        MEERKAT_BUILDBUDDY_CI_MODE: ${{ inputs.mode }}
        MEERKAT_BUILDBUDDY_LOG_ROOT: ${{ runner.temp }}/buildbuddy-logs
        MEERKAT_BUILDBUDDY_REPOSITORY_CACHE: ${{ runner.temp }}/buildbuddy-repository-cache
      run: |
        mkdir -p "${MEERKAT_BUILDBUDDY_LOG_ROOT}"
        mkdir -p "${MEERKAT_BUILDBUDDY_REPOSITORY_CACHE}"
        scripts/buildbuddy-ci-lane "${{ inputs.lane }}"

    - name: Upload BuildBuddy logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildbuddy-${{ inputs.lane }}-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ runner.temp }}/buildbuddy-logs
        if-no-files-found: ignore
