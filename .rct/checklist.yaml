        deletion_checkpoint: "surface-local execution assumptions stop being implicit"
      - id: TASK-008
        spec_id: TYPE-015
        related_spec_ids: [TYPE-016, CONTRACT-013]
        owner: impl
        text: "Write and pass browser boundary tests for runtime bootstrap, façade session handles, runtime-backed turn/event flows, and runtime-scoped browser tool registration."
        done: false
