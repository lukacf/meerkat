# Meerkat cargo configuration

[alias]
# Machine-authority workflow entrypoint
xtask = "run -p xtask --features machine-authority --"

# Fast test suite (unit + integration-fast, skips doctests)
fast = "nextest run --workspace --show-progress none --status-level none --final-status-level fail"
rct = "nextest run --workspace --show-progress none --status-level none --final-status-level fail"

# Unit tests only (no integration tests, skips doctests)
unit = "nextest run --workspace --lib --show-progress none --status-level none --final-status-level fail"

# Integration-fast tests only (ignored tests are not run)
int = "nextest run --workspace --tests --show-progress none --status-level none --final-status-level fail"

# Integration tests that spawn real processes / need binaries (ignored by default)
int-real = "nextest run --workspace --run-ignored ignored-only -E 'test(integration_real)' --test-threads=1"

# End-to-end tests (live APIs / full-system resources, ignored by default)
e2e = "nextest run --workspace --run-ignored ignored-only -E 'test(e2e_)' --test-threads=1"

# Feature matrix helpers (shell aliases to make targets)
test-minimal = "!make test-minimal"
test-feature-matrix-lib = "!make test-feature-matrix-lib"
test-feature-matrix-surface = "!make test-feature-matrix-surface"
test-feature-matrix = "!make test-feature-matrix"

[build]
target-dir = "/tmp/meerkat-target"

[target.wasm32-unknown-unknown]
runner = "wasm-bindgen-test-runner"
