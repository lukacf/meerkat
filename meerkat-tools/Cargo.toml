[package]
name = "meerkat-tools"
description = "Tool validation and dispatch for Meerkat"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true

[[test]]
name = "integration_shell_jobs"
path = "tests/integration_shell_jobs.rs"

[features]
default = ["comms", "mcp", "skills"]
comms = ["dep:meerkat-comms", "dep:parking_lot"]
mcp = ["dep:meerkat-mcp"]
sqlite = ["dep:rusqlite"]
skills = []
integration-real-tests = []

[dependencies]
meerkat-core = { workspace = true }
meerkat-contracts = { workspace = true }
meerkat-skills = { workspace = true }
inventory = { workspace = true }
meerkat-comms = { workspace = true, optional = true }
parking_lot = { workspace = true, optional = true }
meerkat-mcp = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
jsonschema = { workspace = true }
schemars = { workspace = true }
tracing = { workspace = true }
humantime = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
ciborium = "0.2"
toml = { workspace = true }
portable-atomic = "1.11"

[target.'cfg(all(not(target_arch = "wasm32"), not(target_os = "espidf")))'.dependencies]
tokio = { workspace = true }
meerkat-runtime = { workspace = true }
rusqlite = { workspace = true, optional = true }
base64 = "0.22"
shlex = "1.3"
globset = "0.4"
which = { workspace = true }

[target.'cfg(target_os = "espidf")'.dependencies]
tokio = { version = "1.43", default-features = false, features = ["macros", "sync", "time", "rt"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
tokio_with_wasm = { workspace = true }

[target.'cfg(all(unix, not(target_os = "espidf")))'.dependencies]
nix = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["ciborium", "humantime", "toml"]  # feature-gated dependencies

[lints]
workspace = true
