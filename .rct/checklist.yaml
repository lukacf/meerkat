        deletion_checkpoint: "completed_results and transcript/tool-result paths stop being the primary child-lifecycle contract"
      - id: TASK-006
        spec_id: TYPE-013
        related_spec_ids: [TYPE-014, CONTRACT-009]
        owner: impl
        text: "Write and pass boundary tests for one canonical external-tool outward delta/notice contract and pending activation/removal semantics."
        done: false
        done_when: "External-tool contract tests prove one outward typed lifecycle contract covers staged add/remove/reload and pending/remove-drain completion."
        touched_files:
          - "meerkat-mcp/src/router.rs"
          - "meerkat-mcp/src/adapter.rs"
          - "meerkat-mcp/tests/*"
        verification_gate: "external-tool boundary contract suite"
        real_entrypoint: "cargo test -p meerkat-mcp lifecycle -- --ignored"
        deletion_checkpoint: "split outward lifecycle shapes are no longer untracked"
      - id: TASK-007
        spec_id: TYPE-017
        related_spec_ids: [TYPE-018, CONTRACT-010, CONTRACT-011, CONTRACT-012]
        owner: impl
        text: "Write and pass public-contract tests for REST, JSON-RPC, and MCP runtime-backed ingress/run-resume behavior without preserving surface-local execution semantics."
        done: false
        done_when: "Public contract tests prove the planned server-side runtime-backed behavior at the boundary for REST, RPC, and MCP methods."
        touched_files:
          - "meerkat-rest/tests/*"
          - "meerkat-rpc/tests/*"
          - "meerkat-mcp-server/tests/*"
