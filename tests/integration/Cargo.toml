[package]
name = "meerkat-integration-tests"
publish = false
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
meerkat.workspace = true
meerkat-client.workspace = true
meerkat-core.workspace = true
meerkat-machine-kernels.workspace = true
meerkat-mob.workspace = true
meerkat-mob-mcp.workspace = true
meerkat-rpc.workspace = true
meerkat-runtime.workspace = true
meerkat-session.workspace = true
meerkat-store = { workspace = true, features = ["memory", "sqlite"] }
meerkat-tools.workspace = true
serde = { workspace = true }
serde_json.workspace = true
tokio.workspace = true
async-trait.workspace = true
uuid = { workspace = true, features = ["v4"] }

[features]
integration-real-tests = []

[[test]]
name = "live_mob_tools"
path = "tests/live_mob_tools.rs"
required-features = ["integration-real-tests"]

[[test]]
name = "smoke_shared_realm"
path = "tests/smoke_shared_realm.rs"

[[test]]
name = "system_shared_realm"
path = "tests/system_shared_realm.rs"

[package.metadata.cargo-machete]
ignored = [
    "tempfile",  # dev-dependency used in tests
    "meerkat-mob-mcp",  # used in integration tests (live_mob_tools)
    "meerkat-rpc",  # used in integration tests (live_mob_tools)
    "meerkat-runtime",  # transitive, needed for RuntimeSessionAdapter in tests
    "meerkat-session",  # transitive, needed for PersistentSessionService in tests
    "serde",  # used in integration tests
]

[dev-dependencies]
tempfile.workspace = true
reqwest.workspace = true
