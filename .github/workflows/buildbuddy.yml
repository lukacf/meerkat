name: BuildBuddy

on:
  workflow_call:
    inputs:
      mode:
        description: BuildBuddy gate to run
        required: false
        default: changed-committed
        type: string
      changed_mode:
        description: Changed-path selector breadth
        required: false
        default: owned
        type: string
      base:
        description: Base revision for changed-committed mode
        required: false
        default: origin/main
        type: string
      paths:
        description: Whitespace or newline separated paths for changed-paths mode
        required: false
        default: ""
        type: string
    secrets:
      BUILDBUDDY_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      mode:
        description: BuildBuddy gate to run
        required: true
        default: workspace-fresh
        type: choice
        options:
          - workspace-fresh
          - workspace-warm
          - e2e-system
          - changed-committed
          - changed-paths
      changed_mode:
        description: Changed-path selector breadth
        required: true
        default: owned
        type: choice
        options:
          - owned
          - affected
      base:
        description: Base revision for changed-committed mode
        required: false
        default: origin/main
        type: string
      paths:
        description: Whitespace or newline separated paths for changed-paths mode
        required: false
        type: string

permissions:
  contents: read

env:
  CARGO_HOME: /tmp/meerkat-cargo-home

jobs:
  macos-arm64-rbe:
    name: macOS arm64 RBE gate
    runs-on: ubuntu-latest
    env:
      BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: buildbuddy

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Require BuildBuddy API key
        run: |
          if [[ -z "${BUILDBUDDY_API_KEY}" ]]; then
            echo "BUILDBUDDY_API_KEY secret is required for the optional BuildBuddy workflow." >&2
            exit 1
          fi

      - name: Install pinned BuildBuddy CLI
        run: |
          bb_bin="$(scripts/install-buildbuddy-cli --dir "${RUNNER_TEMP}/buildbuddy-cli")"
          echo "$(dirname "${bb_bin}")" >> "${GITHUB_PATH}"

      - name: BuildBuddy doctor
        run: make buildbuddy-doctor

      - name: Remote gate
        env:
          MEERKAT_BUILDBUDDY_CI_MODE: ${{ inputs.mode }}
          MEERKAT_BUILDBUDDY_CHANGED_MODE: ${{ inputs.changed_mode }}
          MEERKAT_BUILDBUDDY_BASE: ${{ inputs.base }}
          MEERKAT_BUILDBUDDY_CHANGED_PATHS: ${{ inputs.paths }}
          MEERKAT_BUILDBUDDY_LOG_ROOT: ${{ runner.temp }}/buildbuddy-logs
        run: |
          set -o pipefail
          mkdir -p "${MEERKAT_BUILDBUDDY_LOG_ROOT}"
          scripts/buildbuddy-ci-dispatch 2>&1 | tee "${MEERKAT_BUILDBUDDY_LOG_ROOT}/dispatch.log"

      - name: Upload BuildBuddy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildbuddy-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/buildbuddy-logs
          if-no-files-found: ignore
