<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeerkatMachine architectural plate</title>
    <style>
    :root {
      --bg: #0b0d0f;
      --shell: #0f1317;
      --plate: #12171b;
      --panel: #141a1f;
      --card: #171e24;
      --border: #2d353c;
      --grid: rgba(234, 226, 214, 0.035);
      --ink: #f4efe5;
      --muted: #b6aea0;
      --faint: #7d7a74;
      --input: #84bfd7;
      --signal: #d8aa57;
      --effect: #8cbe95;
      --routed: #cf6f52;
      --local: #7ab2c7;
      --external: #b7cf7b;
      --accent: #c96d54;
      --sink: #2b1212;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background:
        radial-gradient(circle at 20% 0%, rgba(201, 109, 84, 0.08), transparent 30%),
        radial-gradient(circle at 90% 10%, rgba(132, 191, 215, 0.08), transparent 28%),
        linear-gradient(180deg, #090b0d 0%, #0b0d10 18%, #0b0d0f 100%);
      color: var(--ink);
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
    }
    code, pre, .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .page-shell {
      min-height: 100vh;
      padding: 22px 24px 34px;
    }
    .page-index-link {
      display: inline-block;
      margin: 0 0 12px 6px;
      color: var(--accent);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .architectural-plate {
      width: min(3520px, calc(100vw - 48px));
      max-width: 3520px;
      margin: 0 auto;
      padding: 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 24%),
        linear-gradient(90deg, rgba(255,255,255,0.01), transparent 22%, transparent 78%, rgba(255,255,255,0.01)),
        var(--shell);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 24px;
      box-shadow:
        0 44px 120px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 0 0 1px rgba(0,0,0,0.22);
    }
    .poster-svg {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
    }
    .plate-header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-end;
      padding: 2px 4px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .title-plaque {
      flex: 1 1 auto;
      min-width: 0;
    }
    .eyebrow, .section-label, .cluster__eyebrow, .phase-card__eyebrow {
      color: var(--faint);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    h1 {
      margin: 6px 0 0;
      font-size: clamp(48px, 3.8vw, 84px);
      line-height: 0.94;
      letter-spacing: -0.07em;
      font-weight: 600;
    }
    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      max-width: 44rem;
    }
    .legend-plaque {
      width: 620px;
      display: grid;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      background: rgba(255,255,255,0.025);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .legend-plaque__section {
      display: grid;
      gap: 10px;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 8px;
      min-width: auto;
    }
    .meta-chip, .stat-chip {
      background: rgba(255,255,255,0.018);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 8px 10px;
    }
    .meta-chip span, .stat-chip span {
      display: block;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 10px;
    }
    .meta-chip strong, .stat-chip strong {
      display: block;
      margin-top: 3px;
      color: var(--ink);
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      line-height: 1.35;
    }
    .legend-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .legend-chip {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.018);
    }
    .legend-chip__swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: var(--accent);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
    }
    .legend-chip__swatch--input { background: var(--input); }
    .legend-chip__swatch--signal { background: var(--signal); }
    .legend-chip__swatch--effect { background: var(--effect); }
    .legend-chip strong {
      font-size: 12px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .stat-band {
      display: grid;
      grid-template-columns: repeat(7, minmax(140px, 1fr));
      gap: 10px;
    }
    .canvas-surface {
      position: relative;
      width: calc(var(--canvas-width) * 1px - 52px);
      height: calc(var(--canvas-height) * 1px - 244px);
      margin-top: 18px;
    }
    .sidebar {
      position: absolute;
      display: grid;
      gap: 16px;
      align-content: start;
      z-index: 4;
    }
    .state-panel,
    .effect-panel,
    .invariant-panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 10px 22px rgba(0,0,0,0.16);
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    }
    .state-panel__title {
      margin: 8px 0 0;
      font-size: 19px;
      letter-spacing: -0.035em;
      line-height: 1.05;
    }
    .state-field-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }
    .state-field {
      min-height: 48px;
      padding: 8px 9px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .state-field strong {
      display: block;
      font-size: 12px;
      line-height: 1.3;
    }
    .state-field span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.4;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .schematic-column {
      position: absolute;
      z-index: 3;
    }
    .schematic-plate {
      position: relative;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.028), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,0.012), transparent 12%),
        var(--plate);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        inset 0 0 0 1px rgba(0,0,0,0.12),
        0 18px 42px rgba(0,0,0,0.22);
      overflow: hidden;
      clip-path: polygon(16px 0, calc(100% - 16px) 0, 100% 16px, 100% calc(100% - 16px), calc(100% - 16px) 100%, 16px 100%, 0 calc(100% - 16px), 0 16px);
    }
    .schematic-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .phase-card,
    .cluster {
      position: absolute;
      overflow: hidden;
      border-radius: 14px;
      backdrop-filter: blur(3px);
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    }
    .phase-card {
      padding: 16px 18px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(109,143,160,0.11), rgba(255,255,255,0.03));
      box-shadow:
        0 14px 30px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .phase-card--emphasis {
      border-color: rgba(201,109,84,0.45);
      background: linear-gradient(180deg, rgba(201,109,84,0.16), rgba(255,255,255,0.04));
      box-shadow:
        0 24px 40px rgba(0,0,0,0.24),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .phase-card--sink {
      border-color: rgba(201,109,84,0.5);
      background: linear-gradient(180deg, rgba(68,18,18,0.8), rgba(25,12,12,0.95));
    }
    .phase-card h2 {
      margin: 8px 0 8px;
      font-size: 36px;
      line-height: 0.98;
      letter-spacing: -0.045em;
      font-weight: 600;
    }
    .phase-card__subtitle {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .phase-card__stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      font-size: 11px;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .phase-card__stats span {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .phase-card__stats--secondary span {
      color: var(--muted);
      background: rgba(255,255,255,0.04);
    }
    .cluster {
      padding: 14px 16px 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.028), rgba(255,255,255,0.012));
      box-shadow: 0 16px 34px rgba(0,0,0,0.18);
    }
    .cluster--input {
      border-top: 3px solid var(--input);
    }
    .cluster--signal {
      border-top: 3px solid var(--signal);
    }
    .cluster--hybrid {
      border-top: 3px solid var(--accent);
    }
    .cluster__header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .cluster__header h3 {
      margin: 8px 0 0;
      font-size: 20px;
      line-height: 1.05;
      letter-spacing: -0.035em;
      font-weight: 600;
    }
    .cluster__counts {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-align: right;
    }
    .cluster__grid {
      display: grid;
      grid-template-columns: repeat(var(--cols), minmax(0, 1fr));
      gap: 7px 10px;
      margin-top: 10px;
    }
    .trigger-row {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 6px 0 6px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .trigger-row:first-child,
    .cluster__grid > .trigger-row:nth-child(-n + var(--cols)) {
      border-top: none;
    }
    .trigger-row__kind {
      width: 10px;
      height: 10px;
      margin-top: 5px;
      border-radius: 2px;
      background: var(--accent);
    }
    .trigger-row--input .trigger-row__kind {
      background: var(--input);
    }
    .trigger-row--signal .trigger-row__kind {
      background: var(--signal);
    }
    .trigger-row__name {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: 0.01em;
    }
    .trigger-row__path {
      margin-top: 2px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.3;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .cluster__footer {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      opacity: 0.72;
    }
    .token-lane {
      display: grid;
      grid-template-columns: 66px 1fr;
      gap: 10px;
      align-items: start;
    }
    .token-lane__label {
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 10px;
      padding-top: 4px;
    }
    .token-lane__tokens,
    .effect-chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .token-chip,
    .effect-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 10px;
      line-height: 1.3;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--ink);
    }
    .token-chip--overflow {
      color: var(--muted);
    }
    .bottom-band {
      display: none;
    }
    .effect-lanes {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .effect-lane {
      padding: 12px 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
    }
    .effect-lane__title {
      margin-bottom: 10px;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--faint);
    }
    .effect-lane--routed { border-left: 4px solid var(--routed); }
    .effect-lane--external { border-left: 4px solid var(--external); }
    .effect-lane--local { border-left: 4px solid var(--local); }
    .invariant-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .invariant-card {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
    }
    .invariant-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      letter-spacing: -0.02em;
    }
    .invariant-card pre {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .footer-note {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 16px;
      padding: 14px 4px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: var(--faint);
      font-size: 12px;
      line-height: 1.5;
    }
    .footer-note--plate {
      margin-top: 10px;
    }
    .metrics-rack {
      position: absolute;
      top: 0;
      left: 0;
      display: grid;
      grid-template-columns: repeat(7, minmax(72px, 1fr));
      gap: 8px;
      width: 600px;
      z-index: 5;
    }
    .effect-panel--canvas,
    .invariant-panel--canvas {
      position: absolute;
      z-index: 4;
    }
    @media (max-width: 2200px) {
      .meta-grid {
        grid-template-columns: 1fr 1fr;
        min-width: 480px;
      }
    }
    @media (max-width: 1680px) {
      .plate-header {
        flex-direction: column;
      }
      .legend-plaque {
        width: 100%;
      }
      .meta-grid {
        width: 100%;
      }
      .canvas-surface {
        overflow-x: auto;
        overflow-y: hidden;
      }
    }</style>
  </head>
