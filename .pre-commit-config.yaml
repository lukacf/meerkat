# Pre-commit configuration for Meerkat
# Install: pip install pre-commit
# Setup: pre-commit install && pre-commit install --hook-type pre-push

default_stages: [pre-commit]

repos:
  # On commit: auto-format Rust code
  - repo: local
    hooks:
      - id: cargo-fmt-fix
        name: cargo fmt (auto-fix)
        entry: scripts/repo-cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false

  # On commit: regenerate Bazel BUILD files when Cargo metadata changes.
  # CI rejects stale generated BUILDs; pre-commit refreshes them before
  # the commit lands and pre-commit re-stages the diff. No network.
  - repo: local
    hooks:
      - id: buildbuddy-generate-fix
        name: regenerate Bazel BUILD files (auto-fix)
        entry: node scripts/generate-bazel-rust-builds.mjs
        language: system
        files: '(^Cargo\.toml$|^Cargo\.lock$|^[^/]+/Cargo\.toml$|^MODULE\.bazel$|^scripts/generate-bazel-rust-builds\.mjs$)'
        pass_filenames: false

  # On commit: keep the bundled dogma docs inside the repo-local skill synced
  # from the canonical architecture docs. The hook rewrites stale skill copies
  # and fails so the refreshed files can be staged.
  - repo: local
    hooks:
      - id: sync-meerkat-dogma-skill-docs
        name: sync Meerkat dogma skill docs
        entry: scripts/sync-meerkat-dogma-skill-docs.sh
        language: script
        files: '^(docs/architecture/meerkat-dogma(-commentary)?\.md|\.claude/skills/meerkat-dogma-inquisition/references/meerkat-dogma(-commentary)?\.md|scripts/sync-meerkat-dogma-skill-docs\.sh)$'
        pass_filenames: false

  # Manual: changed-crate deterministic validation when you want a local preflight.
  - repo: local
    hooks:
      - id: agent-check-changed
        name: clippy + deterministic tests (changed crates)
        entry: scripts/agent-gate --staged
        language: script
        types: [rust]
        pass_filenames: false
        stages: [manual]

  # On push: secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        stages: [pre-push]

  # On push: file hygiene checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-push]
      - id: end-of-file-fixer
        stages: [pre-push]
      - id: check-yaml
        stages: [pre-push]
      - id: check-toml
        stages: [pre-push]
      - id: check-merge-conflict
        stages: [pre-push]
      - id: check-added-large-files
        args: ['--maxkb=1000']
        stages: [pre-push]

  # On push: formatting check
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: scripts/repo-cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

  # On push: clippy on changed crates only (falls back to workspace for root manifest changes)
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy (changed crates)
        entry: scripts/pre-push-clippy.sh
        language: script
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

  # On push: machine file codegen + verify
  - repo: local
    hooks:
      - id: machine-codegen-verify
        name: machine codegen + verify (changed files)
        entry: scripts/pre-push-machines.sh
        language: script
        pass_filenames: false
        stages: [pre-push]

  # On push: strict @generated header truthfulness guard
  - repo: local
    hooks:
      - id: audit-generated-headers
        name: audit-generated-headers (every @generated is codegen-emitted)
        entry: scripts/pre-push-audit-generated-headers.sh
        language: script
        pass_filenames: false
        stages: [pre-push]

  # On push: W2-F bridge-classifier gate (no ResponseStatus matches in bridge files)
  - repo: local
    hooks:
      - id: bridge-no-responsestatus
        name: bridge layer must not re-interpret ResponseStatus (W2-F)
        entry: scripts/pre-push-bridge-no-responsestatus.sh
        language: script
        pass_filenames: false
        stages: [pre-push]

  # On push: Bazel BUILD + MODULE.bazel.lock freshness gate
  # Generated BUILD files are auto-fixed on pre-commit, but MODULE.bazel.lock
  # refresh needs `bb mod deps --lockfile_mode=update` (network, requires the
  # pinned `bb` CLI) — too expensive for every commit. This hook fails closed
  # when either gate is stale and prints the exact `make` command to refresh.
  # When `bb` is not installed locally, the lock check is skipped honestly
  # (CI catches it).
  - repo: local
    hooks:
      - id: bazel-locks-freshness
        name: Bazel BUILD + MODULE.bazel.lock freshness
        entry: scripts/pre-push-bazel-locks.sh
        language: script
        pass_filenames: false
        stages: [pre-push]

  # On push: deterministic repo gate
  - repo: local
    hooks:
      - id: cargo-test
        name: workspace deterministic gate
        entry: scripts/pre-push-unit.sh
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]
