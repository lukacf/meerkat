[package]
name = "mdm-tux"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]

[[bin]]
name = "target"
path = "src/bin/target.rs"

[[bin]]
name = "tux"
path = "src/bin/tux.rs"

[dependencies]
meerkat       = { path = "../../meerkat", features = ["comms", "jsonl-store"] }
meerkat-core  = { path = "../../meerkat-core" }
meerkat-comms = { path = "../../meerkat-comms" }
meerkat-tools = { path = "../../meerkat-tools" }
meerkat-store = { path = "../../meerkat-store", features = ["jsonl"] }
tokio         = { version = "1", features = ["full"] }
serde         = { version = "1", features = ["derive"] }
serde_json    = "1"
toml          = "0.8"
ratatui       = "0.29"
crossterm     = "0.28"
anyhow        = "1"
gethostname   = "1"
parking_lot   = "0.12"
tracing       = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
