name: GCP BuildBuddy CI

on:
  workflow_call:
    inputs:
      mode:
        description: GCP BuildBuddy mode.
        required: false
        default: full-fresh
        type: string
      machine_authority_base_sha:
        description: Base revision for machine-authority change detection.
        required: false
        default: ""
        type: string
      machine_authority_head_sha:
        description: Head revision for machine-authority change detection.
        required: false
        default: ""
        type: string
    secrets:
      BUILDBUDDY_API_KEY:
        required: false
      BUILDBUDDY_ENDPOINT:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      RKAT_ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      RKAT_OPENAI_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      RKAT_GEMINI_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      GOOGLE_APPLICATION_CREDENTIALS_JSON:
        required: false
      MEERKAT_E2E_AUTH_OPENAI_OAUTH_TOKENS_JSON:
        required: false
      MEERKAT_E2E_AUTH_ANTHROPIC_MODEL:
        required: false
      MEERKAT_E2E_AUTH_GEMINI_MODEL:
        required: false
      MEERKAT_E2E_AUTH_VERTEX_CANARY:
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: buildbuddy-gcp-executors
  cancel-in-progress: false

env:
  CARGO_HOME: /tmp/meerkat-cargo-home
  RUSTUP_TOOLCHAIN: 1.94.0
  MEERKAT_BAZEL_BACKEND: gcp-buildbuddy
  BUILDBUDDY_BAZEL_CONFIG: buildbuddy-linux-gcp-ci-rbe
  BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
  BUILDBUDDY_ENDPOINT: ${{ secrets.BUILDBUDDY_ENDPOINT }}
  BUILDBUDDY_GRPC_URL: ""
  BUILDBUDDY_HTTP_URL: ""
  MEERKAT_GCP_PROJECT_ID: ${{ vars.MEERKAT_GCP_PROJECT_ID || 'king-dnn-training-dev' }}
  MEERKAT_GCP_REGION: ${{ vars.MEERKAT_GCP_REGION || 'europe-west1' }}
  MEERKAT_GCP_ZONE: ${{ vars.MEERKAT_GCP_ZONE || 'europe-west1-b' }}
  MEERKAT_GCP_BUILDBUDDY_CONTROL_INSTANCE: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CONTROL_INSTANCE || 'meerkat-bb-control' }}
  MEERKAT_GCP_BUILDBUDDY_CONTROL_MACHINE_TYPE: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CONTROL_MACHINE_TYPE || 'c3d-standard-8' }}
  MEERKAT_GCP_BUILDBUDDY_CONTROL_DATA_DISK_GB: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CONTROL_DATA_DISK_GB || '1000' }}
  MEERKAT_GCP_BUILDBUDDY_MIG: ${{ vars.MEERKAT_GCP_BUILDBUDDY_MIG || 'meerkat-bb-exec' }}
  MEERKAT_GCP_BUILDBUDDY_TARGET_SIZE: ${{ vars.MEERKAT_GCP_BUILDBUDDY_TARGET_SIZE || '12' }}
  MEERKAT_GCP_BUILDBUDDY_MACHINE_TYPE: ${{ vars.MEERKAT_GCP_BUILDBUDDY_MACHINE_TYPE || 'c3d-standard-30' }}
  MEERKAT_GCP_BUILDBUDDY_BOOT_DISK_GB: ${{ vars.MEERKAT_GCP_BUILDBUDDY_BOOT_DISK_GB || '100' }}
  MEERKAT_GCP_BUILDBUDDY_CACHE_DISK_GB: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CACHE_DISK_GB || '1000' }}
  MEERKAT_GCP_BUILDBUDDY_CACHE_DISK_TYPE: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CACHE_DISK_TYPE || 'pd-ssd' }}
  MEERKAT_GCP_BUILDBUDDY_DOWN_MODE: ${{ vars.MEERKAT_GCP_BUILDBUDDY_DOWN_MODE || 'stopped' }}
  MEERKAT_GCP_BUILDBUDDY_CI_MAX_SECONDS: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CI_MAX_SECONDS || '900' }}
  MEERKAT_BUILDBUDDY_EXECUTOR_POOL: ${{ vars.MEERKAT_BUILDBUDDY_EXECUTOR_POOL || 'meerkat-ci' }}
  MEERKAT_BUILDBUDDY_CI_IMAGE: ${{ vars.MEERKAT_BUILDBUDDY_CI_IMAGE || 'europe-west1-docker.pkg.dev/king-dnn-training-dev/meerkat-ci/meerkat-ci-rust:1.94.0' }}
  MEERKAT_HOST_CARGO_HOME: /usr/local/cargo
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  RKAT_ANTHROPIC_API_KEY: ${{ secrets.RKAT_ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  RKAT_OPENAI_API_KEY: ${{ secrets.RKAT_OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  RKAT_GEMINI_API_KEY: ${{ secrets.RKAT_GEMINI_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
  MEERKAT_E2E_AUTH_OPENAI_OAUTH_TOKENS_JSON: ${{ secrets.MEERKAT_E2E_AUTH_OPENAI_OAUTH_TOKENS_JSON }}
  MEERKAT_E2E_AUTH_ANTHROPIC_MODEL: ${{ secrets.MEERKAT_E2E_AUTH_ANTHROPIC_MODEL }}
  MEERKAT_E2E_AUTH_GEMINI_MODEL: ${{ secrets.MEERKAT_E2E_AUTH_GEMINI_MODEL }}
  MEERKAT_E2E_AUTH_VERTEX_CANARY: ${{ secrets.MEERKAT_E2E_AUTH_VERTEX_CANARY }}
  MEERKAT_CLEAN_E2E_SCENARIO_TARGETS: "1"
  MEERKAT_BUILDBUDDY_CI_JOBS: ${{ vars.MEERKAT_BUILDBUDDY_CI_JOBS || '192' }}
  MEERKAT_BUILDBUDDY_BATCH_JOBS: ${{ vars.MEERKAT_BUILDBUDDY_BATCH_JOBS || '1' }}

jobs:
  control-plane-up:
    name: Control plane up
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      grpc_url: ${{ steps.endpoint.outputs.grpc_url }}
      http_url: ${{ steps.endpoint.outputs.http_url }}
      started_at_epoch: ${{ steps.capture-start.outputs.started_at_epoch }}
    steps:
      - name: Capture start time
        id: capture-start
        shell: bash
        run: echo "started_at_epoch=$(date +%s)" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Authenticate to GCP with Workload Identity
        if: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.MEERKAT_GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.MEERKAT_GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.MEERKAT_GCP_PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Authenticate to GCP with JSON fallback
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if gcloud auth list --filter=status:ACTIVE --format='value(account)' | grep -q .; then
            exit 0
          fi
          if [[ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ]]; then
            echo "GCP auth is required for GCP BuildBuddy CI." >&2
            exit 1
          fi
          key_file="${RUNNER_TEMP}/gcp-key.json"
          printf '%s' "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" > "${key_file}"
          gcloud auth activate-service-account --key-file "${key_file}"
          rm -f "${key_file}"

      - name: Ensure self-hosted BuildBuddy control plane
        shell: bash
        run: scripts/gcp-buildbuddy-control-plane ensure

      - name: Resolve self-hosted BuildBuddy endpoint
        id: endpoint
        shell: bash
        run: scripts/gcp-buildbuddy-control-plane endpoint github-output

      - name: Wait for BuildBuddy HTTP
        shell: bash
        env:
          BUILDBUDDY_HTTP_URL: ${{ steps.endpoint.outputs.http_url }}
        run: |
          for _ in {1..60}; do
            if curl -fsS "${BUILDBUDDY_HTTP_URL}/" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          scripts/gcp-buildbuddy-control-plane logs
          exit 1

  executors-up:
    name: Executors up
    needs: [control-plane-up]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.control-plane-up.outputs.grpc_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Authenticate to GCP with Workload Identity
        if: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.MEERKAT_GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.MEERKAT_GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.MEERKAT_GCP_PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Authenticate to GCP with JSON fallback
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if gcloud auth list --filter=status:ACTIVE --format='value(account)' | grep -q .; then
            exit 0
          fi
          if [[ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ]]; then
            echo "GCP auth is required for GCP BuildBuddy CI." >&2
            exit 1
          fi
          key_file="${RUNNER_TEMP}/gcp-key.json"
          printf '%s' "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" > "${key_file}"
          gcloud auth activate-service-account --key-file "${key_file}"
          rm -f "${key_file}"

      - name: Sync BuildBuddy executor secrets
        shell: bash
        run: scripts/gcp-buildbuddy-executor-pool sync-secrets

      - name: Scale up BuildBuddy executors
        shell: bash
        run: scripts/gcp-buildbuddy-executor-pool up

  prebuild-submit:
    name: Prebuild submitter
    needs: [control-plane-up, executors-up]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        with:
          group: gcp-prebuild
          profile: submitter
          mode: ${{ inputs.mode || 'full-fresh' }}
          lanes: |
            ci-prebuild

  static-submit:
    name: Static submitter
    needs: [control-plane-up, executors-up]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        with:
          group: gcp-static
          profile: submitter
          mode: ${{ inputs.mode || 'full-fresh' }}
          lanes: |
            fmt-static

  native-submit:
    name: Native submitter
    needs: [control-plane-up, executors-up, prebuild-submit]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Select native lanes
        id: lanes
        shell: bash
        run: |
          {
            echo "lanes<<LANES"
            printf '%s\n' \
              cargo-all-features-clippy \
              test-unit \
              integration-fast
            echo "LANES"
          } >> "${GITHUB_OUTPUT}"

      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        with:
          group: gcp
          profile: submitter
          mode: ${{ inputs.mode || 'full-fresh' }}
          batch_jobs: "2"
          lanes: ${{ steps.lanes.outputs.lanes }}

  governance-submit:
    name: Governance submitter
    needs: [control-plane-up, executors-up]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Detect machine-authority changes
        id: machine-changes
        shell: bash
        env:
          MACHINE_AUTHORITY_BASE_SHA: ${{ inputs.machine_authority_base_sha || '' }}
          MACHINE_AUTHORITY_HEAD_SHA: ${{ inputs.machine_authority_head_sha || github.sha }}
        run: |
          changed=true
          if [[ -z "${MACHINE_AUTHORITY_BASE_SHA}" && "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if git fetch --no-tags --depth=1 origin main; then
              MACHINE_AUTHORITY_BASE_SHA="$(git rev-parse FETCH_HEAD)"
              echo "Using origin/main (${MACHINE_AUTHORITY_BASE_SHA}) as the workflow_dispatch diff base."
            else
              echo "Could not fetch origin/main; running machine authority conservatively."
            fi
          fi

          if [[ -n "${MACHINE_AUTHORITY_BASE_SHA}" && "${MACHINE_AUTHORITY_BASE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            if ! git cat-file -e "${MACHINE_AUTHORITY_BASE_SHA}^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=1 origin "${MACHINE_AUTHORITY_BASE_SHA}" || true
            fi
            set +e
            scripts/machine-authority-changed --base "${MACHINE_AUTHORITY_BASE_SHA}" --head "${MACHINE_AUTHORITY_HEAD_SHA}"
            status="$?"
            set -e
            case "${status}" in
              0) changed=true ;;
              1) changed=false ;;
              *)
                echo "Machine-authority diff failed; running conservative check."
                changed=true
                ;;
            esac
          else
            echo "No reliable diff base; running machine authority."
          fi
          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"

      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        if: ${{ steps.machine-changes.outputs.changed == 'true' }}
        with:
          group: gcp-governance
          profile: submitter
          mode: ${{ inputs.mode || 'full-fresh' }}
          lanes: |
            seam-inventory
            rmat-audit
            machine-authority

  wasm-feature-changes:
    name: WASM, SDK, and feature change detection
    needs: [control-plane-up]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      changed: ${{ steps.edge-changes.outputs.changed }}
      wasm_changed: ${{ steps.edge-changes.outputs.wasm_changed }}
      sdk_changed: ${{ steps.edge-changes.outputs.sdk_changed }}
      minimal_changed: ${{ steps.edge-changes.outputs.minimal_changed }}
      feature_changed: ${{ steps.edge-changes.outputs.feature_changed }}
      audit_changed: ${{ steps.edge-changes.outputs.audit_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Detect WASM, SDK, feature, or audit changes
        id: edge-changes
        shell: bash
        env:
          BASE_SHA: ${{ inputs.machine_authority_base_sha || '' }}
          HEAD_SHA: ${{ inputs.machine_authority_head_sha || github.sha }}
        run: scripts/buildbuddy-edge-changes "${BASE_SHA}" "${HEAD_SHA}" >> "${GITHUB_OUTPUT}"

  wasm-sdk-submit:
    name: SDK suites submitter
    needs: [control-plane-up, executors-up, wasm-feature-changes]
    if: ${{ needs.wasm-feature-changes.outputs.sdk_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        with:
          group: gcp-sdk-suites
          profile: submitter
          mode: ${{ inputs.mode || 'full-fresh' }}
          lanes: |
            sdk-suites

  wasm-check-submit:
    name: WASM check submitter
    needs: [control-plane-up, executors-up, wasm-feature-changes]
    if: ${{ needs.wasm-feature-changes.outputs.wasm_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        with:
          group: gcp-wasm-check
          profile: submitter
          mode: ${{ inputs.mode || 'full-fresh' }}
          lanes: |
            wasm-check

  minimal-feature-submit:
    name: Minimal feature submitter
    needs: [control-plane-up, executors-up, wasm-feature-changes]
    if: ${{ needs.wasm-feature-changes.outputs.minimal_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        with:
          group: gcp-minimal-feature
          profile: submitter
          mode: ${{ inputs.mode || 'full-fresh' }}
          lanes: |
            test-minimal

  feature-submit:
    name: Feature matrix submitter
    needs: [control-plane-up, executors-up, wasm-feature-changes]
    if: ${{ needs.wasm-feature-changes.outputs.feature_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        with:
          group: gcp-feature-matrix
          profile: submitter
          mode: ${{ inputs.mode || 'full-fresh' }}
          lanes: |
            test-feature-matrix-lib
            test-feature-matrix-surface-checks

  audit-submit:
    name: Security audit submitter
    needs: [control-plane-up, executors-up, wasm-feature-changes]
    if: ${{ needs.wasm-feature-changes.outputs.audit_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILDBUDDY_GRPC_URL: ${{ needs.control-plane-up.outputs.grpc_url }}
      BUILDBUDDY_HTTP_URL: ${{ needs.control-plane-up.outputs.http_url }}
      BUILDBUDDY_ENDPOINT: ${{ needs.control-plane-up.outputs.grpc_url }}
      CI_STARTED_AT_EPOCH: ${{ needs.control-plane-up.outputs.started_at_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/run-buildbuddy-ci-lane-batch
        with:
          group: gcp-security-audit
          profile: submitter
          mode: ${{ inputs.mode || 'full-fresh' }}
          lanes: |
            audit

  executors-down:
    name: Executors down
    if: ${{ always() }}
    needs:
      - executors-up
      - prebuild-submit
      - static-submit
      - native-submit
      - governance-submit
      - wasm-feature-changes
      - wasm-sdk-submit
      - wasm-check-submit
      - minimal-feature-submit
      - feature-submit
      - audit-submit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Authenticate to GCP with Workload Identity
        if: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.MEERKAT_GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.MEERKAT_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.MEERKAT_GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.MEERKAT_GCP_PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Authenticate to GCP with JSON fallback
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if gcloud auth list --filter=status:ACTIVE --format='value(account)' | grep -q .; then
            exit 0
          fi
          if [[ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ]]; then
            echo "GCP auth is required to scale down GCP BuildBuddy executors." >&2
            exit 1
          fi
          key_file="${RUNNER_TEMP}/gcp-key.json"
          printf '%s' "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" > "${key_file}"
          gcloud auth activate-service-account --key-file "${key_file}"
          rm -f "${key_file}"

      - name: Scale down BuildBuddy executors
        shell: bash
        env:
          MEERKAT_GCP_BUILDBUDDY_WAIT_ON_DOWN: ${{ vars.MEERKAT_GCP_BUILDBUDDY_WAIT_ON_DOWN || '0' }}
          MEERKAT_GCP_BUILDBUDDY_WAIT_TIMEOUT: ${{ vars.MEERKAT_GCP_BUILDBUDDY_WAIT_TIMEOUT || '900' }}
        run: scripts/gcp-buildbuddy-executor-pool down

  gate:
    name: GCP BuildBuddy gate
    if: ${{ always() }}
    needs:
      - control-plane-up
      - executors-up
      - prebuild-submit
      - static-submit
      - native-submit
      - governance-submit
      - wasm-feature-changes
      - wasm-sdk-submit
      - wasm-check-submit
      - minimal-feature-submit
      - feature-submit
      - audit-submit
      - executors-down
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "GCP BuildBuddy CI failed"
            exit 1
          fi
      - name: Check GCP CI duration SLO
        shell: bash
        env:
          CI_STARTED_AT_EPOCH: ${{ needs.control-plane-up.outputs.started_at_epoch }}
          MAX_SECONDS: ${{ vars.MEERKAT_GCP_BUILDBUDDY_CI_MAX_SECONDS || '900' }}
        run: |
          if ! [[ "${CI_STARTED_AT_EPOCH}" =~ ^[0-9]+$ ]]; then
            echo "::error::Missing or invalid GCP BuildBuddy CI start timestamp: '${CI_STARTED_AT_EPOCH}'"
            exit 1
          fi
          if ! [[ "${MAX_SECONDS}" =~ ^[0-9]+$ ]] || [[ "${MAX_SECONDS}" == "0" ]]; then
            echo "::error::Invalid MEERKAT_GCP_BUILDBUDDY_CI_MAX_SECONDS: '${MAX_SECONDS}'"
            exit 1
          fi
          elapsed="$(($(date +%s) - CI_STARTED_AT_EPOCH))"
          echo "GCP BuildBuddy CI elapsed seconds: ${elapsed}/${MAX_SECONDS}"
          if ((elapsed > MAX_SECONDS)); then
            echo "::error::GCP BuildBuddy CI exceeded ${MAX_SECONDS}s SLO (${elapsed}s)."
            exit 1
          fi
