[package]
name = "meerkat-schedule"
description = "Realm-scoped schedule domain for Meerkat"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
meerkat-core = { workspace = true }
meerkat-machine-dsl = { workspace = true }
meerkat-machine-schema = { workspace = true }
indexmap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
chrono-tz = { workspace = true }
uuid = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }
schemars = { workspace = true, optional = true, features = ["chrono04"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
tokio_with_wasm = { workspace = true }

[features]
default = []
schema = ["dep:schemars", "meerkat-core/schema"]

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "test-util"] }

[lints]
workspace = true

# Both `indexmap` and `meerkat-machine-schema` are consumed through the
# `machine!` macro expansion in `meerkat-machine-dsl`. `cargo-machete` does
# not analyse proc-macro output, so we have to mark them as intentionally
# retained.
[package.metadata.cargo-machete]
ignored = ["indexmap", "meerkat-machine-schema"]
