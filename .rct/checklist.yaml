          - "sdks/web/src/*"
          - "meerkat-web-runtime/tests/*"
        verification_gate: "browser boundary contract suite"
        real_entrypoint: "cargo test -p meerkat-web-runtime --target wasm32-unknown-unknown -- --ignored"
        deletion_checkpoint: "direct-session browser owner assumptions are no longer implicit"
      - id: TASK-009
        spec_id: CONTRACT-014
        related_spec_ids: [CONTRACT-015, CONTRACT-016]
        owner: orchestrator
        text: "Write and pass contract checks for SDK/docs/changelog propagation and for anti-drift enforcement between machine authority, verification, and companion docs."
        done: false
        done_when: "Validation rules and tests prove public contract changes cannot ship without regenerated bindings/docs/changelog, and runtime semantic changes must update authoritative machine definitions and verification together."
        touched_files:
          - "docs/architecture/0.5/rct/gaps-and-contradictions.md"
          - "docs/architecture/0.5/rct/checklist.yaml"
