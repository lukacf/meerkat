[package]
name = "esp32-host-meerkat"
version = "0.1.0"
edition = "2021"
resolver = "2"

[workspace]

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
chrono = "0.4"
futures-util = "0.3"
meerkat-client = { path = "../../../../meerkat-client", default-features = false, features = ["openai"] }
meerkat-comms = { path = "../../../../meerkat-comms" }
meerkat-core = { path = "../../../../meerkat-core" }
meerkat-hooks = { path = "../../../../meerkat-hooks" }
meerkat-runtime = { path = "../../../../meerkat-runtime" }
meerkat-session = { path = "../../../../meerkat-session", features = ["persistent-service"] }
meerkat-store = { path = "../../../../meerkat-store" }
meerkat-tools = { path = "../../../../meerkat-tools", default-features = false }
parking_lot = "0.12"
serde_json = "1.0"
tokio = { version = "1.43", features = ["macros", "rt-multi-thread", "sync", "time"] }
