version: 1
initiative: ROW-22
phases:
  - id: 0
    name: Boundary Contracts
    goal: >
      Validate the schema/codegen/test harness boundaries and lock the typed row-22 target
      before any production implementation lands.
    requirements:
      - CONTRACT-003
      - CONTRACT-004
      - CHOKE-001
      - CHOKE-002
      - CHOKE-006
      - INV-001
      - INV-002
    done_when:
      - trybuild fixtures, AST audit tests, render contract tests, and helper-cycle validation all exist and fail only for missing row-22 implementation
      - the legacy generic interpreter is scoped as a test-oracle target in test plans, not as a production API
      - targeted cargo batch records red-at-assertion evidence rather than infra failures
    reality_gate: >
      The real shipped entrypoints `xtask` and `make machine-codegen` are exercised by tests or
      commands so the row-22 target is validated against the actual generator and audit paths.
    verification_commands:
      - ./scripts/repo-cargo test -p xtask -F machine-authority --test machines_contracts --test rmat_audit
      - ./scripts/repo-cargo test -p machine-dsl-tests -p meerkat-machine-codegen -p meerkat-machine-kernels -p meerkat-core -p meerkat-mcp -p meerkat-mob -p meerkat-runtime -p meerkat-schedule --tests
  - id: 1
    name: Canonical Typed Kernel
    goal: >
      Migrate the modeled-kernel generator and canonical machine consumers to typed state,
      triggers, effects, helper APIs, and typed refusal/error surfaces.
    requirements:
      - TYPE-001
      - TYPE-002
      - TYPE-003
      - TYPE-004
      - TYPE-005
      - CONTRACT-001
      - INV-003
      - CHOKE-003
    done_when:
      - all five canonical machine modules render typed APIs from generated code
      - canonical parity suites compare typed next_state, effects, and refusal classification exactly
      - no public canonical row-scope artifact references KernelState, KernelInput, KernelSignal, KernelEffect, or KernelValue
    reality_gate: >
      `make machine-codegen` regenerates the canonical typed modules and the canonical runtime
      parity suites pass through the owner-side runtime crates.
    verification_commands:
      - ./scripts/repo-cargo test -p meerkat-machine-codegen -p meerkat-machine-kernels -p meerkat-runtime -p xtask --tests
      - make machine-codegen
  - id: 2
    name: Compat Typed Flows
    goal: >
      Migrate compat flow machines, consumer-local typed compositions, typed obligation protocols,
      and the generated flow_frame_loop_driver without weakening functional coverage.
    requirements:
      - TYPE-001
      - TYPE-006
      - TYPE-007
      - CONTRACT-002
      - CHOKE-002
      - CHOKE-004
      - CHOKE-005
    done_when:
      - flow_run, flow_frame, and loop_iteration expose typed generated APIs
      - all four canonical compositions emit typed helpers and the flow_frame_loop_driver is typed
      - migrated compat-flow functional suites keep the same behavioral assertions and pass against typed APIs
    reality_gate: >
      The meerkat-mob runtime exercises the generated typed compat-flow driver and protocol
      helpers through real mob tests and codegen output.
    verification_commands:
      - ./scripts/repo-cargo test -p meerkat-core -p meerkat-mcp -p meerkat-mob -p machine-dsl-tests --tests
      - make machine-codegen
  - id: 3
    name: Persistence Cut And Acceptance
    goal: >
      Finalize schema-version 5 persistence, typed CAS semantics, release notes, TLC stats
      comparison, and the full workspace acceptance gate.
    requirements:
      - TYPE-008
      - CONTRACT-005
      - INV-004
      - INV-005
      - INV-006
      - E2E-001
      - E2E-002
      - E2E-003
    done_when:
      - pre-row-22 active compat snapshots fail with typed unsupported-schema errors
      - CAS tests prove typed Eq behavior rather than byte equality
      - release notes and compare-machine-verify-stats helper are present
      - the full acceptance gate and local stats-drift comparison are green
    reality_gate: >
      The persisted compat-flow runtime paths are exercised through the real mob/runtime storage
      implementations, and the final workspace gate runs the production entrypoints end to end.
    verification_commands:
      - ./scripts/repo-cargo fmt --all -- --check
      - ./scripts/repo-cargo clippy --workspace --all-targets -- -D warnings
      - ./scripts/repo-cargo unit
      - ./scripts/repo-cargo int
      - ./scripts/repo-cargo e2e-fast
      - ./scripts/repo-cargo e2e-system
      - make machine-codegen
      - make machine-verify
      - make machine-check-drift
      - ./scripts/compare-machine-verify-stats.sh <main-worktree> <feature-worktree>
